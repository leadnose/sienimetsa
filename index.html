<body>

<div id="hud"><canvas class="hico" id="ico-basket"></canvas> <span id="cnt">0</span> / <span id="tot">?</span>

<div id="win" role="dialog" aria-modal="true" aria-labelledby="wm-label">
  <div class="wb">🎉🍄🎉</div>
  <div class="wm" id="wm-label">Löysit kaikki sienet!</div>
  <div class="wb" style="font-size:clamp(40px,10vw,78px)">⭐⭐⭐</div>
  <button id="btn-play">🔄 Uudelleen!</button>
</div>
<script>
'use strict';

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const mmCv   = document.getElementById('minimap');
const mmCtx  = mmCv.getContext('2d');

const pixCv  = document.createElement('canvas');
const pixCtx = pixCv.getContext('2d');
let PS=2, pixW, pixH;
const SP = {}; // sprite cache

let VW, VH, WW, WH;
const MM_W = 160;

// ── Seeded RNG ────────────────────────────────────────────────
function mkRng(seed) {
  let s = seed >>> 0;
  return () => { s = Math.imul(s,1664525)+1013904223>>>0; return s/2**32; };
}

// ── Palette ───────────────────────────────────────────────────
const P = {
  grass:  '#3a5a18', grassD: '#263c0e', grassL: '#4e7422',
  trunk:  '#6e4018', trunkD: '#3e2208',
  leaf:   '#1c3c0c', leafM:  '#284e14', leafL:  '#34601c',
  pine:   '#142608', pineM:  '#1c3610', pineL:  '#264618',
  spr:    '#0e1e0a', sprM:   '#162a10', sprL:   '#203818',
  fir:    '#142208', firM:   '#1e3210', firL:   '#284218',
  scots:  '#7a4a1e', scotsD: '#4a2a0c',
  shrub:  '#1a3008', shrubL: '#284018',
  water:  '#1a5080', waterL: '#2870a8', waterD: '#0e3050',
  shore:  '#907228', shoreD: '#6a5018',
  riverW: '#2870a8', riverB: '#7a6018',
  hill:   '#6a5a48', hillL:  '#8a7a68', hillD:  '#4a3a2c', snow: '#bab0a0',
  mushrC: '#a01818', mushrCd:'#681010', mushrS: '#d8c898',
  skin:   '#e0a060', skinD:  '#b07030',
  hat:    '#283a10', hatD:   '#182408',
  coat:   '#384c10', coatD:  '#243008',
  cape:   '#a06808', capeD:  '#704808',
  belt:   '#381808', shoe:   '#1c0c04',
  fl1:    '#e8e0a0', fl2:    '#d8c840', fl3:    '#b8d068',
  lpad:   '#183808', outline:'#100c04',
  mm_g:   '#3a5818', mm_w:   '#1a5080', mm_h:   '#6a5a48',
};

// ── Map selection ─────────────────────────────────────────────
const mapNum = (() => {
  const n = parseInt(new URLSearchParams(location.search).get('map') ?? '');
  return Number.isInteger(n) && n >= 1 && n <= 10 ? n : 1;
})();

// ── Named constants ───────────────────────────────────────────
const T_GRASS=0, T_SAND=1, T_MARSH=2, T_ROCK=3, T_GRAVEL=4;
const TR_DECIDUOUS=0, TR_PINE=1, TR_SPRUCE=2, TR_FIR=3, TR_SCOTS=4;
const U_BILBERRY=0, U_LINGONBERRY=1, U_FERN=2, U_MOSS=3, U_GRASS_TUFT=4;
const WORLD_SCALE=7; // world is WORLD_SCALE × viewport size
const NUM_VARIANTS=8; // shape variants per tree species+size

// ── World data ────────────────────────────────────────────────
let WATER_DEF=[], RIVERS=[], MOUNT_DEF=[], TERRAIN_ZONES=[];
let TREES=[], SHRUBS=[], FLOWERS=[], PATCHES=[], MUSHROOMS=[], COLLIDERS=[], UNDERSTORY=[];
let TREE_GRID=null, TREE_CELL=1; // spatial grid of trunk colliders
let PATHS=[], PATH_MASK=null;    // trail polylines + rasterised influence grid
const PM_N=200;                  // path-influence grid resolution
const PATH_CAP=190, PATH_MAXDEPTH=5; // fractal-branch budget / recursion depth

// Ponds are wobbly ellipses, not perfect ovals: each carries 2-3 sine
// harmonics (freq k, amplitude a, phase p) so the shoreline has natural
// bumps and inlets. Given the angle from a pond's centre (in normalized
// ellipse space, where the base rx/ry circle is angle-independent), this
// returns the radius multiplier at that angle — rendering, wading depth
// and collision all call it so the three never disagree with each other.
function waterEdgeMul(wob, ang){
  let m=1;
  for(const h of wob) m+=h.a*Math.sin(h.k*ang+h.p);
  return m;
}
// d(waterEdgeMul)/d(ang) — needed to convert the shoreline's normalized
// radius into an actual screen-pixel distance (see drawWater's pxScaleLUT):
// wherever the wobble radius changes quickly with angle, the shore's true
// outward normal tilts away from purely radial, so the radial gradient
// alone understates how fast you cross the shore and shore bands would
// otherwise compress to nothing at those angles.
function waterEdgeSlope(wob, ang){
  let s=0;
  for(const h of wob) s+=h.a*h.k*Math.cos(h.k*ang+h.p);
  return s;
}

// Turn a river's control points into a dense centreline: Catmull-Rom
// through the points (so bends are smooth curves, not jointed straights),
// one sample every ~6 low-res pixels, each carrying a width multiplier.
// Width = two sine harmonics along the run (slow swells + quicker
// narrows) on an envelope that starts as a narrow spring and, if the
// river never reaches a lake, dwindles to a trickle instead of stopping
// dead at full width.
function buildRiverSamples(rv, r){
  const P=rv.pts, n=P.length, smp=[];
  const segLens=[]; let total=0;
  for(let s=0;s<n-1;s++){
    const L=Math.hypot((P[s+1].x-P[s].x)*WW,(P[s+1].y-P[s].y)*WH);
    segLens.push(L); total+=L;
  }
  const wob=[{k:4+r()*3, a:.40+r()*.18, p:r()*Math.PI*2},
             {k:10+r()*5, a:.18+r()*.10, p:r()*Math.PI*2}];
  const widthAt=(t)=>{
    let m=1;
    for(const h of wob) m+=h.a*Math.sin(h.k*Math.PI*2*t+h.p);
    m*=0.55+0.45*Math.min(1,t/0.15);
    // floor before the trickle fade so mid-course narrows never pinch
    // below ~half width, while dead ends still dwindle away
    m=Math.max(0.55,Math.min(2.2,m));
    if(!rv.toLake&&t>0.72) m*=Math.max(0.3,1-((t-0.72)/0.28)*0.75);
    return m;
  };
  // Estuary flare: widen toward the lake based on each sample's distance
  // to the lake's wobbly shoreline (not river-t, which ends at the lake's
  // centre), fanning out to ~2.3× as the mouth meets the shore.
  const mulAt=(x,y,t)=>{
    let m=widthAt(t);
    if(rv.lake){
      const w=rv.lake;
      const ux=(x-w.x)/w.rx, uy=(y-w.y)/w.ry;
      const lr=Math.hypot(ux,uy)/waterEdgeMul(w.wob,Math.atan2(uy,ux));
      const f=Math.max(0,Math.min(1,(2.2-lr)/1.2));
      m=Math.min(3.2,m*(1+1.3*f*f));
    }
    return m;
  };
  let acc=0;
  for(let s=0;s<n-1;s++){
    const p0=P[s>0?s-1:0], p1=P[s], p2=P[s+1], p3=P[s<n-2?s+2:n-1];
    const steps=Math.max(1,Math.round(segLens[s]/(6*PS)));
    for(let j=0;j<steps;j++){
      const u=j/steps, u2=u*u, u3=u2*u;
      const x=.5*(2*p1.x+(-p0.x+p2.x)*u+(2*p0.x-5*p1.x+4*p2.x-p3.x)*u2+(-p0.x+3*p1.x-3*p2.x+p3.x)*u3);
      const y=.5*(2*p1.y+(-p0.y+p2.y)*u+(2*p0.y-5*p1.y+4*p2.y-p3.y)*u2+(-p0.y+3*p1.y-3*p2.y+p3.y)*u3);
      smp.push({x,y,m:mulAt(x,y,(acc+u*segLens[s])/total)});
    }
    acc+=segLens[s];
  }
  smp.push({x:P[n-1].x, y:P[n-1].y, m:mulAt(P[n-1].x,P[n-1].y,1)});
  rv.smp=smp;
  // Record where the centreline crosses the lake's shoreline: drawWater
  // brightens its water in a wide fan around each mouth so the inflow
  // current visibly spreads into the lake.
  if(rv.lake){
    const w=rv.lake;
    for(const s of smp){
      const ux=(s.x-w.x)/w.rx, uy=(s.y-w.y)/w.ry;
      if(Math.hypot(ux,uy)/waterEdgeMul(w.wob,Math.atan2(uy,ux))<1){
        (w.mouths=w.mouths||[]).push({x:s.x,y:s.y,m:s.m});
        break;
      }
    }
  }
}

function terrainAt(x,y){
  let bestInf=0, best=T_GRASS;
  for(const z of TERRAIN_ZONES){
    const d2=((x-z.x)/z.rx)**2+((y-z.y)/z.ry)**2;
    if(d2<1){const inf=1-Math.sqrt(d2);if(inf>bestInf){bestInf=inf;best=z.t;}}
  }
  return best;
}

function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function generateWorld(seed){
  const r = mkRng(seed * 6271 + 9973);
  MOUNT_DEF = [];
  const nM = 6 + Math.floor(r()*6);
  const nCl = 1 + Math.floor(r()*2 + (r()>.55?1:0));
  const clX = Array.from({length:nCl}, ()=> 0.18+r()*.64);
  const clY = Array.from({length:nCl}, ()=> 0.04+r()*.30);
  for(let i=0;i<nM;i++){
    const c=i%nCl;
    MOUNT_DEF.push({
      x: clamp(clX[c]+(r()-.5)*.30, 0.05, 0.95),
      y: clamp(clY[c]+(r()-.5)*.18, 0.03, 0.48),
      s: 0.38+r()*.62,
    });
  }
  WATER_DEF = [];
  const nW = 4+Math.floor(r()*3);
  for(let tries=0; WATER_DEF.length<nW && tries<100; tries++){
    const wx=0.06+r()*.88, wy=0.12+r()*.80;
    const clearM = MOUNT_DEF.every(m=>Math.hypot(wx-m.x,wy-m.y)>m.s*.13+0.10);
    const clearW = WATER_DEF.every(w=>Math.hypot(wx-w.x,wy-w.y)>0.14);
    if(clearM&&clearW){
      const rx=0.025+r()*.068, ry=rx*(0.48+r()*.64);
      // 2 low-frequency harmonics, decreasing amplitude — keeps the shore
      // a gentle, non-self-intersecting blob (radius swings roughly
      // ±18%, slope stays shallow) rather than a jagged star that pinches
      // down to a sliver at its narrow points.
      const wob=[2,3].map((k,i)=>({k, a:(0.09/(i+1))*(0.7+r()*0.6), p:r()*Math.PI*2}));
      WATER_DEF.push({x:wx,y:wy,rx,ry,wob});
    }
  }
  RIVERS = [];
  const nR = 1+Math.floor(r()*2+(MOUNT_DEF.length>8?1:0));
  for(let i=0;i<Math.min(nR,3);i++){
    const m = MOUNT_DEF[Math.floor(r()*MOUNT_DEF.length)];
    const sx=clamp(m.x+(r()-.5)*.12,0,1), sy=clamp(m.y+m.s*.09+r()*.06,0,1);
    let ex,ey,lake=null;
    if(WATER_DEF.length&&r()>.3){ lake=WATER_DEF[Math.floor(r()*WATER_DEF.length)]; ex=lake.x;ey=lake.y; }
    else { ex=0.1+r()*.8; ey=0.55+r()*.4; }
    // Midpoint displacement: repeatedly split each span, pushing the new
    // midpoint sideways (perpendicular) by a random fraction of the span
    // length that shrinks per level — big sweeping meanders with smaller
    // bends layered on top, instead of a near-straight jointed polyline.
    let pts=[{x:sx,y:sy},{x:ex,y:ey}];
    const amps=[.42,.30,.20,.12];
    for(const amp of amps){
      const next=[pts[0]];
      for(let s=0;s<pts.length-1;s++){
        const a=pts[s], b=pts[s+1];
        const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1e-6;
        const off=(r()-.5)*2*amp*len;
        next.push({x:clamp((a.x+b.x)/2-dy/len*off,0.02,0.98),
                   y:clamp((a.y+b.y)/2+dx/len*off,0.02,0.98)});
        next.push(b);
      }
      pts=next;
    }
    const rv={pts,toLake:Boolean(lake),lake};
    buildRiverSamples(rv,r);
    RIVERS.push(rv);
  }
  // Terrain zones: 1=sand 2=marsh 3=rock 4=gravel
  TERRAIN_ZONES = [];
  const nTZ = 18 + Math.floor(r()*10);
  const tzPool = [T_SAND,T_SAND,T_MARSH,T_MARSH,T_ROCK,T_ROCK,T_GRAVEL,T_GRAVEL];
  for(let tries=0; TERRAIN_ZONES.length<nTZ && tries<300; tries++){
    const tx=0.04+r()*.92, ty=0.04+r()*.92;
    const inW=WATER_DEF.some(w=>Math.hypot(tx-w.x,ty-w.y)<Math.max(w.rx,w.ry)*1.8);
    if(inW) continue;
    TERRAIN_ZONES.push({
      x:tx, y:ty,
      rx:0.14+r()*.24, ry:0.10+r()*.18,
      t:tzPool[(r()*tzPool.length)|0]
    });
  }
  generatePaths(r);
}

// ── Path network ──────────────────────────────────────────────
// Forests people walk get trails between destinations. We pick nodes
// (border trailheads, lake shores, mountain feet, a clearing), connect
// them with a minimum spanning tree, and read each edge's *tier* from how
// the tree splits when that edge is cut: arteries that separate large
// halves are main trails (tier 0); twigs to a single spot are side paths
// (tier 1). Tier-2 dead-end spurs then wander off existing trails and fade
// into nowhere — some ending at a forager's secret patch, some at nothing.
function generatePaths(r){
  PATHS=[];
  const nodes=[];
  const okSpot=(x,y)=> !WATER_DEF.some(w=>Math.hypot(x-w.x,y-w.y)<Math.max(w.rx,w.ry)*1.2)
                    && !MOUNT_DEF.some(m=>Math.hypot(x-m.x,y-m.y)<m.s*.10);
  const nTH=3+((r()>.5)?1:0);                      // border trailheads
  for(let i=0;i<nTH;i++){
    const side=(r()*4)|0, t=0.10+r()*.80;
    nodes.push(side===0?{x:t,y:.02}:side===1?{x:.98,y:t}:side===2?{x:t,y:.98}:{x:.02,y:t});
  }
  WATER_DEF.forEach(w=>{                            // a point on each shore
    const a=r()*Math.PI*2;
    nodes.push({x:clamp(w.x+Math.cos(a)*w.rx*1.4,.03,.97),
                y:clamp(w.y+Math.sin(a)*w.ry*1.4,.03,.97)});
  });
  MOUNT_DEF.slice().sort((a,b)=>b.s-a.s).slice(0,3).forEach(m=>{ // viewpoints
    nodes.push({x:clamp(m.x,.04,.96),y:clamp(m.y+m.s*.10,.04,.96)});
  });
  let mid=4+((r()*4)|0);                            // interior junctions → denser web
  for(let tries=0; mid>0 && tries<60; tries++){
    const x=0.12+r()*.76, y=0.12+r()*.76;
    if(okSpot(x,y)){ nodes.push({x,y}); mid--; }
  }
  const N=nodes.length;
  if(N<3){ buildPathMask(); return; }
  const dist=(a,b)=>Math.hypot((a.x-b.x)*WW,(a.y-b.y)*WH);
  // Prim minimum spanning tree, weighted by world distance
  const inTree=[0], rest=new Set(), used=new Set();
  for(let i=1;i<N;i++) rest.add(i);
  const mst=[];
  while(rest.size){
    let bd=Infinity,ba=0,bb=-1;
    for(const i of inTree) for(const j of rest){
      const d=dist(nodes[i],nodes[j]);
      if(d<bd){bd=d;ba=i;bb=j;}
    }
    mst.push([ba,bb]); used.add(ba+'-'+bb); used.add(bb+'-'+ba); inTree.push(bb); rest.delete(bb);
  }
  // Subtree sizes (rooted at 0) → edge importance = smaller side it splits
  const adj=Array.from({length:N},()=>[]);
  mst.forEach(([a,b])=>{adj[a].push(b);adj[b].push(a);});
  const size=new Array(N).fill(1), parent=new Array(N).fill(0),
        order=[], seen=new Array(N).fill(false), stack=[0];
  seen[0]=true;
  while(stack.length){const u=stack.pop();order.push(u);for(const v of adj[u])if(!seen[v]){seen[v]=true;parent[v]=u;stack.push(v);}}
  for(let i=order.length-1;i>0;i--){const u=order[i];size[parent[u]]+=size[u];}
  mst.forEach(([a,b])=>{
    const child=parent[b]===a?b:a;
    const imp=Math.min(size[child],N-size[child]);
    PATHS.push({tier:imp>=3?0:1,deadEnd:false,pts:routePath(nodes[a],nodes[b],r)});
  });
  // Extra loop edges: a few short non-tree links → a real network, not a tree
  const cand=[];
  for(let i=0;i<N;i++) for(let j=i+1;j<N;j++) if(!used.has(i+'-'+j)) cand.push([i,j,dist(nodes[i],nodes[j])]);
  cand.sort((p,q)=>p[2]-q[2]);
  const maxLoop=Math.min(WW,WH)*0.55, nLoop=2+((r()*3)|0);
  for(let k=0,added=0; k<cand.length && added<nLoop; k++){
    if(cand[k][2]>maxLoop) break;
    PATHS.push({tier:1,deadEnd:false,pts:routePath(nodes[cand[k][0]],nodes[cand[k][1]],r)});
    added++;
  }
  // Fractal capillaries: seed branches off the backbone arteries; each branch
  // recursively sprouts smaller, self-similar branches (growBranch), so the
  // network repeats the same forking pattern at every scale. The finest twigs
  // are the trails that lead to nowhere.
  const backbone=PATHS.slice();                    // arteries only (no branches yet)
  const nSeed=Math.max(5,Math.round(backbone.length*1.4));
  for(let s=0;s<nSeed && PATHS.length<PATH_CAP;s++){
    const base=backbone[(r()*backbone.length)|0];
    const si=(r()*(base.pts.length-1))|0;
    const ap=base.pts[si], an=base.pts[si+1];
    const along=Math.atan2(an.y-ap.y,an.x-ap.x), side=r()<.5?1:-1;
    growBranch(r,ap.x,ap.y, along+side*(0.7+r()*0.7), 0.11+r()*0.09, Math.min(2,base.tier+1), 0);
  }
  buildPathMask();
}
// One self-similar branch: walk a wandering polyline of length `len`, then fork
// into a few shorter children at branch angles — the same rule recursing down,
// which is what makes the whole network fractal. Finer generations wander more
// and shrink toward nothing; every branch is a dead-end (leads nowhere).
function growBranch(r,x,y,dir,len,tier,depth){
  if(PATHS.length>=PATH_CAP || len<0.02) return;
  const stepLen=0.0035, steps=Math.max(3,Math.round(len/stepLen)), wander=0.12+depth*0.05;
  const curl=(r()-.5)*0.22;          // constant turn → branch arcs, never straight
  const pts=[{x,y}]; let cx=x,cy=y,cd=dir;
  for(let k=0;k<steps;k++){
    cd+=curl+(r()-.5)*wander;
    const nx=clamp(cx+Math.cos(cd)*stepLen,.02,.98), ny=clamp(cy+Math.sin(cd)*stepLen,.02,.98);
    if(WATER_DEF.some(w=>Math.hypot(nx-w.x,ny-w.y)<Math.max(w.rx,w.ry))) break;
    if(MOUNT_DEF.some(m=>Math.hypot(nx-m.x,ny-m.y)<m.s*.09)) break;
    cx=nx; cy=ny; pts.push({x:cx,y:cy});
  }
  if(pts.length<2) return;
  PATHS.push({tier:Math.min(2,tier),deadEnd:true,pts});
  if(depth>=PATH_MAXDEPTH) return;
  const nKids=1+(r()<0.62?1:0)+(r()<0.24?1:0);    // mostly 1–2, sometimes 3
  for(let c=0;c<nKids && PATHS.length<PATH_CAP;c++){
    const ai=1+((r()*(pts.length-1))|0);           // fork point along the branch
    const a0=pts[ai-1], a1=pts[ai];
    const baseDir=Math.atan2(a1.y-a0.y,a1.x-a0.x), sd=(c&1)?1:-1;
    growBranch(r,a1.x,a1.y, baseDir+sd*(0.5+r()*0.6), len*(0.55+r()*0.16), tier+1, depth+1);
  }
}
// Route an edge as a fractal Brownian curve: recursively displace the midpoint
// of every segment perpendicular to itself. Because the displacement scales
// with each (halving) segment, the trail wiggles at every scale and never runs
// straight, while the fixed endpoints keep it connected. Points are then nudged
// clear of water/peaks.
function pathNudge(p){
  WATER_DEF.forEach(w=>{
    const dx=p.x-w.x,dy=p.y-w.y,rr=Math.max(w.rx,w.ry)*1.1,d=Math.hypot(dx,dy);
    if(d<rr&&d>1e-4){p.x=w.x+dx/d*rr;p.y=w.y+dy/d*rr;}
  });
  MOUNT_DEF.forEach(m=>{
    const dx=p.x-m.x,dy=p.y-m.y,rr=m.s*.09,d=Math.hypot(dx,dy);
    if(d<rr&&d>1e-4){p.x=m.x+dx/d*rr;p.y=m.y+dy/d*rr;}
  });
  p.x=clamp(p.x,.02,.98); p.y=clamp(p.y,.02,.98);
  return p;
}
function routePath(a,b,r){
  let pts=[{x:a.x,y:a.y},{x:b.x,y:b.y}];
  const rough=0.26;                 // perpendicular displacement, ∝ segment length
  // Subdivide enough that even long edges have short chords (no straight runs);
  // displacement persists at every level so the wiggle is scale-free.
  const L=Math.hypot(b.x-a.x,b.y-a.y);
  const levels=Math.max(4,Math.min(8,Math.ceil(Math.log2(Math.max(2,L/0.0016)))));
  for(let lvl=0; lvl<levels; lvl++){
    const next=[pts[0]];
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[i], p1=pts[i+1];
      const sx=p1.x-p0.x, sy=p1.y-p0.y, sl=Math.hypot(sx,sy)||1;
      const disp=(r()-.5)*rough*sl;            // self-similar: shrinks as segments halve
      next.push({x:(p0.x+p1.x)/2 - sy/sl*disp, y:(p0.y+p1.y)/2 + sx/sl*disp});
      next.push(p1);
    }
    pts=next;
  }
  pts.forEach(pathNudge);
  return pts;
}
// Corridor radius (world px) by tier — wider trails clear more forest.
function pathRadW(tier){ return tier===0?treeSz*.52:tier===1?treeSz*.40:treeSz*.30; }
// Rasterise every corridor into PATH_MASK; cell value = best (widest) tier
// code covering it (3=main, 2=side, 1=faint, 0=none).
function buildPathMask(){
  PATH_MASK=new Uint8Array(PM_N*PM_N);
  for(const path of PATHS){
    const code=path.tier===0?3:path.tier===1?2:1, rw=pathRadW(path.tier);
    for(let i=0;i<path.pts.length-1;i++) stampPathSeg(path.pts[i],path.pts[i+1],rw,code);
  }
}
function stampPathSeg(p0,p1,rw,code){
  const ax=p0.x*WW,ay=p0.y*WH,bx=p1.x*WW,by=p1.y*WH;
  const gx0=clamp(((Math.min(ax,bx)-rw)/WW*PM_N)|0,0,PM_N-1);
  const gx1=clamp(((Math.max(ax,bx)+rw)/WW*PM_N)|0,0,PM_N-1);
  const gy0=clamp(((Math.min(ay,by)-rw)/WH*PM_N)|0,0,PM_N-1);
  const gy1=clamp(((Math.max(ay,by)+rw)/WH*PM_N)|0,0,PM_N-1);
  const dx=bx-ax,dy=by-ay,ll=dx*dx+dy*dy||1,rw2=rw*rw;
  for(let gy=gy0;gy<=gy1;gy++){
    const wy=(gy+.5)/PM_N*WH;
    for(let gx=gx0;gx<=gx1;gx++){
      const wx=(gx+.5)/PM_N*WW;
      let t=((wx-ax)*dx+(wy-ay)*dy)/ll; t=t<0?0:t>1?1:t;
      const ex=wx-(ax+dx*t), ey=wy-(ay+dy*t);
      if(ex*ex+ey*ey<=rw2){const idx=gy*PM_N+gx; if(PATH_MASK[idx]<code) PATH_MASK[idx]=code;}
    }
  }
}
function pathCodeAt(wx,wy){
  if(!PATH_MASK) return 0;
  const gx=(wx/WW*PM_N)|0, gy=(wy/WH*PM_N)|0;
  if(gx<0||gy<0||gx>=PM_N||gy>=PM_N) return 0;
  return PATH_MASK[gy*PM_N+gx];
}

function buildWorld() {
  generateWorld(mapNum);
  const r  = mkRng(mapNum * 1009 + 42);
  const rp = mkRng(mapNum * 1013 + 77);
  const rpath = mkRng(mapNum * 5101 + 61); // path-corridor thinning (keeps tree RNG stable)
  const deadEnds = PATHS.filter(p=>p.deadEnd).map(p=>p.pts[p.pts.length-1]);
  const mCX = MOUNT_DEF.reduce((s,m)=>s+m.x,0)/MOUNT_DEF.length;
  const mCY = MOUNT_DEF.reduce((s,m)=>s+m.y,0)/MOUNT_DEF.length;
  // Tree stands: each spawns `n` trees placed/sized by `gen`. Conifers favour
  // the highlands around the mountain cluster centre (mCX,mCY); broadleaf and
  // mixed stands fill the lowlands. Edit `n` to tune density per stand.
  const STANDS=[
    {n:2000, gen:()=>({x:r()*.42,                       y:.50+r()*.48,                  t:TR_DECIDUOUS,                 m:0.8+r()*.5})},
    {n: 960, gen:()=>({x:clamp(mCX-.15+r()*.30,0,1),    y:r()*.55,                      t:TR_PINE,                      m:0.8+r()*.4})},
    {n: 600, gen:()=>({x:clamp(mCX+r()*.40,0,1),        y:clamp(mCY+r()*.35,0,.55),     t:TR_PINE,                      m:0.7+r()*.5})},
    {n:1500, gen:()=>({x:r(),                           y:r(),                          t:r()>.45?TR_PINE:TR_DECIDUOUS, m:0.7+r()*.6})},
    {n: 720, gen:()=>({x:r()*.44,                       y:r()*.58,                      t:TR_SPRUCE,                    m:0.7+r()*1.1})},
    {n: 600, gen:()=>({x:clamp(mCX-.1+r()*.45,0,1),     y:r()*.48,                      t:TR_SPRUCE,                    m:0.8+r()*1.0})},
    {n: 440, gen:()=>({x:r(),                           y:r(),                          t:TR_SPRUCE,                    m:0.5+r()*1.2})},
    {n: 680, gen:()=>({x:r(),                           y:r(),                          t:TR_FIR,                       m:0.7+r()*.8})},
    {n: 360, gen:()=>({x:r()*.38,                       y:.52+r()*.42,                  t:TR_FIR,                       m:0.9+r()*.9})},
    {n: 460, gen:()=>({x:r(),                           y:r(),                          t:TR_SCOTS,                     m:0.9+r()*.9})},
  ];
  TREES = [];
  for(const {n,gen} of STANDS) for(let i=0;i<n;i++) TREES.push(gen());
  // Assign shape variant per tree (separate RNG so positions are unaffected)
  const rv=mkRng(mapNum*3007+99);
  TREES.forEach(tr=>tr.v=(rv()*NUM_VARIANTS)|0);
  // Remap tree species and thin density based on terrain
  const TERRAIN_TREE_CFG={
    [T_SAND]:  {keep:0.35,pool:[TR_SCOTS,TR_SCOTS,TR_SCOTS,TR_SPRUCE]},
    [T_MARSH]: {keep:0.55,pool:[TR_DECIDUOUS,TR_DECIDUOUS,TR_DECIDUOUS,TR_PINE,TR_PINE,TR_SPRUCE]},
    [T_ROCK]:  {keep:0.08,pool:[TR_SCOTS]},
    [T_GRAVEL]:{keep:0.30,pool:[TR_SCOTS,TR_SCOTS,TR_PINE]},
  };
  TREES=TREES.filter(tr=>{
    const tz=terrainAt(tr.x,tr.y);
    const cfg=TERRAIN_TREE_CFG[tz];
    if(!cfg) return true; // T_GRASS: keep as-is
    if(r()>cfg.keep) return false;
    tr.t=cfg.pool[(r()*cfg.pool.length)|0];
    return true;
  });
  // Remove trees standing in water or on mountain peaks, and thin overlapping
  // clumps via a spacing grid (canopies may still touch — that reads as forest).
  const placeGrid=new Map();
  const SPACE_CELL=Math.max(40,treeSz*1.8);
  TREES=TREES.filter(tr=>{
    if(WATER_DEF.some(w=>Math.hypot(tr.x-w.x,tr.y-w.y)<Math.max(w.rx,w.ry)*0.92)) return false;
    if(MOUNT_DEF.some(m=>Math.hypot(tr.x-m.x,tr.y-m.y)<m.s*.09)) return false;
    const pc=pathCodeAt(tr.x*WW,tr.y*WH);
    if(pc>=2) return false;                 // main/side trail: clear a walkable lane
    if(pc===1 && rpath()<.70) return false; // faint trail: thinned, threads between trunks
    const wx=tr.x*WW, wy=tr.y*WH, sz=treeSz*tr.m;
    const gx=(wx/SPACE_CELL)|0, gy=(wy/SPACE_CELL)|0;
    for(let oy=-1;oy<=1;oy++) for(let ox=-1;ox<=1;ox++){
      const arr=placeGrid.get((gx+ox)+','+(gy+oy)); if(!arr) continue;
      for(const o of arr)
        if(Math.hypot(wx-o.wx,wy-o.wy)<(sz+o.sz)*0.30) return false;
    }
    const k=gx+','+gy; let arr=placeGrid.get(k); if(!arr){arr=[];placeGrid.set(k,arr);}
    arr.push({wx,wy,sz});
    return true;
  });
  UNDERSTORY = [];
  const ur=mkRng(mapNum*2003+13);
  const TZ_CFG={
    [T_GRASS]: {min:12,rnd:10,pool:[U_BILBERRY,U_BILBERRY,U_LINGONBERRY,U_LINGONBERRY,U_FERN,U_FERN,U_MOSS,U_MOSS,U_GRASS_TUFT,U_GRASS_TUFT]},
    [T_SAND]:  {min:1, rnd:3, pool:[U_GRASS_TUFT,U_GRASS_TUFT,U_GRASS_TUFT,U_MOSS,U_MOSS,U_LINGONBERRY]},
    [T_MARSH]: {min:22,rnd:13,pool:[U_MOSS,U_MOSS,U_MOSS,U_MOSS,U_FERN,U_FERN,U_FERN,U_BILBERRY,U_BILBERRY,U_GRASS_TUFT]},
    [T_ROCK]:  {min:0, rnd:2, pool:[U_MOSS]},
    [T_GRAVEL]:{min:3, rnd:5, pool:[U_LINGONBERRY,U_LINGONBERRY,U_LINGONBERRY,U_GRASS_TUFT,U_GRASS_TUFT,U_GRASS_TUFT,U_MOSS,U_MOSS]},
  };
  TREES.forEach(tr=>{
    const cfg=TZ_CFG[terrainAt(tr.x,tr.y)];
    const count=cfg.min+(ur()*cfg.rnd)|0;
    for(let j=0;j<count;j++){
      const a=ur()*Math.PI*2, d=0.003+ur()*.022;
      const ux=clamp(tr.x+Math.cos(a)*d,0.01,.99);
      const uy=clamp(tr.y+Math.sin(a)*d,0.01,.99);
      const inW=WATER_DEF.some(w=>Math.hypot(ux-w.x,uy-w.y)<Math.max(w.rx,w.ry)*1.1);
      if(!inW && pathCodeAt(ux*WW,uy*WH)<2) UNDERSTORY.push({x:ux,y:uy,t:cfg.pool[(ur()*cfg.pool.length)|0]});
    }
  });
  SHRUBS = [];
  for(let i=0;i<110;i++) SHRUBS.push({x:r(),y:r(),m:0.5+r()*.7,berries:r()>.65});
  FLOWERS = [];
  for(let i=0;i<300;i++) FLOWERS.push({x:r(),y:r(),c:r()>.6?P.fl1:r()>.3?P.fl2:P.fl3,s:0.4+r()*.6});
  PATCHES = [];
  for(let i=0;i<180;i++) PATCHES.push({x:rp(),y:rp(),w:0.004+rp()*0.01,h:0.002+rp()*0.007,d:rp()>.45});
  // Mushrooms grow mostly near trees (mycorrhizal partners), rest in clearings.
  // Each anchored shroom sits in front of its tree (downward arc) so it stays
  // visible and reachable; a spacing rule keeps them spread across the map.
  MUSHROOMS=[];
  const sr=mkRng(mapNum*7919+23);
  const nS=18+((sr()*9)|0);
  const mSep=Math.min(WW,WH)*0.03;
  const spotOK=(fx,fy)=>{
    if(pathCodeAt(fx*WW,fy*WH)>=2) return false; // already picked clean along main trails
    if(WATER_DEF.some(w=>Math.hypot(fx-w.x,fy-w.y)<Math.max(w.rx,w.ry)*1.15)) return false;
    if(MOUNT_DEF.some(m=>Math.hypot(fx-m.x,fy-m.y)<m.s*.09)) return false;
    for(const m of MUSHROOMS) if(Math.hypot((fx-m.fx)*WW,(fy-m.fy)*WH)<mSep) return false;
    return true;
  };
  for(let tries=0; MUSHROOMS.length<nS && tries<3000; tries++){
    let fx,fy;
    if(deadEnds.length && sr()<0.24){
      // forager's secret spot: cluster at the end of a dead-end trail
      const e=deadEnds[(sr()*deadEnds.length)|0], a=sr()*Math.PI*2, d=0.008+sr()*.022;
      fx=clamp(e.x+Math.cos(a)*d,0.03,0.97);
      fy=clamp(e.y+Math.sin(a)*d,0.05,0.95);
    } else if(TREES.length && sr()<0.78){
      const tr=TREES[(sr()*TREES.length)|0], sz=treeSz*tr.m;
      const a=Math.PI*(0.12+sr()*0.76);   // downward arc → in front of the tree
      const d=sz*(0.55+sr()*0.85);        // just outside trunk, under the canopy
      fx=clamp(tr.x+Math.cos(a)*d/WW,0.03,0.97);
      fy=clamp(tr.y+Math.sin(a)*d/WH,0.05,0.95);
    } else {
      fx=0.04+sr()*0.92; fy=0.06+sr()*0.9;
    }
    if(spotOK(fx,fy)) MUSHROOMS.push({fx,fy,collected:false,pickT:0});
  }
  // The gnome can wade into a pond up to WATER_MAX_DEPTH before being
  // stopped — so the collider is a *shrunken* ellipse around the deep
  // centre, not the pond's full shore-to-shore extent.
  COLLIDERS = [
    ...WATER_DEF.map(w => ({fx:w.x, fy:w.y, frx:w.rx*(1-WATER_MAX_DEPTH), fry:w.ry*(1-WATER_MAX_DEPTH), wob:w.wob})),
  ];
  buildTreeGrid();
  document.getElementById('tot').textContent = MUSHROOMS.length;
}

// ── Game state ────────────────────────────────────────────────
const char = {x:0,y:0,vx:0,vy:0,facing:1};
const cam  = {x:0,y:0};
let collected=0, gameWon=false, gameTime=0;
let PICK_SPARKS=[];
const SPARK_PAL=[[200,22,22],[218,170,20],[255,240,170],[255,255,255]];
const SPEED=260, CHAR_R=14, PICK_R=38, PICK_ANIM_DUR=0.40;
// Hunger: fullness drains from 1 to 0 over FULL_DRAIN_T seconds of play.
// Below HUNGRY_AT the gnome is hungry and slows to HUNGRY_SPEED of normal;
// walking over a berry bush (bilberry/lingonberry) eats it — the berries
// vanish from the plant and fullness recovers by EAT_RESTORE. He won't
// graze bushes bare while nearly full (fullness above EAT_BELOW).
let fullness=1, bilEaten=0, lingEaten=0;
const FULL_DRAIN_T=60, WALK_DRAIN=3, HUNGRY_AT=0.35, HUNGRY_SPEED=0.55;
const EAT_RESTORE=0.22, EAT_R=30, REGROW_T=75; // eaten bushes regrow berries after this many s
// How far into a pond the gnome can wade — 0 = shore, 1 = dead centre.
// At the cap he's chest-deep; drawGnome() submerges the body to match.
const WATER_MAX_DEPTH=0.72;
// Trees use a smaller collision pad than walls/water so the character can
// shoulder past trunks in dense stands instead of wedging between them.
const TREE_PAD=7;

function findStart() {
  const r = mkRng(mapNum * 7331 + 17);
  // Prefer to begin on a main/side trail (a forest entrance)
  const trails = PATHS.filter(p=>p.tier<=1);
  for(let i=0; i<300 && trails.length; i++){
    const p=trails[(r()*trails.length)|0], pt=p.pts[(r()*p.pts.length)|0];
    const x=pt.x*WW, y=pt.y*WH;
    if(!blocked(x,y)&&!treeAt(x,y)) return {x,y};
  }
  for(let i=0; i<500; i++){
    const x = CHAR_R*2 + r()*(WW-CHAR_R*4);
    const y = CHAR_R*2 + r()*(WH-CHAR_R*4);
    if(!blocked(x,y)&&!treeAt(x,y)) return {x,y};
  }
  return {x:WW*.5, y:WH*.5};
}
function snapCam() {
  cam.x = Math.max(0,Math.min(WW-VW, char.x-VW/2));
  cam.y = Math.max(0,Math.min(WH-VH, char.y-VH/2));
}
function easeCamera(dt) {
  const tx=Math.max(0,Math.min(WW-VW,char.x-VW/2));
  const ty=Math.max(0,Math.min(WH-VH,char.y-VH/2));
  cam.x+=(tx-cam.x)*Math.min(1,dt*8);
  cam.y+=(ty-cam.y)*Math.min(1,dt*8);
}

const keys={};

canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.changedTouches[0]; const dx=t.clientX-joy.bx,dy=t.clientY-joy.by; const a=Math.atan2(dy,dx),cl=Math.min(Math.hypot(dx,dy),JR)/JR; joy.dx=Math.cos(a)*cl;joy.dy=Math.sin(a)*cl; joyKnob.style.left=(50+joy.dx*JR)+'px';joyKnob.style.top=(50+joy.dy*JR)+'px'; },{passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); joy.active=false;joy.dx=0;joy.dy=0;joyBase.style.display='none'; },{passive:false});
function inputDir() {
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])  dx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])    dy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S'])  dy+=1;
  if(joy.active){dx+=joy.dx;dy+=joy.dy;}
  const l=Math.hypot(dx,dy);
  return l>0?{dx:dx/l,dy:dy/l}:{dx:0,dy:0};
}

// ── Collision ─────────────────────────────────────────────────
// Trees are solid trunks. With ~2k of them, brute-forcing every collider per
// move would be wasteful, so trunks live in a uniform spatial grid and only the
// 3×3 cells around the target position are tested. TREE_CELL is sized larger
// than the worst-case trunk reach so neighbours can't be missed.
function buildTreeGrid(){
  TREE_CELL=Math.max(48,treeSz*1.6);
  TREE_GRID=new Map();
  for(const tr of TREES){
    const wx=tr.x*WW, wy=tr.y*WH, cr=Math.max(2,treeSz*tr.m*0.07);
    const gx=(wx/TREE_CELL)|0, gy=(wy/TREE_CELL)|0, k=gx+','+gy;
    let arr=TREE_GRID.get(k); if(!arr){arr=[];TREE_GRID.set(k,arr);}
    arr.push({wx,wy,cr});
  }
}
function blocked(nx,ny) {
  // Ponds are wobbly ellipses (rx,ry independently scaled by WW,WH, plus
  // angle-dependent wobble — see drawWater/waterEdgeMul), often quite
  // elongated. A circular collider sized off the larger radius used to
  // block a stretch of clear ground alongside the narrow axis; check the
  // actual wobbly ellipse (per-axis, CHAR_R-padded) instead.
  for(const c of COLLIDERS){
    const cx=c.fx*WW, cy=c.fy*WH, crx=c.frx*WW, cry=c.fry*WH;
    const ux=(nx-cx)/crx, uy=(ny-cy)/cry;
    const m=waterEdgeMul(c.wob, Math.atan2(uy,ux));
    const ex=(nx-cx)/(crx*m+CHAR_R), ey=(ny-cy)/(cry*m+CHAR_R);
    if(ex*ex+ey*ey<1) return true;
  }
  return false;
}
// Trees are handled separately from blocked(): update() slides the gnome
// around a trunk that's in the way instead of stopping him. Returns the
// blocking tree so the slide can use its centre, or null.
function treeAt(x,y){
  if(!TREE_GRID) return null;
  const gx=(x/TREE_CELL)|0, gy=(y/TREE_CELL)|0;
  for(let oy=-1;oy<=1;oy++) for(let ox=-1;ox<=1;ox++){
    const arr=TREE_GRID.get((gx+ox)+','+(gy+oy)); if(!arr) continue;
    for(const t of arr)
      if(Math.hypot(x-t.wx,y-t.wy)<t.cr+TREE_PAD) return t;
  }
  return null;
}
// Mountains don't block movement — they slow it, like climbing a slope.
// The footprint is an ellipse anchored at the mountain's base (m.x,m.y)
// and extending only upward, matching how drawHill's silhouette is
// anchored (rows drawn from the base up), not a circle around the base.
function onMountainAt(x,y){
  for(const m of MOUNT_DEF){
    const mx=m.x*WW, my=m.y*WH;
    if(y>my+CHAR_R) continue;
    const rw=m.s*Math.min(WW,WH)*.20, rh=m.s*Math.min(WW,WH)*.16;
    const nx=(x-mx)/rw, ny=Math.max(0,my-y)/rh;
    if(nx*nx+ny*ny<1) return true;
  }
  return false;
}
// How deep into a pond a world point is: 0 at the shore, 1 at dead centre
// (mirrors the depth falloff drawWater uses for its shading). Shared by
// the movement slowdown and drawGnome's waterline clipping so wading in
// looks exactly as deep as it plays.
function waterDepthAt(x,y){
  let best=0;
  for(const w of WATER_DEF){
    const ux=(x-w.x*WW)/(w.rx*WW), uy=(y-w.y*WH)/(w.ry*WH);
    const m=waterEdgeMul(w.wob, Math.atan2(uy,ux));
    const d=1-Math.hypot(ux,uy)/m;
    if(d>best) best=d;
  }
  return best;
}
