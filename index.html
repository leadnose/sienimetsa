// ── Pixel helpers ─────────────────────────────────────────────
function wpx(wx){ return (wx-cam.x)/PS|0; }
function wpy(wy){ return (wy-cam.y)/PS|0; }
function pr(x,y,w,h,c){
  if(w<=0||h<=0||x>=pixW||y>=pixH||x+w<=0||y+h<=0) return;
  pixCtx.fillStyle=c; pixCtx.fillRect(x,y,w,h);
}
function pixCircle(cx,cy,r,c){
  pixCtx.fillStyle=c;
  for(let dy=-r;dy<=r;dy++){
    const rw=Math.round(Math.sqrt(r*r-dy*dy));
    if(rw>0) pixCtx.fillRect(cx-rw,cy+dy,rw*2,1);
  }
}
function pixLine(x0,y0,x1,y1,t,c){
  const steps=Math.ceil(Math.hypot(x1-x0,y1-y0))||1;
  const h=t>>1;
  pixCtx.fillStyle=c;
  for(let i=0;i<=steps;i++){
    const f=i/steps;
    pixCtx.fillRect((x0+(x1-x0)*f|0)-h,(y0+(y1-y0)*f|0)-h,t,t);
  }
}

// ── Sprite rendering: ImageData + Bayer 4×4 dithering ────────
// All sprite builders write into a Uint8ClampedArray pixel buffer
// then call ctx.putImageData — giving per-pixel control and real
// ordered dithering at every color transition (the AoE2 look).
const BAYER4=[0,8,2,10,12,4,14,6,3,11,1,9,15,7,13,5];
function b4(x,y){return BAYER4[(y&3)*4+(x&3)];}
function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function mkPalRGB(a){return a.map(hex2rgb);}

// ── Tree species palettes (darkest→brightest) ─────────────────
const PAL_DECIDUOUS=mkPalRGB([
  '#040b02','#091508','#122010','#1d2e18',
  '#293c20','#354e2a','#426035','#507642',
  '#608e52','#72a464','#86bc78','#9cd08a', // light yellow-green (birch)
]);
const PAL_PINE=mkPalRGB([
  '#050c08','#0b1a12','#12261c','#1a3226',
  '#234030','#2d503c','#396248','#467454', // medium blue-green
]);
const PAL_SPRUCE=mkPalRGB([
  '#020709','#050f10','#0a1a18','#0f2420',
  '#152e28','#1c3a32','#24483e','#2c584a', // dark blue-green (darkest species)
]);
const PAL_FIR=mkPalRGB([
  '#060f04','#0e1e08','#172c0e','#233a16',
  '#2f4a20','#3c5e2c','#4a7238','#5a8644', // warm mid-green
]);
const PAL_SCOTS_CROWN=mkPalRGB([
  '#060e0c','#0e1e18','#172e24','#233c30',
  '#304e3e','#3e624c','#4d765c','#5d8a6c', // grey-green (scots pine)
]);
// Trunk / stem colour constants [R,G,B]
const CLR_TRUNK_BASE =[58,30,8];   // deciduous base/root
const CLR_TRUNK_LIT  =[126,80,34]; // deciduous trunk lit face
const CLR_TRUNK_SHAD =[74,44,16];  // deciduous trunk shadow face
const CLR_TRUNK_BARK =[46,24,8];   // deciduous bark marks
const CLR_SCOTS_LIT  =[122,74,30]; // scots pine trunk lit (orange)
const CLR_SCOTS_SHAD =[74,46,12];  // scots pine trunk shadow
const CLR_SCOTS_BARK =[44,24,8];   // scots pine bark marks
const CLR_SCOTS_BASE =[62,32,8];   // scots pine base flare
const CLR_PINE_STEM  =[20,36,12];  // spruce/pine thin stem lit
const CLR_PINE_SHAD  =[7,15,5];    // spruce/pine thin stem shadow

// Write one opaque pixel (bounds-checked)
function ibSet(buf,W,H,x,y,r,g,b){
  if(x<0||y<0||x>=W||y>=H)return;
  const p=4*(y*W+x);buf[p]=r;buf[p+1]=g;buf[p+2]=b;buf[p+3]=255;
}
// Fill a rectangle with one RGB colour
function ibRect(buf,W,H,x,y,w,h,rgb){
  for(let row=Math.max(0,y),re=y+h;row<Math.min(H,re);row++)
    for(let col=Math.max(0,x),ce=x+w;col<Math.min(W,ce);col++)
      ibSet(buf,W,H,col,row,...rgb);
}
// Semi-transparent shadow ellipse (written on empty/transparent pixels only)
function ibShadEllipse(buf,W,H,cx,cy,rx,ry){
  for(let dy=-ry;dy<=ry;dy++){
    const rw=Math.round(rx*Math.sqrt(Math.max(0,1-(dy/ry)**2)));
    for(let dx=-rw;dx<=rw;dx++){
      const px=cx+dx,py=cy+dy;
      if(px<0||py<0||px>=W||py>=H)continue;
      const p=4*(py*W+px); if(buf[p+3])continue;
      buf[p]=0;buf[p+1]=0;buf[p+2]=0;buf[p+3]=110;
    }
  }
}
// Per-pixel Bayer-dithered sphere. palRGB[0]=darkest, palRGB[n-1]=brightest.
// Light source: upper-left (-135°). Outer edge softened with dithered alpha.
function ibSphere(buf,W,H,cx,cy,sr,palRGB){
  if(sr<1||palRGB.length<2)return;
  const n=palRGB.length;
  for(let dy=-sr;dy<=sr;dy++){
    if(cy+dy<0||cy+dy>=H)continue;
    for(let dx=-sr;dx<=sr;dx++){
      if(cx+dx<0||cx+dx>=W)continue;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>sr+0.5)continue;
      const bt=b4(cx+dx,cy+dy);
      if(d>sr-0.5&&bt<9)continue;  // soft Bayer-dithered edge
      // Diffuse lighting: upper-left (-0.707,-0.707) + ambient 0.25
      const l=Math.max(0,(-dx-dy)/(sr*1.414));
      const shade=0.25+0.75*l;
      const fi=shade*(n-1);
      const i0=Math.min(n-2,fi|0);
      const pick=(fi-i0)*16>bt?i0+1:i0;
      ibSet(buf,W,H,cx+dx,cy+dy,...palRGB[pick]);
    }
  }
}
// Draw one Bayer-shaded horizontal row of a conifer tier.
// Left side bright (lit), right side dark (shadow), Bayer dithered throughout.
// Edge pixels beyond hw are dithered to create organic needle-tip silhouette.
function ibCRow(buf,W,H,cx,y,hw,palRGB){
  if(hw<1||palRGB.length<2)return;
  const n=palRGB.length,hiw=hw|0;
  for(let dx=-hiw;dx<=hiw;dx++){
    const t=Math.abs(dx)/Math.max(1,hw);
    const lit=dx<=0?0.45+t*0.40:0.45-t*0.36;  // left=bright, right=dark
    const fi=Math.max(0,Math.min(n-1-1e-4,lit*(n-1)));
    const i0=fi|0;
    const pick=(fi-i0)*16>b4(cx+dx,y)?i0+1:i0;
    ibSet(buf,W,H,cx+dx,y,...palRGB[pick]);
  }
  // Bayer fringe 1px beyond edge (lit left, shadow right)
  if(b4(cx-hiw-1,y)>9) ibSet(buf,W,H,cx-hiw-1,y,...palRGB[Math.min(n-1,(n*.68)|0)]);
  if(b4(cx+hiw+1,y)>11) ibSet(buf,W,H,cx+hiw+1,y,...palRGB[Math.max(0,(n*.18)|0)]);
}

// Adds ibSphere branch-tip lobes at each conifer tier's outer edge,
// breaking the perfect triangle silhouette with organic protrusions.
function addBranchTips(buf,W,H,cx,baseY,R,pal,rng){
  if(R<6) return;
  const nPairs=2+(rng()*2)|0;
  for(let b=0;b<nPairs;b++){
    for(const side of [-1,1]){
      const frac=0.15+rng()*.70;
      const bRow=(frac*R)|0;
      const edgeX=R*(1-bRow/R);
      const ext=R*(0.10+rng()*.14);
      const bx=(cx+side*(edgeX+ext))|0;
      const by=(baseY-bRow)|0;
      const br=Math.max(2,(R*(0.07+rng()*.07))|0);
      ibSphere(buf,W,H,bx,by,br,pal.slice(0,Math.max(2,(pal.length*.6)|0)));
    }
  }
}

// ── Deciduous oak/birch sprite ────────────────────────────────
// 4-layer lobe soup. Variant seeds RNG for distinct per-tree shapes.
function makeDecidSpr(r,variant=0){
  const W=(r*3+8)|0, H=(r*4+10)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W>>1), cy=H-3, cY=cy-(r*.68)|0;

  const palRGB=PAL_DECIDUOUS;

  const id=c.createImageData(W,H);
  const buf=id.data;

  ibShadEllipse(buf,W,H,cx+(r*.18)|0,cy+2,(r*.82)|0,(r*.26)|0);

  const rng=mkRng(r*8191+1009+variant*997);

  // Layer 1 — back/interior (darkest palette range)
  for(let i=0;i<8;i++){
    const a=rng()*Math.PI*2,d=rng()*r*.52;
    ibSphere(buf,W,H,(cx+Math.cos(a)*d)|0,(cY+Math.sin(a)*d*.85)|0,
      Math.max(4,(r*(0.28+rng()*.24))|0), palRGB.slice(0,5));
  }
  // Layer 2 — mid volume
  for(let i=0;i<14;i++){
    const a=rng()*Math.PI*2,d=rng()*r*.82;
    const lx=(cx+Math.cos(a)*d)|0,ly=(cY+Math.sin(a)*d*.88)|0;
    const isLit=(cx-lx)/r+(cY-ly)/r>.28;
    ibSphere(buf,W,H,lx,ly,
      Math.max(4,(r*(0.22+rng()*.26))|0), palRGB.slice(isLit?3:2,isLit?9:8));
  }
  // Layer 3 — outer ring: 60–108% radius variance → lumpy organic silhouette
  for(let i=0;i<22;i++){
    const a=(i/22)*Math.PI*2+(rng()-.5)*.6;
    const d=r*(0.60+rng()*.48);
    const lx=(cx+Math.cos(a)*d)|0,ly=(cY+Math.sin(a)*d*.88)|0;
    const isLit=(cx-lx)/r+(cY-ly)/r>.20;
    ibSphere(buf,W,H,lx,ly,
      Math.max(4,(r*(0.19+rng()*.18))|0), palRGB.slice(isLit?5:3,isLit?11:9));
    if(rng()>.45){
      const a2=a+(rng()-.5)*.5,d2=d*(0.78+rng()*.32);
      ibSphere(buf,W,H,(cx+Math.cos(a2)*d2)|0,(cY+Math.sin(a2)*d2*.88)|0,
        Math.max(3,(r*(0.13+rng()*.12))|0), palRGB.slice(isLit?4:2,isLit?9:7));
    }
  }
  // Layer 4 — upper-left highlights
  for(let i=0;i<7;i++){
    const a=-Math.PI*.75+(rng()-.5)*Math.PI;
    ibSphere(buf,W,H,
      (cx+Math.cos(a)*r*(0.10+rng()*.55))|0,
      (cY+Math.sin(a)*r*(0.10+rng()*.55)*.85)|0,
      Math.max(3,(r*(0.14+rng()*.14))|0), palRGB.slice(7));
  }

  // Trunk (drawn last so it appears on top)
  const tw=Math.max(2,(r*.16)|0),th=Math.max(4,(r*.65)|0);
  ibRect(buf,W,H,cx-tw-3,cy-4,4,6,CLR_TRUNK_BASE);
  ibRect(buf,W,H,cx+tw-1,cy-4,4,6,CLR_TRUNK_BASE);
  ibRect(buf,W,H,cx-tw,cy-th,tw,th,CLR_TRUNK_LIT);
  ibRect(buf,W,H,cx,cy-th,tw,th,CLR_TRUNK_SHAD);
  for(let by=3;by<th-2;by+=4){
    ibSet(buf,W,H,cx-tw+1,cy-th+by,...CLR_TRUNK_BARK);
    ibSet(buf,W,H,cx+1,cy-th+by,...CLR_TRUNK_BARK);
  }

  c.putImageData(id,0,0);
  return {cv,ox:cx,oy:cy};
}

// ── Norway pine sprite ────────────────────────────────────────
// 3 tiers of ibCRow + branch tips breaking the triangle silhouette.
function makePineSpr(r,variant=0){
  const W=(r*2+18)|0, H=(r*4+12)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W>>1), cy=H-3;
  const palRGB=PAL_PINE;
  const id=c.createImageData(W,H);
  const buf=id.data;
  ibShadEllipse(buf,W,H,cx,cy+1,(r*.58)|0,(r*.18)|0);
  const th=(r*.5)|0;
  ibRect(buf,W,H,cx-1,cy-th,2,th,CLR_PINE_STEM);
  ibRect(buf,W,H,cx,cy-th,1,th,CLR_PINE_SHAD);
  const R0=r, R1=(r*.70)|0, R2=(r*.44)|0;
  const b0=cy, b1=b0-R0, b2=b1-R1;
  const tiers=[
    {R:R0, baseY:b0, off:0},
    {R:R1, baseY:b1, off:1},
    {R:R2, baseY:b2, off:2},
  ];
  tiers.forEach(({R,baseY,off},ti)=>{
    if(R<3)return;
    const pal=palRGB.slice(off,off+6);
    for(let row=0;row<R;row++)
      ibCRow(buf,W,H,cx,baseY-row,R*(1-row/R),pal);
    for(let e=1;e<=3;e++)
      ibCRow(buf,W,H,cx,baseY+e,Math.max(1,R*(0.92-e*.18)),pal.slice(0,Math.max(2,5-e)));
    addBranchTips(buf,W,H,cx,baseY,R,pal,mkRng(r*1337+ti*97+variant*503));
  });
  const t2=tiers[2];
  ibSphere(buf,W,H,cx,(t2.baseY-t2.R-2)|0,Math.max(3,(r*.11)|0),palRGB.slice(4));
  c.putImageData(id,0,0);
  return {cv,ox:cx,oy:cy};
}

// ── Tall spruce sprite ────────────────────────────────────────
// 5 tiers, ibCRow + branch tips. Very dark blue-green palette.
function makeSpruSpr(r,variant=0){
  const W=(r*2+18)|0, H=(r*4+12)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W>>1), cy=H-3;
  const palRGB=PAL_SPRUCE;
  const id=c.createImageData(W,H);
  const buf=id.data;
  ibShadEllipse(buf,W,H,cx,cy+1,(r*.45)|0,(r*.14)|0);
  ibRect(buf,W,H,cx-1,cy-(r*.32)|0,2,(r*.32)|0,CLR_PINE_STEM);
  const R0=r, R1=(r*.76)|0, R2=(r*.57)|0, R3=(r*.40)|0, R4=(r*.24)|0;
  const b0=cy, b1=b0-R0, b2=b1-R1, b3=b2-R2, b4=b3-R3;
  const tiers=[
    {R:R0, baseY:b0, off:0},
    {R:R1, baseY:b1, off:1},
    {R:R2, baseY:b2, off:2},
    {R:R3, baseY:b3, off:3},
    {R:R4, baseY:b4, off:3},
  ];
  tiers.forEach(({R,baseY,off},ti)=>{
    if(R<2)return;
    const pal=palRGB.slice(off,off+5);
    for(let row=0;row<R;row++)
      ibCRow(buf,W,H,cx,baseY-row,R*(1-row/R),pal);
    for(let e=1;e<=2;e++)
      ibCRow(buf,W,H,cx,baseY+e,Math.max(1,R*(0.90-e*.20)),pal.slice(0,Math.max(2,4-e)));
    addBranchTips(buf,W,H,cx,baseY,R,pal,mkRng(r*1337+ti*97+variant*503));
  });
  const t4=tiers[4];
  for(let sk=0;sk<Math.max(3,(r*.30)|0);sk++) ibSet(buf,W,H,cx,(t4.baseY-t4.R-sk)|0,...palRGB[4]);
  c.putImageData(id,0,0);
  return {cv,ox:cx,oy:cy};
}

// ── Broad drooping fir sprite ─────────────────────────────────
// 3 wide tiers, heavy droop rows, branch tips. Warm mid-green palette.
function makeFirSpr(r,variant=0){
  const W=(r*2+20)|0, H=(r*3+14)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W>>1), cy=H-3;
  const palRGB=PAL_FIR;
  const id=c.createImageData(W,H);
  const buf=id.data;
  ibShadEllipse(buf,W,H,cx,cy+1,(r*.72)|0,(r*.22)|0);
  ibRect(buf,W,H,cx-1,cy-(r*.40)|0,2,(r*.40)|0,palRGB[1]);
  const tiers=[
    {R:r,          baseY:cy,             off:0},
    {R:(r*.82)|0,  baseY:(cy-r*.76)|0,   off:1},
    {R:(r*.60)|0,  baseY:(cy-r*1.56)|0,  off:2},
  ];
  tiers.forEach(({R,baseY,off},ti)=>{
    if(R<3)return;
    const pal=palRGB.slice(off,off+6);
    for(let row=0;row<R;row++)
      ibCRow(buf,W,H,cx,baseY-row,R*(1-row/R),pal);
    for(let e=1;e<=5;e++)
      ibCRow(buf,W,H,cx,baseY+e,Math.max(1,R*(0.95-e*.12)),pal.slice(0,Math.max(2,5-e)));
    addBranchTips(buf,W,H,cx,baseY,R,pal,mkRng(r*1337+ti*97+variant*503));
  });
  const t2=tiers[2];
  for(let sk=0;sk<Math.max(2,(r*.42)|0);sk++) ibSet(buf,W,H,cx,(t2.baseY-t2.R-sk)|0,...palRGB[5]);
  c.putImageData(id,0,0);
  return {cv,ox:cx,oy:cy};
}

// ── Scots pine sprite ─────────────────────────────────────────
// Tall orange trunk + umbrella crown. Variant adds extra crown lobes.
function makeScotsSpr(r,variant=0){
  const tH=(r*2.6)|0;
  const W=(r*3+10)|0, H=(tH+r*1.8+10)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W>>1), cy=H-3;
  const crownPal=PAL_SCOTS_CROWN;
  const id=c.createImageData(W,H);
  const buf=id.data;
  ibShadEllipse(buf,W,H,cx,cy+1,(r*.62)|0,(r*.18)|0);
  const tw=Math.max(2,(r*.20)|0);
  for(let row=0;row<tH;row++){
    const t=row/tH, w2=tw+(t<.15?(1-t/.15)*2|0:0);
    ibRect(buf,W,H,cx-w2,cy-row,w2,1,CLR_SCOTS_LIT);
    ibRect(buf,W,H,cx,cy-row,tw,1,CLR_SCOTS_SHAD);
  }
  for(let by=5;by<tH-5;by+=7){
    ibSet(buf,W,H,cx-tw+1,cy-by,...CLR_SCOTS_BARK);
    ibSet(buf,W,H,cx+1,cy-by,...CLR_SCOTS_BARK);
  }
  ibRect(buf,W,H,cx-tw-2,cy-5,4,6,CLR_SCOTS_BASE);
  ibRect(buf,W,H,cx+tw-1,cy-5,4,6,CLR_SCOTS_BASE);
  // Umbrella crown: 3 base lobes + variant-driven extras
  const crownY=(cy-tH-(r*.25))|0;
  const crng=mkRng(r*4217+variant*881);
  const lobes=[
    {lx:cx-(r*.52)|0, ly:crownY,           sr:(r*.62)|0},
    {lx:cx+(r*.52)|0, ly:crownY,           sr:(r*.62)|0},
    {lx:cx,           ly:crownY-(r*.10)|0, sr:(r*.52)|0},
  ];
  for(let i=0;i<2+((crng()*3)|0);i++){
    const a=crng()*Math.PI*2, d=r*(0.20+crng()*.50);
    lobes.push({lx:(cx+Math.cos(a)*d)|0,ly:(crownY+Math.sin(a)*d*.55)|0,
                sr:Math.max(4,(r*(0.32+crng()*.22))|0)});
  }
  lobes.forEach(({lx,ly,sr})=>ibSphere(buf,W,H,lx,ly,sr,crownPal));
  c.putImageData(id,0,0);
  return {cv,ox:cx,oy:cy};
}

// ── Shrub sprite ──────────────────────────────────────────────
// Pure ibSphere lobe soup — no base fill. Fibonacci spiral placement.
function makeShrubSpr(r){
  const W=(r*3+6)|0, H=(r*2+6)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W>>1), cy=H-2;
  const palRGB=mkPalRGB(['#0a1606','#121e0c','#1c2e12','#26401a','#305020','#3a6028','#466e30','#527c38']);
  const id=c.createImageData(W,H);
  const buf=id.data;
  ibShadEllipse(buf,W,H,cx,cy+1,(r*.82)|0,(r*.24)|0,90);
  const rng=mkRng(r*3571+7);
  const cY=cy-(r*.70)|0;
  // Interior back clusters
  for(let i=0;i<5;i++){
    const a=rng()*Math.PI*2,d=rng()*r*.45;
    ibSphere(buf,W,H,(cx+Math.cos(a)*d)|0,(cY+Math.sin(a)*d*.80)|0,
      Math.max(3,(r*(0.22+rng()*.18))|0), palRGB.slice(0,5));
  }
  // Main Fibonacci-spiral lobes
  for(let i=0;i<16;i++){
    const a=i*1.618*Math.PI*2+rng()*.5;
    const dist=r*(0.1+rng()*.72);
    const lx=cx+Math.cos(a)*dist, ly=cY+Math.sin(a)*dist*.80;
    const isLit=(-Math.cos(a)-Math.sin(a))>.38;
    ibSphere(buf,W,H,lx|0,ly|0,
      Math.max(3,(r*(0.20+rng()*.22))|0), palRGB.slice(isLit?3:1,isLit?8:6));
  }
  // Top highlights
  for(let i=0;i<4;i++){
    const a=-Math.PI*.75+(rng()-.5)*Math.PI*.8;
    const d=r*(0.1+rng()*.45);
    ibSphere(buf,W,H,(cx+Math.cos(a)*d)|0,(cY+Math.sin(a)*d*.75)|0,
      Math.max(3,(r*(0.16+rng()*.12))|0), palRGB.slice(5));
  }
  c.putImageData(id,0,0);
  return {cv,ox:cx,oy:cy};
}

// ── Sprite lazy cache ─────────────────────────────────────────
function getTreeSpr(type,r,variant=0){
  const rr=Math.max(4,Math.round(r/4)*4);
  const key=type+'_'+rr+'_'+variant;
  if(!SP[key]) SP[key]=
    type===TR_DECIDUOUS?makeDecidSpr(rr,variant):
    type===TR_PINE     ?makePineSpr(rr,variant):
    type===TR_SPRUCE   ?makeSpruSpr(rr,variant):
    type===TR_FIR      ?makeFirSpr(rr,variant):
                        makeScotsSpr(rr,variant);
  return SP[key];
}
function getShrubSpr(r){
  const rr=Math.max(3,Math.round(r/3)*3);
  const key='s'+rr;
  if(!SP[key]) SP[key]=makeShrubSpr(rr);
  return SP[key];
}

// ── Ground ────────────────────────────────────────────────────
// Grass: 6-shade palette, Bayer-dithered world-space noise.
// Stones: 1% of pixels tinted grey-brown (AoE2 ground texture feel).
// Patches: drawn with dithered edges into same ImageData buffer.
function drawGround(){
  const id=pixCtx.createImageData(pixW,pixH);
  const buf=id.data;
  const cpx=(cam.x/PS)|0, cpy=(cam.y/PS)|0;
  // Precompute for zone lookup in normalized world coords
  const wxBase=cam.x/WW, wyBase=cam.y/WH;
  const wxStep=PS/WW,    wyStep=PS/WH;

  // indexed by T_GRASS / T_SAND / T_MARSH / T_ROCK / T_GRAVEL
  const TPAL=[
    /* T_GRASS  */ {pal:[[38,68,16],[47,80,20],[56,90,22],[66,104,28],[76,116,34],[88,130,40]],
                   sc:[[74,62,44],[90,76,56],[62,52,36]], scr:10},
    /* T_SAND   */ {pal:[[168,144,76],[180,156,88],[192,167,100],[204,178,112],[218,192,124]],
                   sc:[[144,120,60],[158,132,70],[132,108,50]], scr:8},
    /* T_MARSH  */ {pal:[[28,46,14],[34,54,16],[40,62,18],[46,70,22],[36,52,28]],
                   sc:[[44,72,88],[38,60,76],[52,84,100]], scr:22},
    /* T_ROCK   */ {pal:[[82,78,70],[94,90,80],[108,102,90],[120,114,100],[132,126,112]],
                   sc:[[56,52,46],[48,44,40],[64,60,54]], scr:34},
    /* T_GRAVEL */ {pal:[[106,94,70],[118,106,80],[130,116,88],[142,126,96],[154,136,104]],
                   sc:[[86,74,54],[94,82,60],[78,66,48]], scr:20},
  ];

  for(let py=0;py<pixH;py++){
    const wyf=wyBase+py*wyStep;
    for(let px=0;px<pixW;px++){
      const wx=cpx+px, wy=cpy+py;
      const wxf=wxBase+px*wxStep;
      const h1=((wx*17)^(wy*31))&0xff;
      const h2=((wx*41)^(wy*19))&0xff;
      const h3=((wx*7 )^(wy*53))&0xff;
      const p=4*(py*pixW+px);
      const bv=b4(wx,wy);

      // Find dominant terrain zone
      let bestInf=0, bestType=T_GRASS;
      for(let zi=0;zi<TERRAIN_ZONES.length;zi++){
        const z=TERRAIN_ZONES[zi];
        const ddx=(wxf-z.x)/z.rx, ddy=(wyf-z.y)/z.ry;
        const d2=ddx*ddx+ddy*ddy;
        if(d2>=1) continue;
        const inf=1-Math.sqrt(d2);
        if(inf>bestInf){bestInf=inf;bestType=z.t;}
      }
      // Bayer-dither transition between grass and zone
      const tp=bv<bestInf*16?bestType:0;
      const td=TPAL[tp];

      // Scatter pixels (stones / puddles / cracks / pebbles)
      if((h1^h2^h3)<td.scr){
        const sc=td.sc[h3%td.sc.length];
        buf[p]=sc[0];buf[p+1]=sc[1];buf[p+2]=sc[2];buf[p+3]=255;
        continue;
      }
      // Base shade via Bayer-dithered noise
      const noise=(h1*140+h2*80+h3*35)>>8;
      const n=td.pal.length;
      const fi=noise*(n-1)/199;
      const i0=Math.min(n-2,fi|0);
      const pick=(fi-i0)*16>bv?i0+1:i0;
      const g=td.pal[pick];
      buf[p]=g[0];buf[p+1]=g[1];buf[p+2]=g[2];buf[p+3]=255;
    }
  }

  // Dark and light patches dithered into buffer
  PATCHES.forEach(patch=>{
    const sx=wpx(patch.x*WW), sy=wpy(patch.y*WH);
    const sw=Math.max(1,patch.w*WW/PS|0), sh=Math.max(1,patch.h*WH/PS|0);
    const pPal=patch.d?[[32,50,10],[42,64,14]]:[[84,124,36],[96,140,42]];
    for(let row=sy;row<sy+sh;row++){
      for(let col=sx;col<sx+sw;col++){
        if(col<0||row<0||col>=pixW||row>=pixH)continue;
        // Dithered edge: 4px fade zone
        const edgeX=Math.min(col-sx,sx+sw-1-col);
        const edgeY=Math.min(row-sy,sy+sh-1-row);
        const edge=Math.min(edgeX,edgeY);
        if(edge<4&&b4(col+cpx,row+cpy)>edge*4)continue;
        const pick=b4(col+cpx,row+cpy)>8?1:0;
        const c=pPal[pick];
        const pp=4*(row*pixW+col);
        buf[pp]=c[0];buf[pp+1]=c[1];buf[pp+2]=c[2];buf[pp+3]=255;
      }
    }
  });

  pixCtx.putImageData(id,0,0);

  // Flowers (on top of base)
  FLOWERS.forEach(f=>{
    const sx=wpx(f.x*WW), sy=wpy(f.y*WH);
    if(sx<-2||sx>pixW+2||sy<-2||sy>pixH+2) return;
    pr(sx,sy-1,1,1,f.c); pr(sx-1,sy,1,1,f.c);
    pr(sx,sy,1,1,'#d8c840');
    pr(sx+1,sy,1,1,f.c);  pr(sx,sy+1,1,1,f.c);
  });
}

// ── Paths ─────────────────────────────────────────────────────
// Worn ground, not painted lines. We read back the rendered ground and stamp
// each trail segment into it: the half-width wobbles via world-space noise,
// the colour is Bayer-dithered among a small earth palette, and the outer
// 2–3px are stippled (kept-grass dither) so the trail dissolves into the
// terrain instead of sitting on top of it — the same look as the ground
// itself. Tier 0 packed dirt w/ pebbles · tier 1 trampled · tier 2 faint
// foot/deer trail; dead-ends fade away over their final stretch.
const PATH_CFG=[
  /* tier0 */ {hw:5.6, edge:2.6, pal:[[70,57,33],[92,75,44],[118,99,60],[150,128,82]], pebble:true},
  /* tier1 */ {hw:3.4, edge:2.2, pal:[[64,53,31],[86,71,42],[110,92,55]],              pebble:false},
  /* tier2 */ {hw:1.7, edge:1.8, pal:[[63,72,37],[80,90,48],[55,64,32]],               pebble:false, faint:true},
];
function drawPaths(){
  if(!PATHS.length) return;
  const id=pixCtx.getImageData(0,0,pixW,pixH), buf=id.data;
  const cpx=(cam.x/PS)|0, cpy=(cam.y/PS)|0;
  for(const path of PATHS){
    const cfg=PATH_CFG[path.tier], pts=path.pts, n=pts.length;
    for(let i=0;i<n-1;i++){
      const x0=wpx(pts[i].x*WW),   y0=wpy(pts[i].y*WH);
      const x1=wpx(pts[i+1].x*WW), y1=wpy(pts[i+1].y*WH);
      const reach=cfg.hw*1.3+cfg.edge;
      if((x0<-reach&&x1<-reach)||(x0>pixW+reach&&x1>pixW+reach)||
         (y0<-reach&&y1<-reach)||(y0>pixH+reach&&y1>pixH+reach)) continue;
      // faint dead-end twigs thin out and dissolve over their final ~60%
      const fade=(path.deadEnd&&path.tier===2)?Math.max(0,1-Math.max(0,(i/(n-1)-0.40))/0.60):1;
      if(fade<=0.03) continue;
      stampPath(buf,cpx,cpy,x0,y0,x1,y1,cfg,fade);
    }
  }
  pixCtx.putImageData(id,0,0);
}
function stampPath(buf,cpx,cpy,x0,y0,x1,y1,cfg,fade){
  const reachMax=cfg.hw*1.3+cfg.edge;
  const minx=Math.max(0,(Math.min(x0,x1)-reachMax)|0), maxx=Math.min(pixW-1,(Math.max(x0,x1)+reachMax)|0);
  const miny=Math.max(0,(Math.min(y0,y1)-reachMax)|0), maxy=Math.min(pixH-1,(Math.max(y0,y1)+reachMax)|0);
  if(minx>maxx||miny>maxy) return;
  const dx=x1-x0, dy=y1-y0, ll=dx*dx+dy*dy||1, np=cfg.pal.length;
  for(let py=miny;py<=maxy;py++){
    for(let px=minx;px<=maxx;px++){
      let t=((px-x0)*dx+(py-y0)*dy)/ll; t=t<0?0:t>1?1:t;
      const ex=px-(x0+dx*t), ey=py-(y0+dy*t), d=Math.sqrt(ex*ex+ey*ey);
      const wx=px+cpx, wy=py+cpy;                       // world-pixel coords (stable while scrolling)
      const h1=((wx*23)^(wy*47))&0xff, h2=((wx*61)^(wy*13))&0xff;
      const hw=cfg.hw*(0.70+(h1/255)*0.60);             // organic wobble of the edge
      const reach=hw*fade+cfg.edge;
      if(d>reach) continue;
      const bv=b4(wx,wy);
      if(cfg.faint && ((wx+wy)&3)===0) continue;        // faint trails are broken/dotted
      if(d>hw*fade){                                     // outer band → stipple into ground
        const a=(reach-d)/cfg.edge;
        if(bv/16>a) continue;
      } else if(fade<1 && bv/16>fade) continue;          // dead-end core also dissolves
      const ni=h2*(np-1)/255; let i0=ni|0; if(i0>np-2)i0=np-2;
      let c=cfg.pal[(ni-i0)*16>bv?i0+1:i0];
      if(cfg.pebble && d<hw*0.75 && h1<9) c=h2<128?[176,154,112]:[58,47,27]; // pebbles/dark flecks
      const p=4*(py*pixW+px);
      buf[p]=c[0]; buf[p+1]=c[1]; buf[p+2]=c[2]; buf[p+3]=255;
    }
  }
}

// ── Rivers ────────────────────────────────────────────────────
// Per-pixel pass over the dense centreline (same idiom as stampPath /
// drawWater): each pixel near the river takes its colour from how far
// past the local waterline it sits — water depth-shaded with Bayer
// dithering toward a bright midstream, then a short earth bank band.
// The old renderer stamped bank+water rings per straight segment, so
// every joint had the next segment's bank painted across the previous
// segment's water; here overlapping stretches min-combine their offsets
// in RIV_OFF, so joints and hairpin bends stay seamless.
let RIV_OFF=null;
function drawRivers(){
  if(!RIVERS.length) return;
  const npx=pixW*pixH;
  if(!RIV_OFF||RIV_OFF.length<npx) RIV_OFF=new Float32Array(npx);
  RIV_OFF.fill(1e9);
  const id=pixCtx.getImageData(0,0,pixW,pixH), buf=id.data;
  const cpx=(cam.x/PS)|0, cpy=(cam.y/PS)|0;
  const HW=5.5, BANK=5; // base water halfwidth / bank band width, px
  const wtick=Math.floor(gameTime*2); // matches drawWater's wave-stripe tick
  // Same ramps as the lakes (drawWater's wPal/shoreCols) minus the deepest
  // water step — rivers are shallow — so a river reads as the same water
  // where it meets a lake, not a differently-tinted stream. The bank band
  // is the lake shore ramp verbatim (same 5 colours, same 1px-per-step
  // width) so at a confluence the two shorelines can merge into one
  // continuous band (drawWater min-combines against RIV_OFF).
  const wPal=[[14,52,88],[22,78,128],[34,104,160],[52,132,190]];
  const bankCols=[[92,64,16],[122,92,24],[160,120,40],[184,144,48],[204,168,64]];
  for(const rv of RIVERS){
    const smp=rv.smp, nSeg=smp.length-1;
    for(let i=0;i<nSeg;i++){
      const x0=wpx(smp[i].x*WW), y0=wpy(smp[i].y*WH);
      const x1=wpx(smp[i+1].x*WW), y1=wpy(smp[i+1].y*WH);
      const hw0=HW*smp[i].m, hw1=HW*smp[i+1].m;
      // Inside the lake the current fans out into a plume, so segments
      // near/inside the lake need extra lateral reach recorded in RIV_OFF
      // (drawWater dithers the plume against lake water out to this cone).
      let extra=0;
      if(rv.lake){
        const w=rv.lake;
        const ux=(smp[i].x-w.x)/w.rx, uy=(smp[i].y-w.y)/w.ry;
        if(Math.hypot(ux,uy)/waterEdgeMul(w.wob,Math.atan2(uy,ux))<1.2) extra=32;
      }
      const reach=Math.max(hw0,hw1)+BANK+extra;
      const minx=Math.max(0,(Math.min(x0,x1)-reach)|0), maxx=Math.min(pixW-1,Math.ceil(Math.max(x0,x1)+reach));
      const miny=Math.max(0,(Math.min(y0,y1)-reach)|0), maxy=Math.min(pixH-1,Math.ceil(Math.max(y0,y1)+reach));
      if(minx>maxx||miny>maxy) continue;
      const dx=x1-x0, dy=y1-y0, ll=dx*dx+dy*dy||1;
      for(let py=miny;py<=maxy;py++){
        for(let px=minx;px<=maxx;px++){
          let t=((px-x0)*dx+(py-y0)*dy)/ll; t=t<0?0:t>1?1:t;
          const ex=px-(x0+dx*t), ey=py-(y0+dy*t), d=Math.sqrt(ex*ex+ey*ey);
          const hw=hw0+(hw1-hw0)*t, off=d-hw;
          if(off>BANK+extra) continue;
          const bi=py*pixW+px;
          if(off>=RIV_OFF[bi]) continue; // a nearer stretch already painted this pixel
          // Lake-normalized radius of this pixel (<1 = inside the lake) —
          // drives both the mouth colour blend and the plume fan-out.
          let lr=1e9;
          if(rv.lake){
            const w=rv.lake;
            const ux=((px+cpx)*PS/WW-w.x)/w.rx, uy=((py+cpy)*PS/WH-w.y)/w.ry;
            lr=Math.hypot(ux,uy)/waterEdgeMul(w.wob,Math.atan2(uy,ux));
          }
          const inLake=lr<1;
          if(off>BANK&&!inLake) continue; // plume margin exists only inside the lake
          RIV_OFF[bi]=off;
          let c;
          if(off<=0||inLake){
            // Inside the lake there are no banks — everything out to the
            // plume cone is water (negative shade just clamps to the
            // darkest step). The mouth blend: approaching the shore, damp
            // the river's brightness toward the lake's near-zero edge
            // shade and mix in the lake's diagonal wave stripes so colour
            // and texture flow across the junction. Keyed to the pixel's
            // distance to the wobbly shoreline, NOT river-t (the
            // centreline ends at the lake's centre, so a t-based fade
            // finishes deep inside the pond where it's never seen).
            // Capped below 1 so the stretch dithered into the lake still
            // reads as a slightly brighter current.
            let shade=(1-d/hw)*3.2;
            const f=Math.max(0,Math.min(0.7,(1.55-lr)/0.55));
            if(f>0) shade=shade*(1-0.88*f)+(((px-py+wtick)&7)<2?0.8*f:0);
            shade=Math.min(wPal.length-1-1e-4,shade);
            const i0=Math.max(0,shade|0);
            c=wPal[(shade-i0)*16>b4(px+cpx,py+cpy)?i0+1:i0];
          } else {
            c=bankCols[Math.min(4,off|0)]; // same pick as the lake shore
          }
          const p=4*bi;
          buf[p]=c[0];buf[p+1]=c[1];buf[p+2]=c[2];buf[p+3]=255;
        }
      }
    }
  }
  pixCtx.putImageData(id,0,0);
  // Flow dots drifting downstream along the centreline
  const tick=Math.floor(gameTime*5);
  RIVERS.forEach(rv=>{
    const smp=rv.smp, n=smp.length;
    for(let d=0;d<Math.max(2,n>>4);d++){
      // JS % keeps the dividend's sign and tick can be briefly negative
      // (first-frame dt can be negative under timestamp quantization), so
      // force the index into [0,n) or smp[-1] crashes the render loop.
      const si=(((d*16+tick)%n)+n)%n, s=smp[si];
      if(s.m<0.45) continue; // no sparkle on a dwindling trickle
      if(rv.toLake&&si/n>0.82) continue; // nor on the darkened mouth stretch
      const fx=wpx(s.x*WW), fy=wpy(s.y*WH);
      if(fx<0||fx>pixW||fy<0||fy>pixH) continue;
      pr(fx,fy,2,1,'#70c8f0');
      pr(fx-1,fy+1,1,1,'#a8e0ff');
    }
  });
}

// ── Water bodies ─────────────────────────────────────────────
// Shore: 5-ring gradient (bright sand → wet sand → silt → shallow → deep).
// Water: depth-gradient fill + diagonal Bayer-dithered wave pattern.
// Animated highlights as short bright dashes in upper quadrant.
function drawWater(w,wi){
  const cx=wpx(w.x*WW), cy=wpy(w.y*WH);
  const rx=Math.max(3,(w.rx*WW/PS)|0), ry=Math.max(3,(w.ry*WH/PS)|0);
  const SHORE=5; // widest shore band, in px, beyond the wobbly shoreline
  // Wobble can push the true shore out past the base rx/ry by its combined
  // amplitude (e.g. ~18% of the radius) — for a large pond that's far more
  // than a few pixels, so the render/cull bounds must grow with rx/ry, not
  // just by a flat SHORE margin, or the far side of a bulge gets clipped
  // to a hard rectangular edge.
  const wobMax=1+w.wob.reduce((s,h)=>s+h.a,0);
  // Must be integers: bx0/by0/bw/bh below derive from these, and the
  // per-pixel fill loop indexes the ImageData buffer using bw as an
  // integer row stride. A fractional mrx/mry made bx0 fractional, which
  // getImageData silently truncates to integer pixels while the fill loop
  // kept using the fractional bw as its stride — every row past the first
  // computed a non-integer typed-array index, which silently no-ops on
  // write, so only a 1px sliver at the top of the pond ever got painted.
  const mrx=Math.ceil(rx*wobMax), mry=Math.ceil(ry*wobMax);
  if(cx+mrx+SHORE<0||cx-mrx-SHORE>pixW||cy+mry+SHORE<0||cy-mry-SHORE>pixH) return;

  // Shore bands (dark silt → dry sand) and the water body are rendered
  // together in one per-pixel pass into a local ImageData region: each
  // pixel's offset from the pond centre is checked against the wobbly
  // shoreline radius at that angle (waterEdgeMul), so the bands and the
  // water's own depth shading both follow the pond's irregular outline
  // instead of a plain ellipse. The angle→radius curve is precomputed into
  // a small lookup table once per call so the hot per-pixel loop only pays
  // for one atan2 + array read, not three sines per pixel.
  //
  // Converting "normalized radius past the shore" into an actual pixel
  // band width needs a direction-dependent scale, not one constant: at an
  // elongated pond's pointed ends a unit of normalized radius covers far
  // more screen pixels than at its waist, and wherever the wobble radius
  // changes quickly with angle the shoreline's outward normal tilts away
  // from radial too. Ignoring either made bands compress to sub-pixel
  // width and vanish along parts of the shore, so pxScaleLUT is the true
  // local scale (1/|∇f|, f = normalized radius minus wobbly edge radius)
  // for each angle bucket, keeping the band ~SHORE px wide all the way
  // around however the shoreline bends.
  const LUT_N=48, edgeLUT=new Float32Array(LUT_N), pxScaleLUT=new Float32Array(LUT_N);
  for(let i=0;i<LUT_N;i++){
    const ang=-Math.PI+(i+0.5)*(2*Math.PI/LUT_N);
    const m=waterEdgeMul(w.wob,ang), mp=waterEdgeSlope(w.wob,ang), k=mp/m;
    edgeLUT[i]=m;
    const ct=Math.cos(ang), st=Math.sin(ang);
    const gx=(ct+k*st)/rx, gy=(st-k*ct)/ry;
    pxScaleLUT[i]=1/Math.sqrt(gx*gx+gy*gy);
  }
  // Bucket i stores the value at its center angle, so sampling at a bucket's
  // own center should return that bucket's value exactly (f=0) — hence the
  // -0.5 below. Without interpolation, medge/pxScale jump abruptly at each
  // bucket boundary, which reads as small stair-step notches around the
  // shoreline instead of a smooth curve.
  const lutSample=(arr,ang)=>{
    const t=(ang+Math.PI)*(LUT_N/(2*Math.PI))-0.5;
    let i0=Math.floor(t);
    const f=t-i0;
    i0=((i0%LUT_N)+LUT_N)%LUT_N;
    const i1=(i0+1)%LUT_N;
    return arr[i0]+(arr[i1]-arr[i0])*f;
  };
  const edgeAt=(ang)=>lutSample(edgeLUT,ang);

  // Shore band colours, closest to farthest from the true shoreline
  const shoreCols=[[92,64,16],[122,92,24],[160,120,40],[184,144,48],[204,168,64]];
  const tick=Math.floor(gameTime*2);
  const cpx=(cam.x/PS)|0, cpy=(cam.y/PS)|0;
  const bx0=Math.max(0,cx-mrx-SHORE), bx1=Math.min(pixW,cx+mrx+SHORE+1);
  const by0=Math.max(0,cy-mry-SHORE), by1=Math.min(pixH,cy+mry+SHORE+1);
  const bw=bx1-bx0, bh=by1-by0;
  if(bw>0&&bh>0){
    const wid=pixCtx.getImageData(bx0,by0,bw,bh);
    const wb=wid.data;
    // Depth palette: very deep → bright surface (precomputed RGB)
    const wPal=[[10,32,60],[14,52,88],[22,78,128],[34,104,160],[52,132,190]];
    // River inflow plumes: a wide fan of brightened water around each
    // recorded river mouth, fading out radially (dm/R past 1 → no boost)
    const mouths=(w.mouths||[]).map(mo=>({mx:wpx(mo.x*WW),my:wpy(mo.y*WH),R:mo.m*26}));
    for(let row=0;row<bh;row++){
      const py=by0+row, dy=py-cy, v=dy/ry;
      for(let col=0;col<bw;col++){
        const px=bx0+col, dx=px-cx, u=dx/rx;
        const r0=Math.hypot(u,v);
        const ang=Math.atan2(v,u);
        const medge=lutSample(edgeLUT,ang);
        const offPx=(r0-medge)*lutSample(pxScaleLUT,ang);
        // Confluence: RIV_OFF holds this pixel's offset past the river's
        // waterline (drawRivers runs first; <=0 is open water — keep the
        // channel clear). Instead of a hard min of the two shore-distance
        // fields (which leaves an angular notch where the channel's edge
        // crosses the shoreline), blend them with a smooth-min: near the
        // junction the combined waterline bows outward, rounding the
        // corners, and the shared 5-colour band follows the rounded curve.
        const roff=RIV_OFF?RIV_OFF[py*pixW+px]:1e9;
        // Open river channel beyond the shoreline: the river's ramp lacks
        // the lake's darkest edge colour, so a hard handoff reads as a
        // line across the water. Instead, over the channel's last ~6px,
        // dither pond edge-water pixels into the river (Bayer-ordered,
        // like every other transition in the art) so the palettes
        // cross-fade pixel by pixel.
        let mouthDither=false;
        // The current's footprint: the channel itself (roff<=0), plus —
        // inside the lake — a plume cone whose lateral extent grows with
        // depth past the shoreline (like a real inflow fanning out).
        const plumeLat=offPx<0?-offPx*1.6:0;
        if(roff<=0||(roff<1e8&&roff<=plumeLat)){
          // One dithered cross-fade spanning the shoreline: pure river
          // ~6px outside, half-and-half at the shore, fully lake ~20px
          // inside; plume flanks also fade toward the cone's edge.
          let q=offPx>0?(6-offPx)/12:0.5-offPx/40;   // "pondness" of this pixel
          if(roff>0) q=Math.max(q,roff/plumeLat);
          if(q*16<=b4(px+cpx+2,py+cpy+1)) continue;  // river pixel survives
          if(offPx>0) mouthDither=true;              // else paint pond water here
        }
        let co=offPx;
        if(roff>0&&roff<1e8){
          const k=6, h=Math.max(0,Math.min(1,.5+.5*(roff-offPx)/k));
          co=roff*(1-h)+offPx*h-k*h*(1-h);
        }
        let c;
        if(offPx<=0||co<=0||mouthDither){
          const depth=1-r0/medge; // negative in the rounded notch → clamps to edge shade
          const wave=(px-py+tick)&7;
          let shade=depth*3.5+((wave<2)?0.8:0);
          for(const mo of mouths){
            const boost=2.6*(1-Math.hypot(px-mo.mx,py-mo.my)/mo.R);
            if(boost>shade) shade=boost;
          }
          shade=Math.max(0,Math.min(wPal.length-1-1e-4,shade));
          const i0=shade|0;
          const pick=(shade-i0)*16>b4(px+cpx,py+cpy)?i0+1:i0;
          c=wPal[pick];
        } else if(co<=5){
          c=shoreCols[Math.min(4,co|0)];
        } else continue;
        const bp=4*(row*bw+col);
        wb[bp]=c[0];wb[bp+1]=c[1];wb[bp+2]=c[2];wb[bp+3]=255;
      }
    }
    pixCtx.putImageData(wid,bx0,by0);
  }

  // Animated wave highlights: short bright dashes, upper half only
  const htick=Math.floor(gameTime*3);
  const wRng=mkRng(wi*137+htick*41);
  for(let i=0;i<Math.max(3,rx>>2);i++){
    const ha=wRng()*Math.PI*2-Math.PI;  // full circle
    // Scale by the true wobbly edge distance at this angle (not just rx),
    // or a dash can land past the shore wherever the wobble pinches inward.
    const hr=edgeAt(ha)*(0.20+wRng()*.65);
    const hx=(cx+Math.cos(ha)*hr*rx)|0, hy=(cy+Math.sin(ha)*hr*ry)|0;
    const hw=Math.max(2,2+(wRng()*4)|0);
    pr(hx,hy,hw,1,'#70c8f0');
    pr(hx+1,hy-1,hw-1,1,'#a8e0ff');
  }
  // Strong glint upper-left
  pr((cx-rx*.35)|0,(cy-ry*.38)|0,4,1,'#c0ecff');
  pr((cx-rx*.28)|0,(cy-ry*.30)|0,2,1,'#ffffff');

  // Lily pads on smaller ponds
  if(rx<pixW*.08){
    const lr=mkRng(wi*71+13);
    const nL=2+Math.floor(lr()*3);
    for(let i=0;i<nL;i++){
      const la=lr()*Math.PI*2, ld=lr()*(rx*.6);
      const lx=(cx+Math.cos(la)*ld)|0, ly=(cy+Math.sin(la)*ld*.7)|0;
      const ls=Math.max(2,(rx*.20+lr()*rx*.12)|0);
      pr(lx-ls,ly-(ls*.5)|0,ls*2,ls,'#162c08');
      pr(lx-ls+1,ly-(ls*.5)|0+1,ls*2-2,Math.max(1,ls-2),'#234a12');
      pr(lx,ly-(ls*.5)|0,1,(ls*.5)|0,'#185880');
      if(lr()>.5){ pr(lx-1,ly-(ls*.5)|0-1,3,2,'#f8d0e0'); pr(lx,ly-(ls*.5)|0-2,1,1,'#ffd020'); }
    }
    // Reeds
    const nr=mkRng(wi*53+7);
    for(let i=0;i<4;i++){
      const ra=nr()*Math.PI*2, rd=rx*edgeAt(ra)*(0.82+nr()*.16);
      const bx=(cx+Math.cos(ra)*rd)|0, bby=(cy+Math.sin(ra)*rd*.7)|0;
      const rh=Math.max(3,(rx*.65+nr()*rx*.45)|0);
      pixLine(bx,bby,bx+(nr()-.5)*2|0,bby-rh,1,'#8a6820');
      pr(bx-1,bby-rh-1,2,3,'#3e1a08');
    }
  }
}
function drawWaters(){ WATER_DEF.forEach((w,i)=>drawWater(w,i)); }

// ── Mountains ─────────────────────────────────────────────────
// A mountain is 2-4 overlapping rounded sub-peaks (same idea as trees
// compositing several ibSphere lobes) so the ridge reads as a connected
// rocky massif with a jagged skyline, not one smooth parabola. Rock is
// shaded per-pixel — elevation + upper-left diffuse light + coarse-sampled
// hash noise — picked from one continuous palette with Bayer dithering.
// Coarse-sampling the noise (every ~4px) gives blotchy mineral grain
// instead of the fine 4x4 Bayer tile reading as a visible checkerboard.
// A wide scree skirt below the jagged foot line thins into transparency so
// the rock dissolves into the ground instead of sitting on a shadow bar.
const PAL_ROCK=mkPalRGB([
  '#241a12','#332419','#422e20','#523c28','#624a32','#755a3f',
  '#8a6c4d','#a0805d','#b6966f','#cbac83','#dcc199','#ecd6b0',
]);
const PAL_SNOW=mkPalRGB(['#8a9088','#b2b8ae','#d2d6ca','#e8e8dc','#f8f6ec']);

function makeHillPeaks(seed,w,h,nPeaks){
  const rng=mkRng(seed);
  const peaks=[];
  for(let i=0;i<nPeaks;i++){
    const frac=(i+0.5)/nPeaks+(rng()-.5)*0.4/nPeaks;
    const px=(frac*2-1)*w*0.55;
    const ph=h*(0.68+rng()*0.32);
    const pr=w*0.62*(0.85+rng()*0.4);
    peaks.push({px,ph,pr});
  }
  return peaks;
}
// Fine piecewise-linear ridge jitter (row units) layered on top of the peaks.
function makeFineFn(seed,h){
  const rng=mkRng(seed);
  const n=22;
  const pts=[]; for(let i=0;i<=n;i++) pts.push((rng()-.5)*h*0.09);
  return u=>{
    const uu=u*n, i0=Math.max(0,Math.min(n-1,uu|0)), f=uu-i0;
    return pts[i0]*(1-f)+pts[i0+1]*f;
  };
}
// Per-column foot-line jitter (row units) for an irregular ground contact.
function makeBaseFn(seed,h){
  const rng=mkRng(seed);
  const n=16;
  const pts=[]; for(let i=0;i<=n;i++) pts.push(rng()*h*0.045);
  return u=>{
    const uu=u*n, i0=Math.max(0,Math.min(n-1,uu|0)), f=uu-i0;
    return pts[i0]*(1-f)+pts[i0+1]*f;
  };
}
function hillTopHAt(dx,peaks,fineFn,u){
  let best=0;
  for(const p of peaks){
    const ax=Math.abs(dx-p.px)/p.pr;
    if(ax>=1) continue;
    const t=Math.sqrt(Math.max(0,1-ax*ax));
    if(t*p.ph>best) best=t*p.ph;
  }
  return best+fineFn(u);
}
// Built once per mountain into an offscreen sprite (like tree sprites) and
// cached in SP{}, since drawHill() runs every frame but a mountain's shape
// never changes — avoids paying full per-pixel cost per frame.
function makeHillSpr(m,w,h){
  const padTop=Math.max(10,Math.round(h*0.28));
  const skirt=Math.max(16,Math.min(46,Math.round(h*0.18)));
  const padX=6;
  const W=w*2+padX*2, H=h+padTop+skirt+2;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const id=c.createImageData(W,H);
  const buf=id.data;
  const ox=W>>1, oy=H-skirt-2; // anchor: ground contact line

  const nPeaks=2+Math.floor(m.s*2);
  const peaks=makeHillPeaks(m.x*929+m.y*457|0,w,h,nPeaks);
  const fineFn=makeFineFn(m.x*613+m.y*811|0,h);
  const baseFn=makeBaseFn(m.x*271+m.y*613|0,h);
  const n=PAL_ROCK.length;
  const seedX=(m.x*4001)|0, seedY=(m.y*4001)|0;
  const snowLine=m.s>.55?0.72-m.s*0.08:2; // t where snow starts blending in (2=never)
  let globalTop=1;
  for(let dx=-w;dx<w;dx++){
    const gt=hillTopHAt(dx,peaks,fineFn,(dx+w)/(2*w));
    if(gt>globalTop) globalTop=gt;
  }

  for(let dx=-w;dx<w;dx++){
    const u=(dx+w)/(2*w);
    const topH=Math.min(h+padTop-2,Math.max(0,hillTopHAt(dx,peaks,fineFn,u)));
    const footJag=Math.max(0,Math.min(9,Math.round(baseFn(u))));
    const slopeLight=0.5-0.5*(dx/w); // 1 at left edge, 0 at right edge
    const colSeedX=(dx>>2)+seedX;

    for(let row=footJag;row<=topH;row++){
      const rowT=row/globalTop;
      const y=oy-row;
      const bt=b4(ox+dx,y);

      if(snowLine<1 && rowT>snowLine){
        const snowMix=Math.min(1,(rowT-snowLine)/(1-snowLine)*1.4);
        if(bt<snowMix*16){
          const sn=PAL_SNOW.length;
          const sfi=Math.max(0,Math.min(sn-1-1e-4,(0.35+0.65*slopeLight)*(sn-1)));
          const si0=sfi|0, spick=(sfi-si0)*16>bt?si0+1:si0;
          ibSet(buf,W,H,ox+dx,y,...PAL_SNOW[spick]);
          continue;
        }
      }

      const rq=row>>2;
      const h1=((colSeedX*17)^((rq+seedY)*31))&0xff;
      const h2=((colSeedX*41)^((rq+seedY)*19))&0xff;
      const h3=((colSeedX*7)^((rq+seedY)*53))&0xff;
      const noise=(((h1*140+h2*80+h3*35)>>8)/255-0.5);
      let shade=0.10+0.42*slopeLight+0.38*rowT+noise*0.55;
      shade=Math.max(0,Math.min(0.999,shade));
      const fi=shade*(n-1);
      const i0=Math.min(n-2,fi|0);
      const pick=(fi-i0)*16>bt?i0+1:i0;
      ibSet(buf,W,H,ox+dx,y,...PAL_ROCK[pick]);
    }

    // Scree skirt: rubble thinning to transparent as it spreads onto the ground
    for(let row=footJag-1;row>=-skirt;row--){
      const dist=footJag-row;
      const prob=Math.max(0,1-dist/skirt)**0.85;
      const hsh=((colSeedX*53)^((row+seedY)*29))&0xff;
      const hsh2=((colSeedX*23)^((row+seedY)*61))&0xff;
      if((hsh/255)>prob) continue;
      const y=oy-row;
      if(dist<skirt*0.7&&(hsh&3)===0){
        ibSet(buf,W,H,ox+dx,y,24,52,10); // moss/grass creeping onto the scree
      }else if((hsh2&7)===0){
        ibSet(buf,W,H,ox+dx,y,...PAL_ROCK[0]); // boulder shadow fleck
      }else{
        const c2=(hsh&1)?PAL_ROCK[1]:PAL_ROCK[2+((hsh>>2)&1)];
        ibSet(buf,W,H,ox+dx,y,...c2);
      }
    }
  }

  // Rock face crevices with lit counter-edge, kept within the silhouette
  const cr=mkRng(m.x*511+m.y*211|0);
  for(let i=0;i<8+Math.floor(m.s*8);i++){
    const cdx=Math.round((cr()-.5)*w*1.8);
    const cu=(cdx+w)/(2*w);
    const cTopH=Math.max(2,hillTopHAt(cdx,peaks,fineFn,cu));
    const cry=Math.max(2,Math.round(cr()*cTopH*0.85));
    const crx=ox+cdx, cy0=oy-cry;
    const crl=2+Math.floor(cr()*6);
    for(let j=0;j<crl;j++)   ibSet(buf,W,H,crx+j,cy0-j,...PAL_ROCK[0]);
    for(let j=0;j<crl-1;j++) ibSet(buf,W,H,crx+j-1,cy0-j+1,...PAL_ROCK[7]);
  }

  c.putImageData(id,0,0);
  return {cv,ox,oy};
}
function drawHill(m){
  const cx=wpx(m.x*WW), cy=wpy(m.y*WH);
  const w=(m.s*Math.min(WW,WH)*.20/PS)|0, h=(m.s*Math.min(WW,WH)*.16/PS)|0;
  if(w<1||h<1) return;
  if(cx+w<0||cx-w>pixW||cy<0||cy-h>pixH) return;
  const key='hill_'+m.x+'_'+m.y+'_'+m.s+'_'+w+'_'+h;
  if(!SP[key]) SP[key]=makeHillSpr(m,w,h);
  const s=SP[key];
  pixCtx.drawImage(s.cv,cx-s.ox,cy-s.oy);
}

// ── Tree draw (sprite blit) ───────────────────────────────────
function drawRoundTree(wx,wy,sz,v=0){
  const x=wpx(wx),y=wpy(wy),r=Math.max(4,(sz/PS)|0);
  if(x+r*2<0||x-r*2>pixW||y+r<0||y-r*4>pixH) return;
  const s=getTreeSpr(TR_DECIDUOUS,r,v); pixCtx.drawImage(s.cv,x-s.ox,y-s.oy);
}
function drawPineTree(wx,wy,sz,v=0){
  const x=wpx(wx),y=wpy(wy),r=Math.max(4,(sz/PS)|0);
  if(x+r<0||x-r>pixW||y<0||y-r*4>pixH) return;
  const s=getTreeSpr(TR_PINE,r,v); pixCtx.drawImage(s.cv,x-s.ox,y-s.oy);
}
function drawSpruce(wx,wy,sz,v=0){
  const x=wpx(wx),y=wpy(wy),r=Math.max(4,(sz*.72/PS)|0);
  if(x+r+2<0||x-r-2>pixW||y<0||y-r*5>pixH) return;
  const s=getTreeSpr(TR_SPRUCE,r,v); pixCtx.drawImage(s.cv,x-s.ox,y-s.oy);
}
function drawBroadFir(wx,wy,sz,v=0){
  const x=wpx(wx),y=wpy(wy),r=Math.max(4,(sz*1.10/PS)|0);
  if(x+r+3<0||x-r-3>pixW||y<0||y-r*3>pixH) return;
  const s=getTreeSpr(TR_FIR,r,v); pixCtx.drawImage(s.cv,x-s.ox,y-s.oy);
}
function drawScotsPine(wx,wy,sz,v=0){
  const x=wpx(wx),y=wpy(wy),r=Math.max(4,(sz/PS)|0);
  if(x+r*2<0||x-r*2>pixW||y<0||y-r*5>pixH) return;
  const s=getTreeSpr(TR_SCOTS,r,v); pixCtx.drawImage(s.cv,x-s.ox,y-s.oy);
}

// ── Shrub ─────────────────────────────────────────────────────
function drawShrub(sh){
  const x=wpx(sh.x*WW),y=wpy(sh.y*WH);
  if(x<-28||x>pixW+28||y<-28||y>pixH+8) return;
  const r=Math.max(3,(treeSz*sh.m*.28/PS)|0);
  const s=getShrubSpr(r); pixCtx.drawImage(s.cv,x-s.ox,y-s.oy);
  if(sh.berries){
    const br=mkRng(sh.x*999+sh.y*137|0);
    for(let i=0;i<4;i++){
      const ba=br()*Math.PI*2, bd=r*(0.3+br()*.5);
      pr((x+Math.cos(ba)*bd)|0,(y+Math.sin(ba)*bd-r*.5)|0,2,2,br()>.5?'#cc1010':'#1020a0');
    }
  }
}

// ── Mushroom ──────────────────────────────────────────────────
function drawMushroom(m){
  const wx=m.fx*WW, wy=m.fy*WH;
  const inRange=!m.collected && Math.hypot(char.x-wx,char.y-wy)<PICK_R;
  let x=wpx(wx), y=wpy(wy);
  const s=Math.max(1,Math.min(4,(treeSz*.12/PS)|0));

  // Pop animation — mushroom floats up then vanishes
  if(m.collected){
    const t=m.pickT?(gameTime-m.pickT)/PICK_ANIM_DUR:1;
    if(t>=1) return;
    y-=(t*t*18)|0;
    pr(x-s/2|0,   y-s*2, s,   s*2, '#dcd4b0');
    pr(x-s*2-1|0, y-s*2, s*4+2, Math.max(1,(s*.38)|0), '#4a0808');
    pr(x-(s*2)|0, y-s*3|0, s*4, Math.max(1,(s*1.8)|0), '#dd2424');
    return;
  }

  // Bob vertically when in pick range
  y-=inRange?(Math.sin(gameTime*9)*2.5+.5)|0:0;
  if(x<-20||x>pixW+20||y<-24||y>pixH+4) return;

  // AoE2-style selection pip below mushroom when in range
  if(inRange){
    pr(x-2,y+2,5,1,'#70ee70');
    pr(x-1,y+3,3,1,'#70ee70');
    pr(x,  y+4,1,1,'#70ee70');
  }

  // Shadow
  pr(x-s,y+1,s*2,1,'#2a3a10');

  // Stem — layered: left highlight, center mid, right shadow
  pr(x-s/2|0,    y-s*2, s,   s*2, '#dcd4b0');
  pr(x-s/2|0,    y-s*2, 1,   s*2, '#f0e8c8');
  pr(x+s/2-1|0,  y-s*2, 1,   s*2, '#c8c0a0');
  pr(x-s/2-1|0,  y-s,   s+2, 1,   '#e8e0c0');
  pr(x-s/2-1|0,  y-s*1.25|0, s+2, 1, '#d0c8a8');

  // Dark underside of cap
  pr(x-s*2-1|0,  y-s*2, s*4+2, (s*.38)|0, '#4a0808');

  // Cap dome rows — fly agaric
  const rowDef=[
    {f:1.70, col:'#8a0e0e'},
    {f:1.88, col:'#a81414'},
    {f:2.00, col:'#cc1a1a'},
    {f:1.98, col:'#dd2424'},
    {f:1.88, col:'#cc1c1c'},
    {f:1.68, col:'#bb1818'},
    {f:1.40, col:'#a81414'},
    {f:1.05, col:'#961010'},
    {f:0.66, col:'#840c0c'},
    {f:0.30, col:'#700808'},
  ];
  const rowH=Math.max(1,(s*.36)|0);
  rowDef.forEach(({f,col},i)=>{
    const rw=(s*f)|0;
    const yy=y-s*2-(s*.3*i)|0;
    pr(x-rw,yy,rw*2,rowH,col);
    pr(x+rw/2|0,yy,(rw*.52)|0,rowH,'#5a0808');
    if(rw>4) pr(x-rw,yy,Math.max(1,(rw*.20)|0),rowH,'#ee3a3a');
  });

  // White spots (3 per cap)
  const ss=Math.max(2,(s*.65)|0);
  [[x-s*1.0|0,y-s*3.4|0],[x+s*.5|0,y-s*3.8|0],[x-s*.2|0,y-s*4.6|0]].forEach(([sx,sy])=>{
    pr(sx-1,sy-1,ss+2,ss,'#dcdcd8');
    pr(sx,  sy,  ss,  ss,'#f8f8f4');
    pr(sx+(ss/2)|0,sy+(ss/2)|0,1,1,'#ffffff');
  });
}

// ── Metsätonttu (forest gnome) ────────────────────────────────
// AoE2-style pixel character: lit/shadow faces on every element, tall
// drooping red cap (tip leans toward facing), huge shaded white beard,
// round red nose, woolen tunic, stubby boots. 4-frame walk with swinging
// mittens; the white cap-pom sways gently when idle.
const GN={
  capL:'#e23030', cap:'#c01c1c', capD:'#7c0e0e',     // pointed cap
  beardL:'#f4f1e6', beard:'#ddd8c6', beardD:'#b3ad97',// beard
  skin:'#e3b083', nose:'#d2705e', noseL:'#e8907e',    // face / nose
  tunic:'#46603a', tunicD:'#2e4226',                  // woolen tunic
  belt:'#3a2410', boot:'#3a2812', bootD:'#241808',    // belt / boots
  pomS:'#a8a290',
};
function drawGnome(wx,wy,t,moving){
  const cx=wpx(wx), cy=wpy(wy);
  const f=char.facing;  // 1=right, -1=left
  const s=Math.max(1,Math.min(2,(Math.min(VW,VH)*.006/PS)|0));
  const frame=moving?Math.floor(t*7)%4:0;
  const bob=(frame===1||frame===3)?-1:0;

  // Wading: the deeper into a pond, the more of the body sinks below the
  // waterline. submerge is in sprite units counted up from the feet (dy=0);
  // at the capped max depth (~13 units) only the cap/face stay above water.
  const wd=waterDepthAt(wx,wy);
  const submerge=wd*13;

  // sp: place rect at (dx,dy) units from feet centre, flipping for facing.
  // dx is the left edge in facing-right space; positive dx leans toward facing.
  // Clipped to the part still above the waterline (dy is negative-up).
  function sp(dx,dy,w,h,c){
    const visH=Math.min(h,(-submerge)-dy);
    if(visH<=0) return;
    const x0=f>0?cx+dx*s:cx-(dx+w)*s;
    pr(x0,(cy+dy*s)+bob,w*s,visH*s,c);
  }

  // Ground shadow (wide & stout) — there's no shadow to cast while wading
  if(wd<=0){
    const sh=Math.max(1,s>>1);
    pr(cx-s*4,cy,s*8,sh,'#203808');
  }

  // Walk: stubby feet alternate a lift; mittens swing opposite
  const lf=frame===1?-1:0, rf=frame===3?-1:0;
  const aw=frame===1?-1:frame===3?1:0;

  // ── Boots (peek beneath the beard) ──
  sp(-3,-2+lf, 3,2, GN.boot);  sp(-3,-2+lf, 3,1, GN.bootD);
  sp( 1,-2+rf, 3,2, GN.boot);  sp( 1,-2+rf, 3,1, GN.bootD);

  // ── Woolen tunic (slightly stout) ──
  sp(-3,-11, 7,9, GN.tunic);
  sp( 2,-11, 2,9, GN.tunicD);   // right shadow face
  sp(-3, -3, 7,1, GN.tunicD);   // hem shadow
  sp(-3,-11, 1,9, GN.beardL);   // faint lit left edge

  // Belt + brass buckle (sides peek past the beard)
  sp(-3,-6, 7,1, GN.belt);
  sp(-1,-7, 2,2, '#d4a010');
  sp( 0,-7, 1,1, '#f0c030');

  // ── Arms + mitten hands at the sides ──
  sp(-4,-10, 2,4, GN.tunic);  sp(-4,-10, 1,4, GN.tunicD);
  sp( 5,-10, 2,4, GN.tunic);  sp( 6,-10, 1,4, GN.tunicD);
  sp(-4,-6+aw, 2,2, GN.cap);  sp(-4,-6+aw, 1,2, GN.capD);   // left mitten
  sp( 5,-6-aw, 2,2, GN.cap);  sp( 6,-6-aw, 1,2, GN.capD);   // right mitten

  // ── Face patch (only nose shows; eyes hidden under the cap) ──
  sp(-2,-16, 4,3, GN.skin);
  sp( 1,-16, 1,3, '#c8966a');  // cheek shadow

  // ── Huge white beard (triangular, drawn over the tunic) ──
  const beardRows=[[-14,4],[-13,5],[-12,6],[-11,6],[-10,6],[-9,5],[-8,5],[-7,4],[-6,4],[-5,3],[-4,2]];
  beardRows.forEach(([dy,w])=>{
    const dx=-(w>>1);
    sp(dx,      dy, w,1, GN.beard);
    sp(dx,      dy, 1,1, GN.beardL);   // lit left edge
    sp(dx+w-1,  dy, 1,1, GN.beardD);   // shadow right edge
  });
  sp(-1,-13, 1,7, GN.beardD);          // central strand groove
  sp( 1,-12, 1,5, GN.beardD);          // side strand groove

  // ── Round red nose (pokes out between cap and beard) ──
  sp(-1,-15, 2,2, GN.nose);
  sp(-1,-15, 1,1, GN.noseL);

  // ── Cap brim (wide, dark fold underneath) ──
  sp(-4,-18, 8,1, GN.cap);
  sp(-4,-17, 8,1, GN.capD);
  sp(-4,-18, 2,1, GN.capL);            // lit brim corner

  // ── Tall cone, tip droops toward facing (shift grows upward) ──
  const cone=[[-19,7,0],[-20,6,0],[-21,5,1],[-22,5,1],[-23,4,2],[-24,3,2],[-25,2,3],[-26,1,3]];
  cone.forEach(([dy,w,shift])=>{
    const dx=-(w>>1)+shift;
    sp(dx,     dy, w,1, GN.cap);
    sp(dx,     dy, 1,1, GN.capL);      // lit left edge
    sp(dx+w-1, dy, 1,1, GN.capD);      // shadow right edge
  });

  // ── White cap-pom at the tip (sways when idle) ──
  const sw=moving?0:Math.round(Math.sin(t*3));
  sp(2+sw,-27, 2,2, GN.beardL);
  sp(3+sw,-27, 1,1, GN.pomS);
}

// ── Vegetation ────────────────────────────────────────────────
let treeSz=0;
function setTreeSize(){ treeSz=Math.min(VW,VH)*.065; }

function drawPlant(x,y,t,eaten){
  switch(t){
    case U_BILBERRY:
      pr(x,y,1,2,'#284e12');
      pr(x-2,y-1,2,1,'#2a5010'); pr(x+1,y-1,2,1,'#2a5010');
      pr(x-1,y-2,3,1,'#2a5010');
      if(!eaten){ // plump 2x2 berries with a sheen pixel, brighter blues
        pr(x-2,y-4,2,2,'#3054c0'); pr(x-2,y-4,1,1,'#7a98e8');
        pr(x+1,y-3,2,2,'#2242a8'); pr(x+1,y-3,1,1,'#5a78d8');
        pr(x,y-5,1,1,'#4a68c8');
      }
      break;
    case U_LINGONBERRY:
      pr(x,y,1,2,'#2a4a12');
      pr(x-2,y-1,2,1,'#304e14'); pr(x+1,y-1,2,1,'#304e14');
      pr(x-1,y-2,3,1,'#304e14');
      if(!eaten){ // bright red 2x2 clusters with highlight
        pr(x-2,y-4,2,2,'#e02020'); pr(x-2,y-4,1,1,'#ff7a60');
        pr(x+1,y-3,2,2,'#c01418'); pr(x+1,y-3,1,1,'#f04840');
        pr(x,y-5,1,1,'#f03030');
      }
      break;
    case U_FERN:
      pr(x,y,1,5,'#1e4010');
      pr(x-2,y-1,2,1,'#264810'); pr(x+1,y-1,2,1,'#264810');
      pr(x-3,y-2,3,1,'#264810'); pr(x+1,y-2,3,1,'#264810');
      pr(x-2,y-3,2,1,'#264810'); pr(x+1,y-3,2,1,'#264810');
      pr(x-1,y-4,2,1,'#264810');
      break;
    case U_MOSS:
      pr(x-2,y,5,1,'#1a3c0a');
      pr(x-3,y-1,7,1,'#1e4410');
      pr(x-2,y-2,5,1,'#1a3c0a');
      break;
    case U_GRASS_TUFT:
      pr(x-1,y,1,3,'#3a6020'); pr(x,y-1,1,4,'#486828'); pr(x+1,y,1,3,'#3a6020');
      pr(x-1,y-3,1,1,'#5a8030'); pr(x+1,y-3,1,1,'#5a8030');
      break;
  }
}

function drawVegetation(){
  const pad=Math.min(WW,WH)*.15;
  const x0=cam.x-pad,x1=cam.x+VW+pad,y0=cam.y-pad,y1=cam.y+VH+pad;
  const items=[];
  UNDERSTORY.forEach(u=>{
    const ux=u.x*WW,uy=u.y*WH;
    if(ux>x0&&ux<x1&&uy>y0&&uy<y1) items.push({wy:uy,fn:()=>drawPlant(wpx(ux),wpy(uy),u.t,u.eaten)});
  });
  SHRUBS.forEach(sh=>{
    const sx=sh.x*WW,sy=sh.y*WH;
    if(sx>x0&&sx<x1&&sy>y0&&sy<y1) items.push({wy:sy,fn:()=>drawShrub(sh)});
  });
  TREES.forEach(tr=>{
    const tx=tr.x*WW,ty=tr.y*WH;
    if(tx>x0&&tx<x1&&ty>y0&&ty<y1){
      const sz=treeSz*tr.m;
      items.push({wy:ty,fn:
        tr.t===TR_DECIDUOUS?()=>drawRoundTree(tx,ty,sz,tr.v):
        tr.t===TR_PINE     ?()=>drawPineTree(tx,ty,sz,tr.v):
        tr.t===TR_SPRUCE   ?()=>drawSpruce(tx,ty,sz,tr.v):
        tr.t===TR_FIR      ?()=>drawBroadFir(tx,ty,sz,tr.v):
                            ()=>drawScotsPine(tx,ty,sz,tr.v)});
    }
  });
  items.sort((a,b)=>a.wy-b.wy);
  items.forEach(it=>it.fn());
}

// ── Minimap ───────────────────────────────────────────────────
function renderMinimap(){
  const mw=mmCv.width,mh=mmCv.height;
  mmCtx.fillStyle=P.mm_g; mmCtx.fillRect(0,0,mw,mh);
  const tzCol={[T_SAND]:'#c8a84a',[T_MARSH]:'#3a5820',[T_ROCK]:'#787060',[T_GRAVEL]:'#8a7850'};
  TERRAIN_ZONES.forEach(z=>{
    mmCtx.fillStyle=tzCol[z.t];
    mmCtx.beginPath();mmCtx.ellipse(z.x*mw,z.y*mh,z.rx*mw,z.ry*mh,0,0,Math.PI*2);mmCtx.fill();
  });
  RIVERS.forEach(rv=>{
    mmCtx.strokeStyle=P.mm_w;mmCtx.lineWidth=2;
    mmCtx.beginPath();
    // every 4th centreline sample — follows the meanders, cheap to stroke
    rv.smp.forEach((p,i)=>{
      if(i%4&&i!==rv.smp.length-1) return;
      i===0?mmCtx.moveTo(p.x*mw,p.y*mh):mmCtx.lineTo(p.x*mw,p.y*mh);
    });
    mmCtx.stroke();
  });
  WATER_DEF.forEach(w=>{
    mmCtx.fillStyle=P.mm_w;
    mmCtx.beginPath();mmCtx.ellipse(w.x*mw,w.y*mh,w.rx*mw,w.ry*mh,0,0,Math.PI*2);mmCtx.fill();
  });
  MOUNT_DEF.forEach(m=>{
    mmCtx.fillStyle=P.mm_h;
    mmCtx.beginPath();mmCtx.arc(m.x*mw,m.y*mh,m.s*Math.min(mw,mh)*.09,0,Math.PI*2);mmCtx.fill();
  });
  PATHS.forEach(p=>{
    if(p.tier===2){mmCtx.strokeStyle='rgba(184,162,104,.5)';mmCtx.lineWidth=1;mmCtx.setLineDash([2,2]);}
    else{mmCtx.strokeStyle=p.tier===0?'#cca868':'#a98a54';mmCtx.lineWidth=p.tier===0?2:1.3;mmCtx.setLineDash([]);}
    mmCtx.beginPath();
    p.pts.forEach((pt,i)=>i===0?mmCtx.moveTo(pt.x*mw,pt.y*mh):mmCtx.lineTo(pt.x*mw,pt.y*mh));
    mmCtx.stroke();
  });
  mmCtx.setLineDash([]);
  mmCtx.fillStyle='#2a5010';
  TREES.forEach(t=>mmCtx.fillRect(t.x*mw-1,t.y*mh-1,2,2));
  MUSHROOMS.forEach(m=>{
    mmCtx.fillStyle=m.collected?'rgba(120,120,120,.5)':'#cc3838';
    mmCtx.beginPath();mmCtx.arc(m.fx*mw,m.fy*mh,2.5,0,Math.PI*2);mmCtx.fill();
  });
  mmCtx.strokeStyle='rgba(255,255,255,.88)';mmCtx.lineWidth=1.5;
  mmCtx.strokeRect(cam.x/WW*mw,cam.y/WH*mh,VW/WW*mw,VH/WH*mh);
  mmCtx.fillStyle='#ffe050';mmCtx.strokeStyle='#5a3800';mmCtx.lineWidth=1;
  mmCtx.beginPath();mmCtx.arc(char.x/WW*mw,char.y/WH*mh,3.5,0,Math.PI*2);mmCtx.fill();mmCtx.stroke();
}

// ── Render ────────────────────────────────────────────────────
function render(){
  pixCtx.clearRect(0,0,pixW,pixH);
  drawGround();
  drawPaths();
  drawRivers();
  drawWaters();
  MOUNT_DEF.slice().sort((a,b)=>b.s-a.s).forEach(m=>drawHill(m));
  drawVegetation();
  MUSHROOMS.forEach(m=>drawMushroom(m));
  PICK_SPARKS.forEach(s=>{
    const px=wpx(s.wx),py=wpy(s.wy);
    if(px<0||px>=pixW||py<0||py>=pixH) return;
    const sz=Math.max(1,(s.sz*(1-s.age/s.life)+.5)|0);
    pixCtx.fillStyle=`rgb(${s.col[0]},${s.col[1]},${s.col[2]})`;
    pixCtx.fillRect(px,py,sz,sz);
  });
  const moving=Math.abs(char.vx)>5||Math.abs(char.vy)>5;
  drawGnome(char.x,char.y,gameTime,moving);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(pixCv,0,0,VW,VH);
  renderMinimap();
}

// ── Update ────────────────────────────────────────────────────
function update(dt){
  if(gameWon) return;
  gameTime+=dt;
  const {dx,dy}=inputDir();
  if(dx!==0) char.facing=dx>0?1:-1;
  // Trails are quicker going: main > side > faint > off-trail. Mountain
  // slopes and pond wading are slow going regardless of trail.
  const pc=pathCodeAt(char.x,char.y);
  const wd=waterDepthAt(char.x,char.y);
  // walking burns energy WALK_DRAIN× faster than standing still
  fullness=Math.max(0,fullness-dt/FULL_DRAIN_T*((dx||dy)?WALK_DRAIN:1));
  const hungryMul=fullness<HUNGRY_AT?HUNGRY_SPEED:1;
  const spd=SPEED*hungryMul*(wd>0?0.62-0.22*wd:onMountainAt(char.x,char.y)?0.45:pc===3?1.5:pc===2?1.3:pc===1?1.12:1);
  let mx=dx*spd*dt, my=dy*spd*dt;
  let nx=clamp(char.x+mx,CHAR_R,WW-CHAR_R), ny=clamp(char.y+my,CHAR_R,WH-CHAR_R);
  const inTree=treeAt(char.x,char.y);
  if(inTree){
    // Safety escape (e.g. spawned overlapping a trunk): walk radially out
    const rd=Math.hypot(char.x-inTree.wx,char.y-inTree.wy)||1;
    nx=clamp(char.x+(char.x-inTree.wx)/rd*spd*dt,CHAR_R,WW-CHAR_R);
    ny=clamp(char.y+(char.y-inTree.wy)/rd*spd*dt,CHAR_R,WH-CHAR_R);
  } else {
    const bt=treeAt(nx,ny);
    if(bt){
      // Slide around the trunk: strip the movement component pointing
      // into it, keep the tangential remainder so he keeps moving
      const rd=Math.hypot(char.x-bt.wx,char.y-bt.wy)||1;
      const rx=(char.x-bt.wx)/rd, ry=(char.y-bt.wy)/rd;
      const dot=mx*rx+my*ry;
      // 0.55: squeezing past a trunk is slower than open walking
      if(dot<0){ mx=(mx-dot*rx)*0.55; my=(my-dot*ry)*0.55; }
      nx=clamp(char.x+mx,CHAR_R,WW-CHAR_R); ny=clamp(char.y+my,CHAR_R,WH-CHAR_R);
      if(treeAt(nx,ny)){ nx=char.x; ny=char.y; } // wedged between two trunks
    }
  }
  if(!blocked(nx,ny)){ char.x=nx; char.y=ny; }
  else { if(!blocked(nx,char.y)&&!treeAt(nx,char.y)) char.x=nx;
         if(!blocked(char.x,ny)&&!treeAt(char.x,ny)) char.y=ny; }
  char.vx=dx*spd; char.vy=dy*spd;
  easeCamera(dt);
  PICK_SPARKS.forEach(s=>{s.age+=dt;s.wx+=s.vx*dt;s.wy+=s.vy*dt;s.vy+=55*dt;});
  PICK_SPARKS=PICK_SPARKS.filter(s=>s.age<s.life);
  MUSHROOMS.forEach(m=>{
    if(m.collected) return;
    if(Math.hypot(char.x-m.fx*WW,char.y-m.fy*WH)<PICK_R){
      m.collected=true; m.pickT=gameTime; collected++;
      document.getElementById('cnt').textContent=collected;
      playPick(); spawnCanvasSparks(m.fx*WW,m.fy*WH);
      if(collected>=MUSHROOMS.length) setTimeout(showWin,400);
    }
  });
  // Graze berry bushes in reach (cheap axis rejects before the distance
  // check — UNDERSTORY can hold hundreds of plants)
  if(fullness<1){
    for(const u of UNDERSTORY){
      if(u.eaten||(u.t!==U_BILBERRY&&u.t!==U_LINGONBERRY)) continue;
      const ex=u.x*WW-char.x; if(ex>EAT_R||ex<-EAT_R) continue;
      const ey=u.y*WH-char.y; if(ey>EAT_R||ey<-EAT_R) continue;
      if(ex*ex+ey*ey>EAT_R*EAT_R) continue;
      u.eaten=true; u.eatT=gameTime; fullness=Math.min(1,fullness+EAT_RESTORE);
      if(u.t===U_BILBERRY){ bilEaten++; document.getElementById('bcnt').textContent=bilEaten; }
      else { lingEaten++; document.getElementById('lcnt').textContent=lingEaten; }
      playEat(); spawnCanvasSparks(u.x*WW,u.y*WH);
      if(fullness>=1) break;
    }
  }
  for(const u of UNDERSTORY) if(u.eaten&&gameTime-u.eatT>REGROW_T) u.eaten=false;
  updateHungerHud();
}
let lastHungerPct=-1;
function updateHungerHud(){
  const pct=Math.round(fullness*100);
  if(pct===lastHungerPct) return;
  lastHungerPct=pct;
  // pixel bar: dark frame, cream trough, colour-coded fill in whole px
  const cv=document.getElementById('hbarcv'), c=cv.getContext('2d');
  c.fillStyle='#5d3200'; c.fillRect(0,0,cv.width,cv.height);
  c.fillStyle='#e8dcc0'; c.fillRect(1,1,cv.width-2,cv.height-2);
  const fw=Math.round((cv.width-2)*fullness);
  if(fw>0){
    c.fillStyle=fullness<HUNGRY_AT?'#d43a2f':fullness<0.6?'#e8a222':'#6fae3d';
    c.fillRect(1,1,fw,cv.height-2);
  }
  document.getElementById('hud').classList.toggle('hungry',fullness<HUNGRY_AT);
}

// ── Win ───────────────────────────────────────────────────────
function showWin(){
  gameWon=true;
  const win=document.getElementById('win');
  win.classList.add('show');
  document.getElementById('btn-play').focus();
  playWin();confetti();
}

// ── Resize & init ─────────────────────────────────────────────
function resize(){
  const hadWorld=Boolean(WW&&WH&&MUSHROOMS.length>0);
  const cs=hadWorld?MUSHROOMS.map(m=>m.collected):null;
  const charFx=hadWorld?char.x/WW:.30, charFy=hadWorld?char.y/WH:.35;
  const camFx=hadWorld?cam.x/WW:0,    camFy=hadWorld?cam.y/WH:0;
  VW=canvas.width=window.innerWidth;
  VH=canvas.height=window.innerHeight;
  WW=VW*WORLD_SCALE; WH=VH*WORLD_SCALE;
  mmCv.width=MM_W; mmCv.height=Math.round(MM_W*VH/VW);
  PS=Math.max(1,Math.round(VW/640));
  pixW=Math.ceil(VW/PS); pixH=Math.ceil(VH/PS);
  pixCv.width=pixW; pixCv.height=pixH;
  ctx.imageSmoothingEnabled=false;
  for(const k in SP) delete SP[k]; PICK_SPARKS=[]; // rebuild sprites for new PS
  setTreeSize();
  buildWorld();
  if(cs) MUSHROOMS.forEach((m,i)=>m.collected=Boolean(cs[i]));
  char.x=Math.max(CHAR_R,Math.min(WW-CHAR_R,charFx*WW));
  char.y=Math.max(CHAR_R,Math.min(WH-CHAR_R,charFy*WH));
  cam.x=Math.max(0,Math.min(WW-VW,camFx*WW));
  cam.y=Math.max(0,Math.min(WH-VH,camFy*WH));
  document.getElementById('cnt').textContent=collected;
}

function startGame(){
  document.getElementById('btn-play').blur();
  collected=0; gameWon=false; gameTime=0; PICK_SPARKS=[];
  fullness=1; lastHungerPct=-1; UNDERSTORY.forEach(u=>u.eaten=false);
  bilEaten=0; lingEaten=0;
  document.getElementById('bcnt').textContent='0';
  document.getElementById('lcnt').textContent='0';
  MUSHROOMS.forEach(m=>{m.collected=false;m.pickT=0;});
  document.getElementById('cnt').textContent='0';
  document.getElementById('win').classList.remove('show');
  const start=findStart(); char.x=start.x; char.y=start.y; char.vx=0; char.vy=0; char.facing=1;
  snapCam();
}

document.getElementById('btn-play').addEventListener('click',startGame);
window.addEventListener('resize',resize);
document.getElementById('mapnum').textContent=mapNum;

initHudIcons();
resize();
startGame();
let lastT=0;
function loop(t){const dt=Math.min((t-lastT)/1000,.05);lastT=t;update(dt);render();requestAnimationFrame(loop);}
lastT=performance.now();
requestAnimationFrame(loop);
</script>
