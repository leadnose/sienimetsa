<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sienimetsa 🍄</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#1e2e0e;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

#hud{
  position:fixed;top:14px;left:14px;z-index:50;
  background:rgba(255,250,230,.95);border:3px solid #b8860b;
  border-radius:20px;padding:8px 20px;
  font:700 clamp(18px,4.5vw,30px)/1 Georgia,serif;
  color:#5d3200;display:flex;align-items:center;gap:6px;
  box-shadow:0 3px 14px rgba(0,0,0,.18);
}

#mm-wrap{
  position:fixed;bottom:14px;right:14px;z-index:50;
  border:3px solid rgba(255,255,255,.7);border-radius:10px;
  overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.35);
  image-rendering:pixelated;
}
#minimap{display:block;}

#joy-zone{position:fixed;inset:0;z-index:20;pointer-events:none;}
#joy-base{
  position:absolute;display:none;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.18);border:3px solid rgba(255,255,255,.45);
  transform:translate(-50%,-50%);
}
#joy-knob{
  position:absolute;top:50%;left:50%;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.65);transform:translate(-50%,-50%);
}

#win{
  position:fixed;inset:0;z-index:300;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(12px,3vh,28px);text-align:center;
  background:rgba(255,220,40,.94);backdrop-filter:blur(4px);
  font-family:Georgia,serif;
}
#win.show{display:flex;animation:winPop .6s cubic-bezier(.175,.885,.32,1.275);}
@keyframes winPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.wb{font-size:clamp(50px,13vw,100px);}
.wm{font-size:clamp(20px,5vw,44px);color:#5d2600;font-weight:700;}
#btn-play{
  font-size:clamp(18px,4vw,32px);font-family:Georgia,serif;
  padding:clamp(12px,2.5vh,20px) clamp(28px,6vw,56px);
  background:#e85d04;color:#fff;border:none;border-radius:50px;
  cursor:pointer;box-shadow:0 6px 0 #9d2700;
  transition:transform .1s,box-shadow .1s;touch-action:manipulation;
}
#btn-play:active{transform:translateY(4px);box-shadow:0 2px 0 #9d2700;}

#mapdisp{
  position:fixed;top:14px;right:14px;z-index:50;
  background:rgba(255,250,230,.95);border:3px solid #b8860b;
  border-radius:20px;padding:8px 18px;
  font:700 clamp(14px,3.5vw,22px)/1 Georgia,serif;
  color:#5d3200;box-shadow:0 3px 14px rgba(0,0,0,.18);
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">🧺 <span id="cnt">0</span> / <span id="tot">?</span></div>
<div id="mapdisp">Map <span id="mapnum">1</span></div>
<div id="mm-wrap"><canvas id="minimap"></canvas></div>
<div id="joy-zone"><div id="joy-base"><div id="joy-knob"></div></div></div>
<div id="win" role="dialog" aria-modal="true" aria-labelledby="wm-label">
  <div class="wb">🎉🍄🎉</div>
  <div class="wm" id="wm-label">Löysit kaikki sienet!</div>
  <div class="wb" style="font-size:clamp(40px,10vw,78px)">⭐⭐⭐</div>
  <button id="btn-play">🔄 Uudelleen!</button>
</div>
<script>
'use strict';

// ── Screen canvas ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const mmCv   = document.getElementById('minimap');
const mmCtx  = mmCv.getContext('2d');

// ── Pixel canvas (low-res, blitted 1:PS to screen) ────────────
const pixCv  = document.createElement('canvas');
const pixCtx = pixCv.getContext('2d');
let PS=2, pixW, pixH;
const SP = {}; // sprite cache: pre-rendered canvases keyed by type+size

let VW, VH, WW, WH;
const MM_W = 160;

// ── Seeded RNG ────────────────────────────────────────────────
function mkRng(seed) {
  let s = seed >>> 0;
  return () => { s = Math.imul(s,1664525)+1013904223>>>0; return s/2**32; };
}

// ── Pixel art palette ─────────────────────────────────────────
const P = {
  grass:  '#3a5a18', grassD: '#263c0e', grassL: '#4e7422',
  trunk:  '#6e4018', trunkD: '#3e2208',
  leaf:   '#1c3c0c', leafM:  '#284e14', leafL:  '#34601c',
  pine:   '#142608', pineM:  '#1c3610', pineL:  '#264618',
  spr:    '#0e1e0a', sprM:   '#162a10', sprL:   '#203818',
  fir:    '#142208', firM:   '#1e3210', firL:   '#284218',
  scots:  '#7a4a1e', scotsD: '#4a2a0c',
  shrub:  '#1a3008', shrubL: '#284018',
  water:  '#1a5080', waterL: '#2870a8', waterD: '#0e3050',
  shore:  '#907228', shoreD: '#6a5018',
  riverW: '#2870a8', riverB: '#7a6018',
  hill:   '#6a5a48', hillL:  '#8a7a68', hillD:  '#4a3a2c', snow: '#bab0a0',
  mushrC: '#a01818', mushrCd:'#681010', mushrS: '#d8c898',
  skin:   '#e0a060', skinD:  '#b07030',
  hat:    '#283a10', hatD:   '#182408',
  coat:   '#384c10', coatD:  '#243008',
  cape:   '#a06808', capeD:  '#704808',
  belt:   '#381808', shoe:   '#1c0c04',
  fl1:    '#e8e0a0', fl2:    '#d8c840', fl3:    '#b8d068',
  lpad:   '#183808', outline:'#100c04',
  mm_g:   '#3a5818', mm_w:   '#1a5080', mm_h:   '#6a5a48',
};

// ── Map selection (URL: ?map=1..10) ──────────────────────────
const mapNum = (() => {
  const n = parseInt(new URLSearchParams(location.search).get('map') ?? '');
  return Number.isInteger(n) && n >= 1 && n <= 10 ? n : 1;
})();

// ── World data (populated by generateWorld) ───────────────────
let WATER_DEF=[], RIVERS=[], MOUNT_DEF=[], SHROOM_POS=[];
let TREES=[], SHRUBS=[], FLOWERS=[], PATCHES=[], MUSHROOMS=[], COLLIDERS=[];

function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function generateWorld(seed){
  const r = mkRng(seed * 6271 + 9973);

  MOUNT_DEF = [];
  const nM = 6 + Math.floor(r()*6);
  const nCl = 1 + Math.floor(r()*2 + (r()>.55?1:0));
  const clX = Array.from({length:nCl}, ()=> 0.18+r()*.64);
  const clY = Array.from({length:nCl}, ()=> 0.04+r()*.30);
  for(let i=0;i<nM;i++){
    const c=i%nCl;
    MOUNT_DEF.push({
      x: clamp(clX[c]+(r()-.5)*.30, 0.05, 0.95),
      y: clamp(clY[c]+(r()-.5)*.18, 0.03, 0.48),
      s: 0.38+r()*.62,
    });
  }

  WATER_DEF = [];
  const nW = 4+Math.floor(r()*3);
  for(let tries=0; WATER_DEF.length<nW && tries<100; tries++){
    const wx=0.06+r()*.88, wy=0.12+r()*.80;
    const clearM = MOUNT_DEF.every(m=>Math.hypot(wx-m.x,wy-m.y)>m.s*.13+0.10);
    const clearW = WATER_DEF.every(w=>Math.hypot(wx-w.x,wy-w.y)>0.14);
    if(clearM&&clearW){
      const rx=0.025+r()*.068, ry=rx*(0.48+r()*.64);
      WATER_DEF.push({x:wx,y:wy,rx,ry});
    }
  }

  RIVERS = [];
  const nR = 1+Math.floor(r()*2+(MOUNT_DEF.length>8?1:0));
  for(let i=0;i<Math.min(nR,3);i++){
    const m = MOUNT_DEF[Math.floor(r()*MOUNT_DEF.length)];
    const sx=clamp(m.x+(r()-.5)*.12,0,1), sy=clamp(m.y+m.s*.09+r()*.06,0,1);
    let ex,ey;
    if(WATER_DEF.length&&r()>.3){ const w=WATER_DEF[Math.floor(r()*WATER_DEF.length)]; ex=w.x;ey=w.y; }
    else { ex=0.1+r()*.8; ey=0.55+r()*.4; }
    const nP=4+Math.floor(r()*4);
    const pts=[];
    for(let p=0;p<=nP;p++){
      const t=p/nP, wiggle=Math.sin(t*Math.PI)*.06;
      pts.push({x:clamp(sx+(ex-sx)*t+(r()-.5)*wiggle,0,1),
                y:clamp(sy+(ey-sy)*t+(r()-.5)*wiggle*.7,0,1)});
    }
    RIVERS.push(pts);
  }

  SHROOM_POS = [];
  const nS=18+Math.floor(r()*9);
  for(let tries=0; SHROOM_POS.length<nS && tries<400; tries++){
    const mx=0.03+r()*.94, my=0.03+r()*.94;
    const inW=WATER_DEF.some(w=>Math.hypot(mx-w.x,my-w.y)<Math.max(w.rx,w.ry)*1.35);
    const inM=MOUNT_DEF.some(m=>Math.hypot(mx-m.x,my-m.y)<m.s*.09);
    if(!inW&&!inM) SHROOM_POS.push([mx,my]);
  }
}

function buildWorld() {
  generateWorld(mapNum);

  const r  = mkRng(mapNum * 1009 + 42);
  const rp = mkRng(mapNum * 1013 + 77);

  const mCX = MOUNT_DEF.reduce((s,m)=>s+m.x,0)/MOUNT_DEF.length;
  const mCY = MOUNT_DEF.reduce((s,m)=>s+m.y,0)/MOUNT_DEF.length;

  TREES = [];
  for(let i=0;i<65;i++) TREES.push({x:r()*.42,y:.50+r()*.48,t:0,m:0.8+r()*.5});
  for(let i=0;i<30;i++) TREES.push({x:clamp(mCX-.15+r()*.30,0,1),y:r()*.55,t:1,m:0.8+r()*.4});
  for(let i=0;i<18;i++) TREES.push({x:clamp(mCX+r()*.40,0,1),y:clamp(mCY+r()*.35,0,.55),t:1,m:0.7+r()*.5});
  for(let i=0;i<50;i++) TREES.push({x:r(),y:r(),t:r()>.45?1:0,m:0.7+r()*.6});
  for(let i=0;i<24;i++) TREES.push({x:r()*.44,y:r()*.58,t:2,m:0.7+r()*1.1});
  for(let i=0;i<18;i++) TREES.push({x:clamp(mCX-.1+r()*.45,0,1),y:r()*.48,t:2,m:0.8+r()*1.0});
  for(let i=0;i<14;i++) TREES.push({x:r(),y:r(),t:2,m:0.5+r()*1.2});
  for(let i=0;i<22;i++) TREES.push({x:r(),y:r(),t:3,m:0.7+r()*.8});
  for(let i=0;i<12;i++) TREES.push({x:r()*.38,y:.52+r()*.42,t:3,m:0.9+r()*.9});
  for(let i=0;i<15;i++) TREES.push({x:r(),y:r(),t:4,m:0.9+r()*.9});

  SHRUBS = [];
  for(let i=0;i<110;i++) SHRUBS.push({x:r(),y:r(),m:0.5+r()*.7,berries:r()>.65});

  FLOWERS = [];
  for(let i=0;i<300;i++) FLOWERS.push({x:r(),y:r(),c:r()>.6?P.fl1:r()>.3?P.fl2:P.fl3,s:0.4+r()*.6});

  PATCHES = [];
  for(let i=0;i<180;i++) PATCHES.push({x:rp(),y:rp(),w:0.004+rp()*0.01,h:0.002+rp()*0.007,d:rp()>.45});

  MUSHROOMS = SHROOM_POS.map(([fx,fy]) => ({fx,fy,collected:false}));

  COLLIDERS = [
    ...WATER_DEF.map(w => ({fx:w.x, fy:w.y, fr:Math.max(w.rx,w.ry)*1.05})),
    ...MOUNT_DEF.map(m => ({fx:m.x, fy:m.y, fr:m.s*.075})),
  ];

  document.getElementById('tot').textContent = MUSHROOMS.length;
}

// ── Game state ────────────────────────────────────────────────
const char = {x:0,y:0,vx:0,vy:0,facing:1};
const cam  = {x:0,y:0};
let collected=0, gameWon=false, gameTime=0;

const SPEED  = 260;
const CHAR_R = 14;
const PICK_R = 38;

function findStart() {
  const r = mkRng(mapNum * 7331 + 17);
  for(let i=0; i<500; i++){
    const x = CHAR_R*2 + r()*(WW-CHAR_R*4);
    const y = CHAR_R*2 + r()*(WH-CHAR_R*4);
    if(!blocked(x,y)) return {x,y};
  }
  return {x:WW*.5, y:WH*.5};
}

function snapCam() {
  cam.x = Math.max(0,Math.min(WW-VW, char.x-VW/2));
  cam.y = Math.max(0,Math.min(WH-VH, char.y-VH/2));
}
function easeCamera(dt) {
  const tx=Math.max(0,Math.min(WW-VW,char.x-VW/2));
  const ty=Math.max(0,Math.min(WH-VH,char.y-VH/2));
  cam.x+=(tx-cam.x)*Math.min(1,dt*8);
  cam.y+=(ty-cam.y)*Math.min(1,dt*8);
}

// ── Input ─────────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{ keys[e.key]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault(); });
window.addEventListener('keyup',  e=>{ keys[e.key]=false; });

const joy={active:false,bx:0,by:0,dx:0,dy:0};
const joyBase=document.getElementById('joy-base');
const joyKnob=document.getElementById('joy-knob');
const JR=50;
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); const t=e.changedTouches[0]; joy.active=true;joy.bx=t.clientX;joy.by=t.clientY;joy.dx=0;joy.dy=0; joyBase.style.left=t.clientX+'px';joyBase.style.top=t.clientY+'px';joyBase.style.display='block'; },{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.changedTouches[0]; const dx=t.clientX-joy.bx,dy=t.clientY-joy.by; const a=Math.atan2(dy,dx),cl=Math.min(Math.hypot(dx,dy),JR)/JR; joy.dx=Math.cos(a)*cl;joy.dy=Math.sin(a)*cl; joyKnob.style.left=(50+joy.dx*JR)+'px';joyKnob.style.top=(50+joy.dy*JR)+'px'; },{passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); joy.active=false;joy.dx=0;joy.dy=0;joyBase.style.display='none'; },{passive:false});

function inputDir() {
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])  dx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])    dy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S'])  dy+=1;
  if(joy.active){dx+=joy.dx;dy+=joy.dy;}
  const l=Math.hypot(dx,dy);
  return l>0?{dx:dx/l,dy:dy/l}:{dx:0,dy:0};
}

// ── Collision ─────────────────────────────────────────────────
function blocked(nx,ny) {
  for(const c of COLLIDERS)
    if(Math.hypot(nx-c.fx*WW,ny-c.fy*WH)<c.fr*Math.min(WW,WH)+CHAR_R) return true;
  return false;
}

// ── Audio ─────────────────────────────────────────────────────
let aCtx;
function ac(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx;}
function beep(freq,dur,vol=.22){
  try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);o.start(c.currentTime);o.stop(c.currentTime+dur);}catch(e){}
}
let noteIdx=0;
const PICK_NOTES=[523,587,659,698,784,880];
function playPick(){beep(PICK_NOTES[noteIdx++%6],.3);}
function playWin(){[523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,.35),i*150));}

// ── DOM effects ───────────────────────────────────────────────
const SPARKS=['⭐','✨','💫','🌟','❤️'];
const CFTCOL=['#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93','#ff924c','#fff'];
const dynSty=document.createElement('style');
dynSty.textContent=`@keyframes spk{from{transform:translate(0,0)scale(.3);opacity:1}to{transform:translate(var(--dx),var(--dy))scale(1.1);opacity:0}}@keyframes cft{from{transform:translateY(0)rotate(0deg);opacity:1}to{transform:translateY(108vh)rotate(720deg);opacity:.2}}`;
document.head.appendChild(dynSty);

function spawnSparkle(sx,sy){
  for(let i=0;i<6;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;pointer-events:none;z-index:200;font-size:22px;left:${sx}px;top:${sy}px;animation:spk .65s ease-out forwards`;
    el.textContent=SPARKS[Math.floor(Math.random()*SPARKS.length)];
    const a=(i/6)*Math.PI*2,d=40+Math.random()*35;
    el.style.setProperty('--dx',Math.cos(a)*d+'px');
    el.style.setProperty('--dy',Math.sin(a)*d+'px');
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }
}
function confetti(){
  const win=document.getElementById('win');
  for(let i=0;i<80;i++) setTimeout(()=>{
    if(!win.classList.contains('show')) return;
    const el=document.createElement('div');
    const dur=1.8+Math.random()*2;
    el.style.cssText=`position:fixed;top:-16px;pointer-events:none;z-index:290;border-radius:2px;left:${Math.random()*100}vw;width:${8+Math.random()*9}px;height:${8+Math.random()*9}px;background:${CFTCOL[Math.floor(Math.random()*CFTCOL.length)]};animation:cft ${dur}s linear forwards`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(dur+.1)*1000);
  },i*45);
}

// ── Pixel drawing helpers ─────────────────────────────────────
function wpx(wx){ return (wx-cam.x)/PS|0; }
function wpy(wy){ return (wy-cam.y)/PS|0; }

function pr(x,y,w,h,c){
  if(w<=0||h<=0||x>=pixW||y>=pixH||x+w<=0||y+h<=0) return;
  pixCtx.fillStyle=c; pixCtx.fillRect(x,y,w,h);
}

function pixCircle(cx,cy,r,c){
  pixCtx.fillStyle=c;
  for(let dy=-r;dy<=r;dy++){
    const rw=Math.round(Math.sqrt(r*r-dy*dy));
    if(rw>0) pixCtx.fillRect(cx-rw,cy+dy,rw*2,1);
  }
}

function pixLine(x0,y0,x1,y1,t,c){
  const steps=Math.ceil(Math.hypot(x1-x0,y1-y0))||1;
  const h=t>>1;
  pixCtx.fillStyle=c;
  for(let i=0;i<=steps;i++){
    const f=i/steps;
    pixCtx.fillRect((x0+(x1-x0)*f|0)-h,(y0+(y1-y0)*f|0)-h,t,t);
  }
}

// ── Sprite helpers (draw onto any 2D context) ─────────────────
function spR(c,x,y,w,h,col){ if(w>0&&h>0){c.fillStyle=col;c.fillRect(x,y,w,h);} }
function spC(c,cx,cy,r,col){
  if(r<=0) return;
  c.fillStyle=col;
  for(let dy=-r;dy<=r;dy++){
    const rw=Math.round(Math.sqrt(r*r-dy*dy));
    if(rw>0) c.fillRect(cx-rw,cy+dy,rw*2,1);
  }
}
function spShadow(c,cx,cy,rx,ry){
  c.save(); c.globalAlpha=0.38;
  c.fillStyle='#000';
  c.beginPath();
  c.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  c.fill(); c.restore();
}

// ── Sprite: deciduous oak ─────────────────────────────────────
function makeDecidSpr(r){
  const W=(r*3+8)|0, H=(r*4+10)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W/2)|0, cy=H-3;
  const canY=(cy-r*.55)|0;

  spShadow(c, cx+r*.15, cy+2, r*.72, r*.22);

  // Trunk
  const tw=Math.max(2,(r*.18)|0), th=Math.max(3,(r*.55)|0);
  spR(c, cx-tw-2, cy-3,  3, 5, '#3e2208'); // root flare left
  spR(c, cx+tw-1, cy-3,  3, 5, '#4a2e10'); // root flare right
  spR(c, cx-tw,   cy-th, tw, th, '#7a4820'); // trunk left (lit)
  spR(c, cx,      cy-th, tw, th, '#3e2208'); // trunk right (shadow)
  c.fillStyle='#2a1406';
  for(let by=2;by<th-1;by+=4) c.fillRect(cx-tw+1,cy-th+by,1,2); // bark left
  for(let by=1;by<th-2;by+=5) c.fillRect(cx+1,   cy-th+by,1,2); // bark right
  spR(c, cx-tw-1, cy-3, 1, 3, '#1e3c0a'); // moss at base

  // Canopy — 8 concentric circles, offset up-left for sphere shading
  const sh=['#0c1a06','#162a0a','#1e3a0e','#285014','#30561a','#3a6820','#4a7828','#5a8a32'];
  spC(c, cx,   canY,    r,          sh[0]);
  spC(c, cx,   canY-1,  (r*.88)|0,  sh[1]);
  spC(c, cx-1, canY-2,  (r*.78)|0,  sh[2]);
  spC(c, cx-2, canY-3,  (r*.66)|0,  sh[3]);
  spC(c, cx-2, canY-5,  (r*.53)|0,  sh[4]);
  spC(c, cx-3, canY-7,  (r*.40)|0,  sh[5]);
  spC(c, cx-3, canY-9,  (r*.26)|0,  sh[6]);
  spC(c, cx-3, canY-11, (r*.14)|0,  sh[7]);
  if(r>=5) spR(c, cx-3, canY-13, Math.max(1,(r*.05)|0), 1, '#6a9838');

  // Leaf-cluster bumps around canopy edge for organic silhouette
  const lr=Math.max(1,(r*.13)|0);
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2;
    const lx=(cx+Math.cos(a)*r*.90)|0;
    const ly=(canY+Math.sin(a)*r*.90)|0;
    const lit=Math.sin(a-Math.PI*.75)>0.1;
    spC(c, lx, ly, lr, lit?sh[4]:sh[0]);
    if(lit&&lr>1) spC(c, lx-1, ly-1, Math.max(1,lr-1), sh[5]);
  }

  return {cv, ox:cx, oy:cy};
}

// ── Sprite: dark pine ─────────────────────────────────────────
function makePineSpr(r){
  const W=(r*2+8)|0, H=(r*4+8)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W/2)|0, cy=H-3;

  spShadow(c, cx, cy+1, r*.55, r*.17);

  // Trunk
  const th=(r*.45)|0;
  spR(c, cx-1, cy-th, 2, th, '#3e2208');
  spR(c, cx,   cy-th, 1, th, '#2a1406');

  const tiers=[
    {R:r,         baseY:cy,        dark:'#0e1e08',shd:'#080e04',lit:'#264018'},
    {R:(r*.70)|0, baseY:cy-r,      dark:'#0e1e08',shd:'#080e04',lit:'#2a4820'},
    {R:(r*.44)|0, baseY:cy-r*1.80|0, dark:'#162808',shd:'#0a1004',lit:'#30502a'},
  ];

  tiers.forEach(({R,baseY,dark,shd,lit})=>{
    // Base triangle
    c.fillStyle=dark;
    for(let row=0;row<R;row++){
      const rw=Math.round(R*(1-row/R))+1;
      c.fillRect(cx-rw, baseY-row, rw*2, 1);
    }
    // Right shadow band
    c.fillStyle=shd;
    for(let row=0;row<R;row++){
      const rw=Math.round(R*(1-row/R));
      c.fillRect(cx+Math.floor(rw*.45), baseY-row, Math.max(1,Math.ceil(rw*.55)), 1);
    }
    // Left highlight strip
    c.fillStyle=lit;
    for(let row=0;row<R;row++){
      const rw=Math.round(R*(1-row/R));
      c.fillRect(cx-rw, baseY-row, Math.max(1,Math.floor(rw*.30)), 1);
    }
    // Horizontal needle-texture lines
    c.fillStyle=shd;
    for(let row=2;row<R-1;row+=3){
      const rw=Math.round(R*(1-row/R));
      if(rw>3) c.fillRect(cx-rw+3, baseY-row, rw-3, 1);
    }
    // Droop pixels at tier base
    c.fillStyle=dark;
    for(let dx=-Math.ceil(R*.9);dx<=Math.ceil(R*.9);dx++){
      if(Math.abs(dx)>R*.35) c.fillRect(cx+dx, baseY, 1, 1);
    }
  });

  return {cv, ox:cx, oy:cy};
}

// ── Sprite: tall spruce ───────────────────────────────────────
function makeSpruSpr(r){
  const W=(r*2+6)|0, H=(r*5+8)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W/2)|0, cy=H-3;

  spShadow(c, cx, cy+1, r*.45, r*.13);
  spR(c, cx-1, cy-(r*.30)|0, 2, (r*.30)|0, '#3e2208');

  const DARK=['#091608','#111e0e','#192c16','#21381e','#2a4426'];
  const LIT =['#1a2e14','#223a1c','#2c4a26','#365630','#40623a'];
  const SHD =['#050e04','#091408','#0f200c','#152a12','#1c3618'];

  const tiers=[
    {R:r,         baseY:cy,           t:0},
    {R:(r*.76)|0, baseY:cy-r*.80|0,   t:1},
    {R:(r*.58)|0, baseY:cy-r*1.62|0,  t:2},
    {R:(r*.40)|0, baseY:cy-r*2.50|0,  t:3},
    {R:(r*.24)|0, baseY:cy-r*3.40|0,  t:4},
  ];

  tiers.forEach(({R,baseY,t})=>{
    c.fillStyle=DARK[t];
    for(let row=0;row<R;row++){
      const rw=Math.max(1,Math.round(R*(1-row/R)));
      c.fillRect(cx-rw, baseY-row, rw*2, 1);
    }
    c.fillStyle=LIT[t];
    for(let row=0;row<R;row++){
      const rw=Math.max(1,Math.round(R*(1-row/R)));
      c.fillRect(cx-rw, baseY-row, Math.max(1,Math.floor(rw*.25)), 1);
    }
    c.fillStyle=SHD[t];
    for(let row=0;row<R;row++){
      const rw=Math.max(1,Math.round(R*(1-row/R)));
      c.fillRect(cx+Math.floor(rw*.60), baseY-row, Math.max(1,Math.ceil(rw*.40)), 1);
    }
    // Dense needle lines
    c.fillStyle=SHD[t];
    for(let row=2;row<R-1;row+=2){
      const rw=Math.round(R*(1-row/R));
      if(rw>2) c.fillRect(cx+1, baseY-row, Math.max(1,rw-2), 1);
    }
    // Droop
    c.fillStyle=DARK[t];
    for(let dx=-Math.ceil(R*.9);dx<=Math.ceil(R*.9);dx++){
      if(Math.abs(dx)>R*.50) c.fillRect(cx+dx, baseY, 1, 1);
    }
  });
  // Tip spike
  c.fillStyle=LIT[4];
  c.fillRect(cx, cy-r*4.5|0, 1, Math.max(1,(r*.4)|0));

  return {cv, ox:cx, oy:cy};
}

// ── Sprite: broad drooping fir ────────────────────────────────
function makeFirSpr(r){
  const W=(r*2+10)|0, H=(r*3+8)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W/2)|0, cy=H-3;

  spShadow(c, cx, cy+1, r*.68, r*.20);
  spR(c, cx-1, cy-(r*.38)|0, 2, (r*.38)|0, '#3e2208');

  const tierH=(r*.95)|0;
  const tiers=[
    {R:r,          baseY:cy,          dark:'#0e1e0a',lit:'#263c1a',nd:'#080e06'},
    {R:(r*.82)|0,  baseY:cy-r*.72|0,  dark:'#102010', lit:'#283e22',nd:'#0a1008'},
    {R:(r*.60)|0,  baseY:cy-r*1.52|0, dark:'#142414', lit:'#2c4220',nd:'#0c1408'},
  ];

  tiers.forEach(({R,baseY,dark,lit,nd})=>{
    // Base fill with heavy droop at edges
    c.fillStyle=dark;
    for(let row=0;row<tierH;row++){
      const rw=Math.max(1,Math.round(R*(1-row/tierH*.80)));
      const droop=row<4?(4-row)*2:0;
      c.fillRect(cx-rw-droop, baseY-row, (rw+droop)*2, 1);
    }
    // Left lit
    c.fillStyle=lit;
    for(let row=0;row<tierH;row++){
      const rw=Math.max(1,Math.round(R*(1-row/tierH*.80)));
      c.fillRect(cx-rw, baseY-row, Math.max(1,Math.floor(rw*.28)), 1);
    }
    // Needle texture
    c.fillStyle=nd;
    for(let row=1;row<tierH-1;row+=3){
      const rw=Math.round(R*(1-row/tierH*.80));
      if(rw>4) c.fillRect(cx-rw+4, baseY-row, rw-4, 1);
    }
    // Hanging droop pixels
    c.fillStyle=dark;
    for(let dx=-Math.ceil(R);dx<=Math.ceil(R);dx++){
      if(Math.abs(dx)>R*.45) c.fillRect(cx+dx, baseY, 1, 2);
    }
  });
  // Tip spike
  c.fillStyle='#263c1a';
  c.fillRect(cx, cy-tierH*3|0, 1, Math.max(1,(tierH*.5)|0));

  return {cv, ox:cx, oy:cy};
}

// ── Sprite: Scots pine (tall trunk + flat crown) ──────────────
function makeScotsSpr(r){
  const tH=(r*2.3)|0;
  const W=(r*3+10)|0, H=(tH+r*1.6+10)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W/2)|0, cy=H-3;

  spShadow(c, cx, cy+1, r*.65, r*.18);

  // Tall bark trunk — orange scots pine
  const tw=Math.max(2,(r*.22)|0);
  spR(c, cx-tw, cy-tH, tw, tH, '#7a4a1e'); // left lit
  spR(c, cx,    cy-tH, tw, tH, '#4a2e0e'); // right dark
  c.fillStyle='#2e1808';
  for(let by=4;by<tH-4;by+=6){
    c.fillRect(cx-tw+1, cy-by,   tw-1, 1); // bark plate
    c.fillRect(cx+1,    cy-by,   tw-1, 1);
  }
  c.fillStyle='#8a5828';
  for(let by=3;by<tH-3;by+=8) c.fillRect(cx-tw+1, cy-by-1, 1, 1); // orange fleck
  spR(c, cx-tw-2, cy-4, 3, 5, '#4a2e0e'); // root flare
  spR(c, cx+tw-1, cy-4, 3, 5, '#4a2e0e');

  // Flat umbrella crown — two side lobes + center
  const crownY=(cy-tH-(r*.55))|0;
  const crow=(r*.72)|0, croh=(r*.45)|0;

  const lobes=[[cx-(r*.42)|0,crow,croh],[cx+(r*.42)|0,crow,croh],[cx,(r*.58)|0,(croh*.72)|0]];
  lobes.forEach(([lx,lrw,lrh])=>{
    // Dark base
    c.fillStyle='#0e1e0a';
    for(let dy=-lrh;dy<=lrh;dy++){
      const rw=Math.round(lrw*Math.sqrt(Math.max(0,1-(dy/lrh)**2)));
      if(rw>0) c.fillRect(lx-rw,crownY+dy,rw*2,1);
    }
    // Mid highlight
    c.fillStyle='#1a3010';
    for(let dy=-lrh*.5;dy<0;dy++){
      const rw=Math.round(lrw*.62*Math.sqrt(Math.max(0,1-(dy/(lrh*.5))**2)));
      if(rw>0) c.fillRect(lx-rw,crownY+dy|0,rw*2,1);
    }
    // Left lit strip
    c.fillStyle='#243818';
    for(let dy=-lrh*.45;dy<lrh*.1;dy++){
      const rw=Math.round(lrw*.62*Math.sqrt(Math.max(0,1-(dy/(lrh*.5))**2))*.25);
      if(rw>0) c.fillRect(lx-lrw*.5|0,crownY+dy|0,rw,1);
    }
  });

  return {cv, ox:cx, oy:cy};
}

// ── Sprite: shrub ─────────────────────────────────────────────
function makeShrubSpr(r){
  const W=(r*3+6)|0, H=(r*2+6)|0;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const cx=(W/2)|0, cy=H-2;

  spShadow(c, cx, cy+1, r*.80, r*.22);

  // Three overlapping blob circles
  spC(c, cx-(r*.55)|0, cy-(r*.52)|0, (r*.60)|0, '#122008');
  spC(c, cx+(r*.55)|0, cy-(r*.48)|0, (r*.56)|0, '#162608');
  spC(c, cx,           cy-(r*.72)|0, (r*.74)|0, '#1c2e0e');
  // Highlight zone
  spC(c, cx-(r*.20)|0, cy-r|0,       (r*.45)|0, '#263c12');
  spC(c, cx-(r*.14)|0, cy-(r*1.22)|0,(r*.24)|0, '#304818');

  // Leaf-bump organic edge
  const lr=Math.max(1,(r*.12)|0);
  for(let i=0;i<10;i++){
    const a=(i/10)*Math.PI*2;
    const lx=(cx+Math.cos(a)*r*.74)|0;
    const ly=(cy-(r*.72)+Math.sin(a)*r*.72)|0;
    spC(c, lx, ly, lr, Math.sin(a-Math.PI*.7)>0.1?'#2c4216':'#102008');
  }

  return {cv, ox:cx, oy:cy};
}

// ── Sprite lazy cache ─────────────────────────────────────────
function getTreeSpr(type,r){
  const rr=Math.max(3,Math.round(r/2)*2);
  const key=type+'_'+rr;
  if(!SP[key]) SP[key]=
    type===0?makeDecidSpr(rr):
    type===1?makePineSpr(rr):
    type===2?makeSpruSpr(rr):
    type===3?makeFirSpr(rr):
             makeScotsSpr(rr);
  return SP[key];
}
function getShrubSpr(r){
  const rr=Math.max(2,Math.round(r/2)*2);
  const key='shrub_'+rr;
  if(!SP[key]) SP[key]=makeShrubSpr(rr);
  return SP[key];
}

// ── Ground ────────────────────────────────────────────────────
function drawGround(){
  pr(0,0,pixW,pixH,'#3a5a18');

  // World-fixed variation patches
  PATCHES.forEach(p=>{
    const sx=wpx(p.x*WW), sy=wpy(p.y*WH);
    const sw=Math.max(1,p.w*WW/PS|0), sh=Math.max(1,p.h*WH/PS|0);
    pr(sx,sy,sw,sh,p.d?'#263c0e':'#4e7422');
  });

  // Fine grass-blade variation using world-coordinate hash
  for(let py=0;py<pixH;py+=3){
    for(let px=0;px<pixW;px+=3){
      const wx=(cam.x+px*PS)|0, wy=(cam.y+py*PS)|0;
      const h=(wx*17+wy*31)&0xff;
      if(h<30)       pr(px,py,1,1,'#4e7422');
      else if(h<55)  pr(px,py,1,1,'#263c0e');
      else if(h<64)  pr(px,py,1,1,'#5a7a1e');
    }
  }

  // Flowers
  FLOWERS.forEach(f=>{
    const sx=wpx(f.x*WW), sy=wpy(f.y*WH);
    if(sx<-2||sx>pixW+2||sy<-2||sy>pixH+2) return;
    pr(sx,sy-1,1,1,f.c); pr(sx-1,sy,1,1,f.c);
    pr(sx,sy,1,1,'#d8c840');
    pr(sx+1,sy,1,1,f.c); pr(sx,sy+1,1,1,f.c);
  });
}

// ── Rivers ────────────────────────────────────────────────────
function drawRivers(){
  RIVERS.forEach(pts=>{
    const pxPts=pts.map(p=>({x:wpx(p.x*WW),y:wpy(p.y*WH)}));
    for(let i=0;i<pxPts.length-1;i++){
      const {x:x0,y:y0}=pxPts[i], {x:x1,y:y1}=pxPts[i+1];
      if(x0<-10&&x1<-10||x0>pixW+10&&x1>pixW+10) continue;
      pixLine(x0,y0,x1,y1,9,'#7a6418'); // outer sandy bank
      pixLine(x0,y0,x1,y1,7,'#6a5410'); // inner bank
      pixLine(x0,y0,x1,y1,5,'#1a4f80'); // deep water
      pixLine(x0,y0,x1,y1,3,'#2870a8'); // surface water
      pixLine(x0,y0,x1,y1,1,'#5090c0'); // center bright
      const tick=Math.floor(gameTime*4)%4;
      const f=((i*3+tick)%4)/4;
      const sx=(x0+(x1-x0)*f|0), sy=(y0+(y1-y0)*f|0);
      pr(sx,sy,1,1,'#80c8f0');
    }
  });
}

// ── Water bodies ─────────────────────────────────────────────
function drawWater(w,wi){
  const cx=wpx(w.x*WW), cy=wpy(w.y*WH);
  const rx=Math.max(2,(w.rx*WW/PS)|0), ry=Math.max(2,(w.ry*WH/PS)|0);
  if(cx+rx<0||cx-rx>pixW||cy+ry<0||cy-ry>pixH) return;

  // Sandy shore — two-tone concentric ellipses
  pixCtx.fillStyle='#9a7830';
  for(let dy=-ry-2;dy<=ry+2;dy++){
    const rw=Math.round((rx+2)*Math.sqrt(Math.max(0,1-(dy/(ry+2))**2)));
    if(rw>0) pixCtx.fillRect(cx-rw,cy+dy,rw*2,1);
  }
  pixCtx.fillStyle='#7a6020';
  for(let dy=-ry-1;dy<=ry+1;dy++){
    const rw=Math.round((rx+1)*Math.sqrt(Math.max(0,1-(dy/(ry+1))**2)));
    if(rw>0) pixCtx.fillRect(cx-rw,cy+dy,rw*2,1);
  }

  // Deep water base
  pixCtx.fillStyle='#0e3050';
  for(let dy=-ry;dy<=ry;dy++){
    const rw=Math.round(rx*Math.sqrt(Math.max(0,1-(dy/ry)**2)));
    if(rw>0) pixCtx.fillRect(cx-rw,cy+dy,rw*2,1);
  }

  // Mid water
  pixCtx.fillStyle='#1a5080';
  for(let dy=-ry+1;dy<ry-1;dy++){
    const rw=Math.round((rx-1)*Math.sqrt(Math.max(0,1-(dy/ry)**2)));
    if(rw>0) pixCtx.fillRect(cx-rw,cy+dy,rw*2,1);
  }

  // AoE2 cross-hatch ripple
  const tick=Math.floor(gameTime*2)%4;
  pixCtx.fillStyle='#2870a8';
  for(let row=cy-ry+2;row<cy+ry-2;row+=2){
    const rw=Math.round((rx-2)*Math.sqrt(Math.max(0,1-((row-cy)/ry)**2)));
    if(rw>0) pixCtx.fillRect(cx-rw+(row+tick)%2, row, rw*2, 1);
  }

  // Moving ripple lines
  pixCtx.fillStyle='#3888c0';
  for(let row=cy-ry+3;row<cy+ry-3;row+=4){
    const rw=Math.round((rx-3)*Math.sqrt(Math.max(0,1-((row-cy)/ry)**2)));
    const off=(Math.floor(gameTime*1.5)+row)%6;
    if(rw>1&&off<3) pixCtx.fillRect(cx-rw+off, row, Math.min(rw,5), 1);
  }

  // Bright glint
  pr((cx-rx/3)|0,(cy-ry/3)|0, 4,1,'#78d0f8');
  pr((cx-rx/3+1)|0,(cy-ry/3+1)|0, 2,1,'#50a8d0');

  // Lily pads on smaller ponds
  if(rx < pixW*.08){
    const lr=mkRng(wi*71+13);
    const nL=2+Math.floor(lr()*3);
    for(let i=0;i<nL;i++){
      const la=lr()*Math.PI*2, ld=lr()*(rx*.6);
      const lx=(cx+Math.cos(la)*ld)|0, ly=(cy+Math.sin(la)*ld*.7)|0;
      const ls=Math.max(2,(rx*.18+lr()*rx*.1)|0);
      pr(lx-ls,ly-ls/2|0,ls*2,ls,'#183808');
      pr(lx-ls+1,ly-ls/2|0+1,ls*2-2,Math.max(1,ls-2),'#203c10');
      pr(lx,ly-ls/2|0,1,ls/2|0,'#1a5080');
      if(lr()>.5){
        pr(lx-1,ly-ls/2|0-1,3,2,'#f8d0e0');
        pr(lx,  ly-ls/2|0-2,1,1,'#ffd020');
      }
    }
    const nr=mkRng(wi*53+7);
    for(let i=0;i<4;i++){
      const ra=nr()*Math.PI*2, rd=rx*(0.85+nr()*.15);
      const rx2=(cx+Math.cos(ra)*rd)|0, ry2=(cy+Math.sin(ra)*rd*.7)|0;
      const rh=Math.max(3,(rx*.7+nr()*rx*.4)|0);
      pixLine(rx2,ry2,rx2+(nr()-.5)*2|0,ry2-rh,1,'#7a6018');
      pr(rx2-1,ry2-rh-1,2,3,'#3e1a08');
    }
  }
}
function drawWaters(){ WATER_DEF.forEach((w,i)=>drawWater(w,i)); }

// ── Hills ─────────────────────────────────────────────────────
function drawHill(m){
  const cx=wpx(m.x*WW), cy=wpy(m.y*WH);
  const w=(m.s*Math.min(WW,WH)*.20/PS)|0, h=(m.s*Math.min(WW,WH)*.16/PS)|0;
  if(cx+w<0||cx-w>pixW||cy<0||cy-h>pixH) return;

  // Base silhouette — 5 tonal bands
  for(let row=0;row<=h;row++){
    const t=row/h;
    const rw=Math.round(w*(1-t*t*0.9));
    const col=t>.88?'#c8baa8':t>.72?'#a89888':t>.50?'#8a7a68':t>.28?'#6a5a48':'#4a3a2c';
    pr(cx-rw, cy-row, rw*2, 1, col);
  }

  // Geological strata lines
  for(let row=Math.floor(h*.12);row<Math.floor(h*.80);row+=Math.max(3,Math.floor(h*.11))){
    const t=row/h;
    const rw=Math.round(w*(1-t*t*.9));
    pr(cx-rw+2, cy-row, Math.max(1,rw*2-4), 1, '#7a6858');
  }

  // Rock crevices (diagonal dark streaks with lit counter-edge)
  const cr=mkRng(m.x*511+m.y*211|0);
  for(let i=0;i<8+Math.floor(m.s*7);i++){
    const crx=(cx+(cr()-.5)*w*1.3)|0;
    const cry=(cy-cr()*h*.80)|0;
    const crl=2+Math.floor(cr()*5);
    for(let j=0;j<crl;j++)   pr(crx+j, cry-j, 1, 1, '#2e1e14');
    for(let j=0;j<crl-1;j++) pr(crx+j-1, cry-j+1, 1, 1, '#8a7a68');
  }

  // Base shadow
  pr(cx-w, cy, w*2, 3, '#2e1e14');

  // Snow cap for larger mountains
  if(m.s>.65){
    const fr=mkRng(m.x*333+m.y*777|0);
    const sr=Math.floor(h*.84), st=sr/h;
    const srw=Math.round(w*(1-st*st*.9));
    pr(cx-srw, cy-sr, srw*2, 1, '#bab0a0');
    for(let i=0;i<6+Math.floor(m.s*3);i++){
      const fx=(cx+(fr()-.5)*srw*.8)|0, fy=(cy-sr-fr()*h*.13)|0;
      pr(fx,fy,2,1,'#c8c0b0'); pr(fx+1,fy-1,1,1,'#e8e0d8');
    }
  }

  // Scrub at foot
  const fpr=mkRng(m.x*777+m.y*333|0);
  for(let i=0;i<4;i++){
    const fx=(cx+(fpr()-.5)*w*1.5)|0, fy=(cy-fpr()*h*.18)|0;
    pr(fx,fy,1,1,'#1a3008'); pr(fx+1,fy-1,1,1,'#283018');
  }
}

// ── Tree draw functions (sprite-based) ────────────────────────
function drawRoundTree(wx,wy,sz){
  const x=wpx(wx), y=wpy(wy);
  const r=Math.max(3,(sz/PS)|0);
  if(x+r*2<0||x-r*2>pixW||y+r<0||y-r*4>pixH) return;
  const s=getTreeSpr(0,r);
  pixCtx.drawImage(s.cv, x-s.ox, y-s.oy);
}
function drawPineTree(wx,wy,sz){
  const x=wpx(wx), y=wpy(wy);
  const r=Math.max(3,(sz/PS)|0);
  if(x+r<0||x-r>pixW||y<0||y-r*4>pixH) return;
  const s=getTreeSpr(1,r);
  pixCtx.drawImage(s.cv, x-s.ox, y-s.oy);
}
function drawSpruce(wx,wy,sz){
  const x=wpx(wx), y=wpy(wy);
  const r=Math.max(3,(sz*.72/PS)|0);
  if(x+r+2<0||x-r-2>pixW||y<0||y-r*5>pixH) return;
  const s=getTreeSpr(2,r);
  pixCtx.drawImage(s.cv, x-s.ox, y-s.oy);
}
function drawBroadFir(wx,wy,sz){
  const x=wpx(wx), y=wpy(wy);
  const r=Math.max(3,(sz*1.10/PS)|0);
  if(x+r+3<0||x-r-3>pixW||y<0||y-r*3>pixH) return;
  const s=getTreeSpr(3,r);
  pixCtx.drawImage(s.cv, x-s.ox, y-s.oy);
}
function drawScotsPine(wx,wy,sz){
  const x=wpx(wx), y=wpy(wy);
  const r=Math.max(3,(sz/PS)|0);
  if(x+r*1.6<0||x-r*1.6>pixW||y<0||y-r*4>pixH) return;
  const s=getTreeSpr(4,r);
  pixCtx.drawImage(s.cv, x-s.ox, y-s.oy);
}

// ── Shrub (sprite-based) ──────────────────────────────────────
function drawShrub(sh){
  const x=wpx(sh.x*WW), y=wpy(sh.y*WH);
  if(x<-24||x>pixW+24||y<-24||y>pixH+8) return;
  const r=Math.max(2,(Math.min(VW,VH)*sh.m*.022/PS)|0);
  const s=getShrubSpr(r);
  pixCtx.drawImage(s.cv, x-s.ox, y-s.oy);
  if(sh.berries){
    const br=mkRng(sh.x*999+sh.y*137|0);
    for(let i=0;i<3;i++){
      const ba=br()*Math.PI*2, bd=r*(0.3+br()*.5);
      pr((x+Math.cos(ba)*bd)|0,(y+Math.sin(ba)*bd-r*.5)|0,1,1,br()>.5?'#cc1010':'#1020a0');
    }
  }
}

// ── Mushroom ──────────────────────────────────────────────────
function drawMushroom(m){
  if(m.collected) return;
  const x=wpx(m.fx*WW), y=wpy(m.fy*WH);
  if(x<-18||x>pixW+18||y<-22||y>pixH+4) return;
  const s=Math.max(2,(Math.min(VW,VH)*.048/PS)|0);

  // Ground shadow
  pr(x-s,y+1,s*2,1,'#2a3a10');

  // Stem — cream with subtle shading
  pr(x-s/2|0,    y-s*2,    s,   s*2, '#e8e0c0');
  pr(x-s/2-1|0,  y-s,      s+2, 1,   '#f0ead8'); // wider base
  pr(x-s/2|0,    y-s*2,    1,   s*2, '#d0c8a0'); // left shade
  pr(x+s/2-1|0,  y-s*2,    1,   s*2, '#f8f4e8'); // right highlight
  pr(x-s/2-1|0,  y-s*1.2|0,s+2, 1,   '#d8d0a8'); // veil skirt

  // Cap — bottom dark rim first
  pr(x-(s*2)|0, y-s*2, s*4, (s*.4)|0, '#501010');

  // Cap rows: fly-agaric dome shape
  const rows=[
    {rw:(s*1.8)|0, yy:y-s*2-(s*.3)|0, col:'#881010'},
    {rw:(s*1.95)|0,yy:y-s*2-(s*.65)|0,col:'#aa1616'},
    {rw:(s*2.05)|0,yy:y-s*2-(s*.95)|0,col:'#cc1e1e'},
    {rw:(s*2.0)|0, yy:y-s*2-(s*1.25)|0,col:'#dd2828'},
    {rw:(s*1.85)|0,yy:y-s*2-(s*1.55)|0,col:'#cc2020'},
    {rw:(s*1.55)|0,yy:y-s*2-(s*1.85)|0,col:'#b81818'},
    {rw:(s*1.15)|0,yy:y-s*2-(s*2.15)|0,col:'#a01414'},
    {rw:(s*.65)|0, yy:y-s*2-(s*2.45)|0,col:'#8a1010'},
    {rw:(s*.28)|0, yy:y-s*2-(s*2.68)|0,col:'#701010'},
  ];
  const rowH=Math.max(1,(s*.38)|0);
  rows.forEach(({rw,yy,col})=>{
    pr(x-rw, yy, rw*2, rowH, col);
    pr(x+rw/2|0, yy, (rw*.5)|0, rowH, '#6a0808'); // right shadow
    if(rw>4) pr(x-rw, yy, Math.max(1,(rw*.22)|0), rowH, '#ee4040'); // left lit
  });

  // White spots
  const ss=Math.max(1,(s*.6)|0);
  [[x-s,y-s*3.4|0],[x+s*.5|0,y-s*3.8|0],[x-s*.2|0,y-s*4.5|0]].forEach(([sx,sy])=>{
    pr(sx-1,sy-1,ss+2,ss,'#e8e8e4');
    pr(sx,  sy,  ss,  ss,'#ffffff');
  });
}

// ── Snufkin ───────────────────────────────────────────────────
function drawSnufkin(wx,wy,t,moving){
  const cx=wpx(wx), cy=wpy(wy);
  const f=char.facing;
  const s=Math.max(1,(Math.min(VW,VH)*.012/PS)|0);
  const bob=moving?(Math.floor(t*8)%2):0;
  const step=moving?Math.floor(t*7)%4:0;

  function sp(dx,dy,w,h,c){
    const x0=f>0 ? cx+dx*s : cx-(dx+w)*s;
    pr(x0, cy+dy*s+bob, w*s, h*s, c);
  }

  pr(cx-s*3,cy,s*6,s,P.grassD);

  const llY=(step===1)?-1:(step===3)?1:0;
  const lrY=-llY;
  sp(-3,-4+llY, 2,4, P.belt);
  sp( 1,-4+lrY, 2,4, P.belt);
  sp(-3, llY,   3,1, P.shoe);
  sp( 1, lrY,   3,1, P.shoe);

  sp(-5,-9, 2,6, P.cape);
  sp(-5,-3, 2,2, P.capeD);

  sp(-2,-9, 5,5, P.coat);
  sp(-2,-5, 5,1, P.coatD);

  sp(-2,-5, 5,1, P.belt);
  sp(-1,-6, 2,2, '#d4a010');

  sp(-2,-13, 5,4, P.skin);
  sp( 3,-12, 1,2, P.skinD);

  sp(-1,-12, 1,1, P.outline);
  sp( 1,-12, 1,1, P.outline);
  sp( 0,-11, 1,1, P.skinD);
  sp(-1,-10, 1,1, '#904828'); sp(1,-10,1,1,'#904828');

  sp( 3,-11, 3,1, P.trunkD);
  sp( 5,-10, 1,2, P.trunkD);
  sp( 4,-10, 2,1, P.trunkD);

  if(!moving){
    const p=Math.floor(t*2)%4;
    sp(6,-11-p*2, p>0?2:1, 1, '#d0d0d8');
    sp(7,-13-p,   1,       1, '#b8b8c8');
  }

  sp(-4,-13, 8,1, P.hatD);
  sp(-4,-14, 8,1, P.hat);

  sp(-2,-18, 4,4, P.hat);
  sp(-2,-15, 4,1, P.hat);
  sp(-2,-15, 4,1, '#c49a3a');
  sp(-1,-17, 1,2, P.hatD);
}

// ── Vegetation (depth-sorted) ─────────────────────────────────
let treeSz=0;
function setTreeSize(){ treeSz=Math.min(VW,VH)*.062; }

function drawVegetation(){
  const pad=Math.min(WW,WH)*.15;
  const x0=cam.x-pad,x1=cam.x+VW+pad,y0=cam.y-pad,y1=cam.y+VH+pad;
  const items=[];

  SHRUBS.forEach(sh=>{
    const sx=sh.x*WW,sy=sh.y*WH;
    if(sx>x0&&sx<x1&&sy>y0&&sy<y1) items.push({wy:sy,fn:()=>drawShrub(sh)});
  });
  TREES.forEach(tr=>{
    const tx=tr.x*WW,ty=tr.y*WH;
    if(tx>x0&&tx<x1&&ty>y0&&ty<y1){
      const sz=treeSz*tr.m;
      items.push({wy:ty,fn:
        tr.t===0?()=>drawRoundTree(tx,ty,sz):
        tr.t===1?()=>drawPineTree(tx,ty,sz):
        tr.t===2?()=>drawSpruce(tx,ty,sz):
        tr.t===3?()=>drawBroadFir(tx,ty,sz):
                 ()=>drawScotsPine(tx,ty,sz)
      });
    }
  });

  items.sort((a,b)=>a.wy-b.wy);
  items.forEach(it=>it.fn());
}

// ── Minimap ───────────────────────────────────────────────────
function renderMinimap(){
  const mw=mmCv.width,mh=mmCv.height;
  mmCtx.fillStyle=P.mm_g; mmCtx.fillRect(0,0,mw,mh);
  RIVERS.forEach(pts=>{
    mmCtx.strokeStyle=P.mm_w;mmCtx.lineWidth=2;
    mmCtx.beginPath();pts.forEach((p,i)=>i===0?mmCtx.moveTo(p.x*mw,p.y*mh):mmCtx.lineTo(p.x*mw,p.y*mh));mmCtx.stroke();
  });
  WATER_DEF.forEach(w=>{
    mmCtx.fillStyle=P.mm_w;
    mmCtx.beginPath();mmCtx.ellipse(w.x*mw,w.y*mh,w.rx*mw,w.ry*mh,0,0,Math.PI*2);mmCtx.fill();
  });
  MOUNT_DEF.forEach(m=>{
    mmCtx.fillStyle=P.mm_h;
    mmCtx.beginPath();mmCtx.arc(m.x*mw,m.y*mh,m.s*Math.min(mw,mh)*.09,0,Math.PI*2);mmCtx.fill();
  });
  mmCtx.fillStyle='#2a5010';
  TREES.forEach(t=>mmCtx.fillRect(t.x*mw-1,t.y*mh-1,2,2));
  MUSHROOMS.forEach(m=>{
    mmCtx.fillStyle=m.collected?'rgba(120,120,120,.5)':'#cc3838';
    mmCtx.beginPath();mmCtx.arc(m.fx*mw,m.fy*mh,2.5,0,Math.PI*2);mmCtx.fill();
  });
  mmCtx.strokeStyle='rgba(255,255,255,.88)';mmCtx.lineWidth=1.5;
  mmCtx.strokeRect(cam.x/WW*mw,cam.y/WH*mh,VW/WW*mw,VH/WH*mh);
  mmCtx.fillStyle='#ffe050';mmCtx.strokeStyle='#5a3800';mmCtx.lineWidth=1;
  mmCtx.beginPath();mmCtx.arc(char.x/WW*mw,char.y/WH*mh,3.5,0,Math.PI*2);mmCtx.fill();mmCtx.stroke();
}

// ── Render ────────────────────────────────────────────────────
function render(){
  pixCtx.clearRect(0,0,pixW,pixH);
  drawGround();
  drawRivers();
  drawWaters();
  MOUNT_DEF.slice().sort((a,b)=>b.s-a.s).forEach(m=>drawHill(m));
  drawVegetation();
  MUSHROOMS.forEach(m=>drawMushroom(m));
  const moving=Math.abs(char.vx)>5||Math.abs(char.vy)>5;
  drawSnufkin(char.x,char.y,gameTime,moving);

  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(pixCv,0,0,VW,VH);
  renderMinimap();
}

// ── Update ────────────────────────────────────────────────────
function update(dt){
  if(gameWon) return;
  gameTime+=dt;
  const {dx,dy}=inputDir();
  if(dx!==0) char.facing=dx>0?1:-1;
  const nx=char.x+dx*SPEED*dt, ny=char.y+dy*SPEED*dt;
  if(!blocked(nx,ny)){
    char.x=nx; char.y=ny;
  } else {
    if(!blocked(nx,char.y)) char.x=nx;
    if(!blocked(char.x,ny)) char.y=ny;
  }
  char.vx=dx*SPEED; char.vy=dy*SPEED;
  easeCamera(dt);
  MUSHROOMS.forEach(m=>{
    if(m.collected) return;
    if(Math.hypot(char.x-m.fx*WW,char.y-m.fy*WH)<PICK_R){
      m.collected=true; collected++;
      document.getElementById('cnt').textContent=collected;
      playPick(); spawnSparkle(char.x-cam.x,char.y-cam.y);
      if(collected>=MUSHROOMS.length) setTimeout(showWin,400);
    }
  });
}

// ── Win ───────────────────────────────────────────────────────
function showWin(){
  gameWon=true;
  const win=document.getElementById('win');
  win.classList.add('show');
  document.getElementById('btn-play').focus();
  playWin();confetti();
}

// ── Resize & init ─────────────────────────────────────────────
function resize(){
  const hadPreviousWorld=Boolean(WW&&WH&&MUSHROOMS.length>0);
  const collectedState=hadPreviousWorld?MUSHROOMS.map(m=>m.collected):null;
  const charFx=hadPreviousWorld?char.x/WW:.30;
  const charFy=hadPreviousWorld?char.y/WH:.35;
  const camFx=hadPreviousWorld?cam.x/WW:0;
  const camFy=hadPreviousWorld?cam.y/WH:0;
  VW=canvas.width=window.innerWidth;
  VH=canvas.height=window.innerHeight;
  WW=VW*7; WH=VH*7;
  mmCv.width=MM_W; mmCv.height=Math.round(MM_W*VH/VW);
  PS=Math.max(1,Math.round(VW/640));
  pixW=Math.ceil(VW/PS); pixH=Math.ceil(VH/PS);
  pixCv.width=pixW; pixCv.height=pixH;
  ctx.imageSmoothingEnabled=false;
  // Clear sprite cache on resize (sprite sizes may change with new PS)
  for(const k in SP) delete SP[k];
  setTreeSize();
  buildWorld();
  if(collectedState) {
    MUSHROOMS.forEach((m,i)=>m.collected=Boolean(collectedState[i]));
  }
  char.x=Math.max(CHAR_R,Math.min(WW-CHAR_R,charFx*WW));
  char.y=Math.max(CHAR_R,Math.min(WH-CHAR_R,charFy*WH));
  cam.x=Math.max(0,Math.min(WW-VW,camFx*WW));
  cam.y=Math.max(0,Math.min(WH-VH,camFy*WH));
  document.getElementById('cnt').textContent=collected;
}

function startGame(){
  document.getElementById('btn-play').blur();
  collected=0; gameWon=false; gameTime=0;
  MUSHROOMS.forEach(m=>m.collected=false);
  document.getElementById('cnt').textContent='0';
  document.getElementById('win').classList.remove('show');
  const start=findStart(); char.x=start.x; char.y=start.y; char.vx=0; char.vy=0; char.facing=1;
  snapCam();
}

document.getElementById('btn-play').addEventListener('click',startGame);
window.addEventListener('resize',resize);
document.getElementById('mapnum').textContent = mapNum;

resize();
startGame();
let lastT=0;
function loop(t){const dt=Math.min((t-lastT)/1000,.05);lastT=t;update(dt);render();requestAnimationFrame(loop);}
lastT=performance.now();
requestAnimationFrame(loop);
</script>
