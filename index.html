<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sienimetsa 🍄</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#2d5a1b;}
canvas{display:block;}

#hud{
  position:fixed;top:14px;left:14px;z-index:50;
  background:rgba(255,248,220,.93);border:3px solid #c88a00;
  border-radius:18px;padding:8px 18px;
  font:700 clamp(18px,4.5vw,30px)/1 Georgia,serif;
  color:#5d3200;display:flex;align-items:center;gap:6px;
  box-shadow:0 3px 10px rgba(0,0,0,.22);
}

#mm-wrap{
  position:fixed;bottom:14px;right:14px;z-index:50;
  border:3px solid rgba(255,255,255,.65);border-radius:8px;
  overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.45);
  background:#2d5a1b;
}
#minimap{display:block;}

#joy-zone{position:fixed;inset:0;z-index:20;pointer-events:none;}
#joy-base{
  position:absolute;display:none;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.18);border:3px solid rgba(255,255,255,.4);
  transform:translate(-50%,-50%);
}
#joy-knob{
  position:absolute;top:50%;left:50%;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.6);transform:translate(-50%,-50%);
}

#win{
  position:fixed;inset:0;z-index:300;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(12px,3vh,28px);text-align:center;
  background:rgba(255,220,40,.94);backdrop-filter:blur(4px);
  font-family:Georgia,serif;
}
#win.show{display:flex;animation:winPop .6s cubic-bezier(.175,.885,.32,1.275);}
@keyframes winPop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.wb{font-size:clamp(50px,13vw,100px);}
.wm{font-size:clamp(20px,5vw,44px);color:#5d2600;font-weight:700;}
#btn-play{
  font-size:clamp(18px,4vw,32px);font-family:Georgia,serif;
  padding:clamp(12px,2.5vh,20px) clamp(28px,6vw,56px);
  background:#e85d04;color:#fff;border:none;border-radius:50px;
  cursor:pointer;box-shadow:0 6px 0 #9d2700;
  transition:transform .1s,box-shadow .1s;touch-action:manipulation;
}
#btn-play:active{transform:translateY(4px);box-shadow:0 2px 0 #9d2700;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">🧺 <span id="cnt">0</span> / <span id="tot">?</span></div>
<div id="mm-wrap"><canvas id="minimap"></canvas></div>
<div id="joy-zone"><div id="joy-base"><div id="joy-knob"></div></div></div>
<div id="win" role="dialog" aria-modal="true" aria-labelledby="wm-label">
  <div class="wb">🎉🍄🎉</div>
  <div class="wm" id="wm-label">Löysit kaikki sienet!</div>
  <div class="wb" style="font-size:clamp(40px,10vw,78px)">⭐⭐⭐</div>
  <button id="btn-play">🔄 Uudelleen!</button>
</div>
<script>
'use strict';

// ── Canvas setup ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const mmCv   = document.getElementById('minimap');
const mmCtx  = mmCv.getContext('2d');

let VW, VH, WW, WH; // viewport and world pixel sizes
const MM_W = 160;    // minimap width px

// ── Seeded RNG ────────────────────────────────────────────────
function mkRng(seed) {
  let s = seed >>> 0;
  return () => { s = Math.imul(s,1664525)+1013904223>>>0; return s/2**32; };
}

// ── World data (normalised 0-1 coords) ───────────────────────
const WATER = [
  {x:.62,y:.45,rx:.09,ry:.065},
  {x:.22,y:.74,rx:.055,ry:.040},
  {x:.45,y:.28,rx:.030,ry:.025},
  {x:.82,y:.62,rx:.028,ry:.022},
  {x:.10,y:.35,rx:.040,ry:.032},
];
const RIVERS = [
  [{x:.48,y:0},{x:.50,y:.10},{x:.52,y:.20},{x:.55,y:.30},{x:.58,y:.38},{x:.62,y:.45}],
  [{x:.65,y:.48},{x:.68,y:.56},{x:.72,y:.64},{x:.75,y:.72},{x:.78,y:.80}],
  [{x:0,y:.42},{x:.05,y:.40},{x:.10,y:.37},{x:.10,y:.35}],
];
const MOUNTS = [
  {x:.72,y:.08,s:.9},{x:.80,y:.12,s:.75},{x:.87,y:.07,s:.85},
  {x:.78,y:.18,s:.60},{x:.92,y:.14,s:.65},{x:.68,y:.14,s:.55},
  {x:.35,y:.18,s:.45},{x:.15,y:.54,s:.50},{x:.60,y:.80,s:.55},
];
const SHROOM_POS = [
  [.12,.22],[.28,.18],[.06,.62],[.18,.80],[.32,.70],
  [.42,.58],[.55,.68],[.35,.42],[.20,.48],[.08,.88],
  [.50,.82],[.65,.72],[.72,.36],[.88,.45],[.92,.25],
  [.40,.12],[.58,.15],[.15,.08],[.30,.88],[.80,.85],
];

let TREES=[], BUSHES=[], MUSHROOMS=[], COLLIDERS=[];

function buildWorld() {
  const r = mkRng(42);
  TREES = [];
  // Dense forest bottom-left
  for(let i=0;i<70;i++) TREES.push({x:r()*.38,y:.56+r()*.42,e:r()>.45?'🌲':'🌳'});
  // Top-left patch
  for(let i=0;i<35;i++) TREES.push({x:r()*.28,y:r()*.50,e:'🌲'});
  // Mountain pines
  for(let i=0;i<20;i++) TREES.push({x:.60+r()*.38,y:r()*.35,e:'🌲'});
  // Scattered
  for(let i=0;i<55;i++) TREES.push({x:r(),y:r(),e:r()>.55?'🌲':'🌳'});
  // Bushes
  BUSHES=[];
  for(let i=0;i<130;i++) BUSHES.push({x:r(),y:r()});
  // Flowers scattered
  for(let i=0;i<60;i++) BUSHES.push({x:r(),y:r(),e:'🌸'});

  MUSHROOMS = SHROOM_POS.map(([fx,fy])=>({fx,fy,collected:false}));

  COLLIDERS = [
    ...WATER.map(w=>({fx:w.x,fy:w.y,frx:w.rx*1.05,fry:w.ry*1.05,shape:'ellipse'})),
    ...MOUNTS.map(m=>({fx:m.x,fy:m.y,fr:m.s*.07})),
  ];

  document.getElementById('tot').textContent = MUSHROOMS.length;
}

// ── Character ─────────────────────────────────────────────────
const char = {x:0,y:0,vx:0,vy:0,facing:1};
const SPEED  = 260; // world px/s
const CHAR_R = 14;
const PICK_R = 38;

// ── Camera ────────────────────────────────────────────────────
const cam = {x:0,y:0};
function snapCam() {
  cam.x = Math.max(0,Math.min(WW-VW, char.x-VW/2));
  cam.y = Math.max(0,Math.min(WH-VH, char.y-VH/2));
}
function easeCamera(dt) {
  const tx = Math.max(0,Math.min(WW-VW, char.x-VW/2));
  const ty = Math.max(0,Math.min(WH-VH, char.y-VH/2));
  cam.x += (tx-cam.x)*Math.min(1,dt*8);
  cam.y += (ty-cam.y)*Math.min(1,dt*8);
}

// ── Input ─────────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup',e=>keys[e.key]=false);

const joy={active:false,bx:0,by:0,dx:0,dy:0};
const joyBase=document.getElementById('joy-base');
const joyKnob=document.getElementById('joy-knob');
const JR=50;

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  joy.active=true; joy.bx=t.clientX; joy.by=t.clientY; joy.dx=0; joy.dy=0;
  joyBase.style.left=t.clientX+'px'; joyBase.style.top=t.clientY+'px';
  joyBase.style.display='block';
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const dx=t.clientX-joy.bx, dy=t.clientY-joy.by;
  const a=Math.atan2(dy,dx), cl=Math.min(Math.hypot(dx,dy),JR)/JR;
  joy.dx=Math.cos(a)*cl; joy.dy=Math.sin(a)*cl;
  joyKnob.style.left=(50+joy.dx*JR)+'px'; joyKnob.style.top=(50+joy.dy*JR)+'px';
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  joy.active=false; joy.dx=0; joy.dy=0; joyBase.style.display='none';
},{passive:false});

function inputDir() {
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])  dx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])    dy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S'])  dy+=1;
  if(joy.active){dx+=joy.dx;dy+=joy.dy;}
  const l=Math.hypot(dx,dy);
  return l>0?{dx:dx/l,dy:dy/l}:{dx:0,dy:0};
}

// ── Collision ─────────────────────────────────────────────────
function blocked(nx,ny) {
  for(const c of COLLIDERS) {
    if(c.shape==='ellipse') {
      const dx=(nx-c.fx*WW)/(c.frx*WW+CHAR_R);
      const dy=(ny-c.fy*WH)/(c.fry*WH+CHAR_R);
      if(dx*dx+dy*dy<1) return true;
      continue;
    }
    if(Math.hypot(nx-c.fx*WW,ny-c.fy*WH) < c.fr*Math.min(WW,WH)+CHAR_R) return true;
  }
  return false;
}

// ── Audio ─────────────────────────────────────────────────────
let aCtx;
function ac(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx;}
function beep(freq,dur,vol=.22){
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.value=freq;o.type='sine';
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
    o.start(c.currentTime);o.stop(c.currentTime+dur);
  }catch(e){}
}
const PICK_NOTES=[523,587,659,698,784,880];
let noteIdx=0;
function playPick(){beep(PICK_NOTES[noteIdx++%6],.3);}
function playWin(){[523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,.35),i*150));}

// ── DOM effects ───────────────────────────────────────────────
const SPARKS=['⭐','✨','💫','🌟','❤️'];
const CFTCOL=['#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93','#ff924c','#fff'];

const dynSty=document.createElement('style');
dynSty.textContent=`
@keyframes spk{from{transform:translate(0,0)scale(.3);opacity:1}to{transform:translate(var(--dx),var(--dy))scale(1.1);opacity:0}}
@keyframes cft{from{transform:translateY(0)rotate(0deg);opacity:1}to{transform:translateY(108vh)rotate(720deg);opacity:.2}}
`;
document.head.appendChild(dynSty);

function spawnSparkle(sx,sy){
  for(let i=0;i<6;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;pointer-events:none;z-index:200;font-size:22px;left:${sx}px;top:${sy}px;animation:spk .65s ease-out forwards`;
    el.textContent=SPARKS[Math.floor(Math.random()*SPARKS.length)];
    const a=(i/6)*Math.PI*2,d=40+Math.random()*35;
    el.style.setProperty('--dx',Math.cos(a)*d+'px');
    el.style.setProperty('--dy',Math.sin(a)*d+'px');
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }
}

function confetti(){
  const win=document.getElementById('win');
  for(let i=0;i<80;i++) setTimeout(()=>{
    if(!win.classList.contains('show')) return;
    const el=document.createElement('div');
    const dur=1.8+Math.random()*2;
    el.style.cssText=`position:fixed;top:-16px;pointer-events:none;z-index:290;border-radius:2px;left:${Math.random()*100}vw;width:${8+Math.random()*9}px;height:${8+Math.random()*9}px;background:${CFTCOL[Math.floor(Math.random()*CFTCOL.length)]};animation:cft ${dur}s linear forwards`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(dur+.1)*1000);
  },i*45);
}

// ── Draw: terrain ─────────────────────────────────────────────
function drawGround(){
  const g=ctx.createLinearGradient(cam.x,cam.y,cam.x,cam.y+VH);
  g.addColorStop(0,'#5db85d');g.addColorStop(.5,'#4caf50');g.addColorStop(1,'#388e3c');
  ctx.fillStyle=g;
  ctx.fillRect(cam.x,cam.y,VW,VH);
  // subtle texture dots
  const r=mkRng(7);
  ctx.fillStyle='rgba(0,0,0,.04)';
  for(let i=0;i<300;i++){
    const gx=cam.x+r()*VW, gy=cam.y+r()*VH;
    ctx.beginPath();ctx.arc(gx,gy,2,0,Math.PI*2);ctx.fill();
  }
}

function drawRivers(){
  RIVERS.forEach(pts=>{
    if(pts.length<2) return;
    // check visibility
    const xs=pts.map(p=>p.x*WW), ys=pts.map(p=>p.y*WH);
    if(Math.max(...xs)<cam.x-30||Math.min(...xs)>cam.x+VW+30) return;
    if(Math.max(...ys)<cam.y-30||Math.min(...ys)>cam.y+VH+30) return;
    // sand banks
    ctx.strokeStyle='#c4a35a';ctx.lineWidth=22;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x*WW,p.y*WH):ctx.lineTo(p.x*WW,p.y*WH));ctx.stroke();
    // water
    ctx.strokeStyle='#2196f3';ctx.lineWidth=13;
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x*WW,p.y*WH):ctx.lineTo(p.x*WW,p.y*WH));ctx.stroke();
    // shimmer
    ctx.strokeStyle='rgba(160,220,255,.55)';ctx.lineWidth=4;
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x*WW+3,p.y*WH):ctx.lineTo(p.x*WW+3,p.y*WH));ctx.stroke();
  });
}

function drawWaters(){
  WATER.forEach(w=>{
    const x=w.x*WW,y=w.y*WH,rx=w.rx*WW,ry=w.ry*WH;
    if(x+rx<cam.x||x-rx>cam.x+VW||y+ry<cam.y||y-ry>cam.y+VH) return;
    // sandy shore
    ctx.fillStyle='#c8a84b';
    ctx.beginPath();ctx.ellipse(x,y,rx+9,ry+7,0,0,Math.PI*2);ctx.fill();
    // water
    const wg=ctx.createRadialGradient(x-rx*.25,y-ry*.25,0,x,y,Math.max(rx,ry));
    wg.addColorStop(0,'#81d4fa');wg.addColorStop(.65,'#1e88e5');wg.addColorStop(1,'#1565c0');
    ctx.fillStyle=wg;
    ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();
    // highlight
    ctx.fillStyle='rgba(220,245,255,.35)';
    ctx.beginPath();ctx.ellipse(x-rx*.22,y-ry*.3,rx*.32,ry*.18,-.3,0,Math.PI*2);ctx.fill();
  });
}

function drawMountains(){
  MOUNTS.forEach(m=>{
    const x=m.x*WW,y=m.y*WH,s=m.s*Math.min(WW,WH)*.10;
    if(x+s<cam.x||x-s>cam.x+VW||y+s<cam.y||y-s>cam.y+VH) return;
    // body
    ctx.fillStyle='#78909c';
    ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s*.88,y+s*.52);ctx.lineTo(x-s*.88,y+s*.52);ctx.closePath();ctx.fill();
    // dark side
    ctx.fillStyle='rgba(0,0,0,.14)';
    ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s*.88,y+s*.52);ctx.lineTo(x,y+s*.52);ctx.closePath();ctx.fill();
    // snow
    ctx.fillStyle='#eceff1';
    ctx.beginPath();ctx.moveTo(x,y-s);ctx.lineTo(x+s*.33,y-s*.36);ctx.lineTo(x-s*.33,y-s*.36);ctx.closePath();ctx.fill();
  });
}

// ── Draw: vegetation ─────────────────────────────────────────
let treeFs='', bushFs='', flowerFs='';
function setFonts(){
  const ts=Math.max(28,Math.min(72,VW*.065));
  treeFs  =ts+'px serif';
  bushFs  =Math.round(ts*.55)+'px serif';
  flowerFs=Math.round(ts*.48)+'px serif';
}

function drawVegetation(){
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  const y0=cam.y-90,y1=cam.y+VH+90,x0=cam.x-90,x1=cam.x+VW+90;

  // Depth-sort bushes + trees together by world-y
  const items=[];
  BUSHES.forEach(b=>{
    const bx=b.x*WW,by=b.y*WH;
    if(bx<x0||bx>x1||by<y0||by>y1) return;
    items.push({wy:by,draw(){
      ctx.font=b.e==='🌸'?flowerFs:bushFs;
      ctx.fillText(b.e||'🌿',bx,by);
    }});
  });
  TREES.forEach(t=>{
    const tx=t.x*WW,ty=t.y*WH;
    if(tx<x0||tx>x1||ty<y0||ty>y1) return;
    items.push({wy:ty,draw(){
      ctx.font=treeFs;
      ctx.fillText(t.e,tx,ty);
    }});
  });
  items.sort((a,b)=>a.wy-b.wy);
  items.forEach(i=>i.draw());
}

// ── Draw: mushroom ────────────────────────────────────────────
function drawMushroom(m){
  if(m.collected) return;
  const x=m.fx*WW,y=m.fy*WH;
  if(x<cam.x-50||x>cam.x+VW+50||y<cam.y-50||y>cam.y+VH+50) return;
  const s=Math.min(VW,VH)*.052;
  // stem
  ctx.fillStyle='#f5f5f5';
  ctx.beginPath();ctx.ellipse(x,y,s*.36,s*.52,0,0,Math.PI*2);ctx.fill();
  // cap
  ctx.fillStyle='#e53935';
  ctx.beginPath();ctx.ellipse(x,y-s*.40,s*.70,s*.54,0,Math.PI,Math.PI*2);ctx.fill();
  // spots
  ctx.fillStyle='rgba(255,255,255,.88)';
  [[-.22,-.72],[.22,-.82],[0,-.96],[.12,-.62],[-.12,-.62]].forEach(([ox,oy])=>{
    ctx.beginPath();ctx.arc(x+ox*s,y+oy*s,s*.11,0,Math.PI*2);ctx.fill();
  });
}

// ── Draw: Snufkin ─────────────────────────────────────────────
function drawSnufkin(wx,wy,t,moving){
  ctx.save();ctx.translate(wx,wy);
  if(char.facing<0) ctx.scale(-1,1);

  const s=Math.min(VW,VH)*.058;
  const bob=moving?Math.sin(t*9)*s*.13:0;
  const lsw=moving?Math.sin(t*9)*s*.30:0;

  // shadow
  ctx.fillStyle='rgba(0,0,0,.18)';
  ctx.beginPath();ctx.ellipse(0,s*.55+bob,s*.55,s*.17,0,0,Math.PI*2);ctx.fill();

  // legs
  ctx.fillStyle='#5d4037';
  ctx.fillRect(-s*.26,s*.10+bob,s*.23,s*.58+lsw);
  ctx.fillRect(s*.03, s*.10+bob,s*.23,s*.58-lsw);
  // shoes
  ctx.fillStyle='#3e2723';
  ctx.beginPath();ctx.ellipse(-s*.14,s*.70+bob+lsw,s*.19,s*.09,-.12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse( s*.14,s*.70+bob-lsw,s*.19,s*.09, .12,0,Math.PI*2);ctx.fill();

  // coat
  ctx.fillStyle='#7b8c3d';
  ctx.beginPath();ctx.ellipse(0,-s*.08+bob,s*.42,s*.60,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.10)';
  ctx.beginPath();ctx.ellipse(s*.14,-s*.04+bob,s*.21,s*.44,0,0,Math.PI*2);ctx.fill();
  // belt
  ctx.fillStyle='#5d4037';ctx.fillRect(-s*.43,s*.08+bob,s*.86,s*.11);
  ctx.fillStyle='#ffd54f';
  ctx.beginPath();ctx.arc(0,s*.135+bob,s*.09,0,Math.PI*2);ctx.fill();

  // cape/scarf (mustard)
  ctx.fillStyle='#f4a428';
  ctx.beginPath();
  ctx.moveTo(-s*.38,-s*.30+bob);
  ctx.quadraticCurveTo(-s*.60,s*.08+bob,-s*.30,s*.24+bob);
  ctx.quadraticCurveTo(-s*.10,s*.28+bob, s*.02,s*.10+bob);
  ctx.lineTo(s*.02,-s*.48+bob);
  ctx.closePath();ctx.fill();

  // head
  ctx.fillStyle='#f4c490';
  ctx.beginPath();ctx.arc(0,-s*.72+bob,s*.37,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8a870';
  ctx.beginPath();ctx.arc(s*.33,-s*.74+bob,s*.10,0,Math.PI*2);ctx.fill();
  // eyes (calm squint)
  ctx.strokeStyle='#3e2723';ctx.lineWidth=s*.065;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-s*.15,-s*.76+bob);ctx.lineTo(-s*.07,-s*.72+bob);ctx.stroke();
  ctx.beginPath();ctx.moveTo( s*.08,-s*.76+bob);ctx.lineTo( s*.15,-s*.72+bob);ctx.stroke();
  // nose
  ctx.fillStyle='#c8895a';
  ctx.beginPath();ctx.arc(s*.05,-s*.64+bob,s*.055,0,Math.PI*2);ctx.fill();
  // mouth
  ctx.strokeStyle='#8d4a2a';ctx.lineWidth=s*.042;
  ctx.beginPath();ctx.arc(0,-s*.56+bob,s*.11,.1,Math.PI-.1);ctx.stroke();

  // hat brim (wide, dark green)
  ctx.save();ctx.rotate(-.08);
  ctx.fillStyle='#2d4a1a';
  ctx.beginPath();ctx.ellipse(s*.07,-s*1.05+bob,s*.65,s*.155,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // hat body (tall, floppy — Snufkin's signature)
  ctx.fillStyle='#4a6741';
  ctx.beginPath();
  ctx.moveTo(-s*.30,-s*1.08+bob);
  ctx.bezierCurveTo(-s*.38,-s*1.65+bob,  s*.05,-s*1.90+bob,  s*.38,-s*1.65+bob);
  ctx.bezierCurveTo( s*.48,-s*1.34+bob,  s*.32,-s*1.08+bob,  s*.32,-s*1.06+bob);
  ctx.closePath();ctx.fill();
  // hat highlight
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=s*.10;ctx.lineCap='round';
  ctx.beginPath();
  ctx.bezierCurveTo(-s*.18,-s*1.62+bob, s*.04,-s*1.82+bob, s*.26,-s*1.62+bob);
  ctx.stroke();
  // hat band
  ctx.strokeStyle='#c49a3a';ctx.lineWidth=s*.10;
  ctx.beginPath();ctx.moveTo(-s*.30,-s*1.08+bob);ctx.lineTo(s*.32,-s*1.06+bob);ctx.stroke();

  ctx.restore();
}

// ── Minimap ───────────────────────────────────────────────────
function renderMinimap(){
  const mw=mmCv.width,mh=mmCv.height;
  mmCtx.clearRect(0,0,mw,mh);
  // grass
  mmCtx.fillStyle='#4caf50';mmCtx.fillRect(0,0,mw,mh);
  // rivers
  RIVERS.forEach(pts=>{
    mmCtx.strokeStyle='#1e88e5';mmCtx.lineWidth=2;
    mmCtx.beginPath();pts.forEach((p,i)=>i===0?mmCtx.moveTo(p.x*mw,p.y*mh):mmCtx.lineTo(p.x*mw,p.y*mh));mmCtx.stroke();
  });
  // water
  WATER.forEach(w=>{
    mmCtx.fillStyle='#1e88e5';
    mmCtx.beginPath();mmCtx.ellipse(w.x*mw,w.y*mh,w.rx*mw,w.ry*mh,0,0,Math.PI*2);mmCtx.fill();
  });
  // mountains
  MOUNTS.forEach(m=>{
    mmCtx.fillStyle='#90a4ae';
    mmCtx.beginPath();mmCtx.arc(m.x*mw,m.y*mh,m.s*Math.min(mw,mh)*.09,0,Math.PI*2);mmCtx.fill();
  });
  // tree dots
  mmCtx.fillStyle='#1b5e20';
  TREES.forEach(t=>{mmCtx.fillRect(t.x*mw-1,t.y*mh-1,2,2);});
  // mushrooms
  MUSHROOMS.forEach(m=>{
    mmCtx.fillStyle=m.collected?'rgba(120,120,120,.5)':'#e53935';
    mmCtx.beginPath();mmCtx.arc(m.fx*mw,m.fy*mh,2.5,0,Math.PI*2);mmCtx.fill();
  });
  // viewport box
  mmCtx.strokeStyle='rgba(255,255,255,.85)';mmCtx.lineWidth=1.5;
  mmCtx.strokeRect(cam.x/WW*mw,cam.y/WH*mh,VW/WW*mw,VH/WH*mh);
  // character dot
  mmCtx.fillStyle='#ffeb3b';mmCtx.strokeStyle='#333';mmCtx.lineWidth=1;
  mmCtx.beginPath();mmCtx.arc(char.x/WW*mw,char.y/WH*mh,3.5,0,Math.PI*2);mmCtx.fill();mmCtx.stroke();
}

// ── Main render ────────────────────────────────────────────────
let gameTime=0;

function render(){
  ctx.save();
  ctx.translate(-cam.x,-cam.y);

  drawGround();
  drawRivers();
  drawWaters();
  drawMountains();
  drawVegetation();
  MUSHROOMS.forEach(m=>drawMushroom(m));

  const moving=Math.abs(char.vx)>5||Math.abs(char.vy)>5;
  drawSnufkin(char.x,char.y,gameTime,moving);

  ctx.restore();
  renderMinimap();
}

// ── Update ─────────────────────────────────────────────────────
function update(dt){
  if(gameWon) return;
  gameTime+=dt;

  const {dx,dy}=inputDir();
  if(dx!==0) char.facing=dx>0?1:-1;
  const nx=Math.max(CHAR_R,Math.min(WW-CHAR_R,char.x+dx*SPEED*dt));
  const ny=Math.max(CHAR_R,Math.min(WH-CHAR_R,char.y+dy*SPEED*dt));

  if(!blocked(nx,ny)){
    char.x=nx;
    char.y=ny;
  } else {
    if(!blocked(nx,char.y)) char.x=nx;
    if(!blocked(char.x,ny)) char.y=ny;
  }
  char.vx=dx*SPEED; char.vy=dy*SPEED;

  easeCamera(dt);

  // collect
  MUSHROOMS.forEach(m=>{
    if(m.collected) return;
    if(Math.hypot(char.x-m.fx*WW,char.y-m.fy*WH)<PICK_R){
      m.collected=true;
      collected++;
      document.getElementById('cnt').textContent=collected;
      playPick();
      spawnSparkle(char.x-cam.x,char.y-cam.y);
      if(collected>=MUSHROOMS.length) setTimeout(showWin,400);
    }
  });
}

// ── Win ───────────────────────────────────────────────────────
let collected=0,gameWon=false;

function showWin(){
  gameWon=true;
  const win=document.getElementById('win');
  win.classList.add('show');
  document.getElementById('btn-play').focus();
  playWin();confetti();
}

// ── Resize & init ─────────────────────────────────────────────
function resize(){
  const hadWorld=Boolean(WW&&WH&&MUSHROOMS.length);
  const collectedState=hadWorld?MUSHROOMS.map(m=>m.collected):null;
  const charFx=hadWorld?char.x/WW:.30;
  const charFy=hadWorld?char.y/WH:.35;
  const camFx=hadWorld?cam.x/WW:0;
  const camFy=hadWorld?cam.y/WH:0;
  VW=canvas.width=window.innerWidth;
  VH=canvas.height=window.innerHeight;
  WW=VW*7; WH=VH*7;
  mmCv.width=MM_W;
  mmCv.height=Math.round(MM_W*VH/VW);
  setFonts();
  buildWorld();
  if(!hadWorld) return;
  MUSHROOMS.forEach((m,i)=>m.collected=Boolean(collectedState[i]));
  char.x=Math.max(CHAR_R,Math.min(WW-CHAR_R,charFx*WW));
  char.y=Math.max(CHAR_R,Math.min(WH-CHAR_R,charFy*WH));
  cam.x=Math.max(0,Math.min(WW-VW,camFx*WW));
  cam.y=Math.max(0,Math.min(WH-VH,camFy*WH));
  document.getElementById('cnt').textContent=collected;
}

function startGame(){
  document.getElementById('btn-play').blur();
  collected=0; gameWon=false; gameTime=0;
  MUSHROOMS.forEach(m=>m.collected=false);
  document.getElementById('cnt').textContent='0';
  document.getElementById('win').classList.remove('show');
  char.x=WW*.30; char.y=WH*.35; char.vx=0; char.vy=0; char.facing=1;
  snapCam();
}

document.getElementById('btn-play').addEventListener('click',startGame);
window.addEventListener('resize',resize);

resize();
startGame();

let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/1000,.05);lastT=t;
  update(dt);render();
  requestAnimationFrame(loop);
}
lastT=performance.now();
requestAnimationFrame(loop);
</script>
